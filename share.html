<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI Share</title>

<meta property="og:title" content="Quadron AI 🔥">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<meta property="og:image" id="ogImg">
<meta name="twitter:image" id="twImg">
<style>
body{
  background:#0a0a0a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
}

/* FAKE CHAT BOX */
.chatBox{
  width:600px;
  background:#111;
  border:2px solid #ffd900;
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 40px #ffd900;
}

.msg{
  margin:10px 0;
}

.user{
  color:#ffd900;
  text-shadow:0 0 10px #ffd900;
}

.ai{
  color:#fff;
  text-shadow:0 0 10px #fff;
}
</style>

<script>
const params = new URLSearchParams(location.search);

let user = params.get("user") || "Hello?";
let ai = params.get("ai") || "Roasted 😂";

// BUILD STATIC IMAGE URL (IMPORTANT FIX)
let base = "https://quickchart.io/chart?c=";

let payload = encodeURIComponent(JSON.stringify({
  type: "text",
  data: {
    text: `User: ${user}\nAI: ${ai}`
  }
}));

let img = base + payload;

// SET STATIC META (NO document.write)
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("ogImg").setAttribute("content", img);
  document.getElementById("twImg").setAttribute("content", img);
});
</script>
</head>

<body>

<div class="chatBox">
  <div class="msg user">You: <span id="u"></span></div>
  <div class="msg ai">Quadron: <span id="a"></span></div>
</div>

<script>
document.getElementById("u").innerText = user;
document.getElementById("a").innerText = ai;
</script>

</body>
</html>
