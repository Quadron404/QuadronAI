<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadron Profile</title>
<style>
    body {
        margin: 0;
        background: #0a0a0a;
        color: #ffd900;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #profileCard {
        width: 350px;
        background: #111;
        padding: 30px;
        border: 2px solid #ffd900;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 0 20px #ffd900;
    }

    #uPic {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 3px solid #ffd900;
        margin-bottom: 15px;
        box-shadow: 0 0 15px #ffd900;
    }

    h2 { margin: 10px 0; text-shadow: 0 0 10px #ffd900; }
    p { color: #fff; margin: 5px 0; opacity: 0.8; }

    .tier-label {
        display: inline-block;
        background: #ffd900;
        color: #000;
        padding: 2px 10px;
        border-radius: 5px;
        font-weight: bold;
        font-size: 12px;
        margin-bottom: 10px;
    }

    .stats {
        margin: 25px 0;
        padding: 15px;
        border-top: 1px solid #333;
        border-bottom: 1px solid #333;
    }

    .limit-bar {
        width: 100%;
        height: 10px;
        background: #222;
        border-radius: 5px;
        margin-top: 10px;
        overflow: hidden;
    }

    #progress {
        height: 100%;
        background: #ffd900;
        width: 0%;
        box-shadow: 0 0 10px #ffd900;
        transition: 0.5s;
    }

    .btn {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    .back-btn { background: #222; color: #fff; }
    .back-btn:hover { background: #333; }

    .logout-btn { background: #ffd900; color: #000; margin-top: 20px; }
    .logout-btn:hover { box-shadow: 0 0 20px #ffd900; }
</style>
</head>
<body>

<div id="profileCard">
    <div id="tierLabel" class="tier-label">FREE PLAN</div>
    <img id="uPic" src="" alt="User">
    <h2 id="uName">Loading...</h2>
    <p id="uEmail"></p>

    <div class="stats">
        <div id="statusTitle">Daily Message Limit</div>
        <div id="limitText">0 / 0</div>
        <div class="limit-bar">
            <div id="progress"></div>
        </div>
    </div>

    <button class="btn back-btn" onclick="window.location.href='home.html'">Back to Chat</button>
    <button class="btn logout-btn" onclick="logout()">Logout</button>
</div>

<script>
    // 1. Get User Data
    let userRaw = localStorage.getItem("quadronUser");
    let user = {};

    if(userRaw === "guest") {
        user = { 
            name: "Guest User", 
            email: "guest@mode", 
            picture: "https://cdn-icons-png.flaticon.com/512/149/149071.png" 
        };
    } else {
        try {
            user = JSON.parse(userRaw) || {};
        } catch(e) {
            window.location.href = "login.html";
        }
    }

    // 2. Detect Current Tier Logic (Mirroring home.html logic)
    // Note: Since tier in home.html is a runtime variable, we check localStorage or 
    // assume the session state. If you want tiers to persist across pages, 
    // you should save the tier in localStorage when activated in home.html.
    
    let currentTier = localStorage.getItem("activeTier") || "FREE";
    let maxMsgs = 10;
    if(currentTier === "PLUS") maxMsgs = 20;
    if(currentTier === "PREMIUM") maxMsgs = 100;

    // 3. Get Limit Data
    let limitKey = "limit_" + (user.email || "guest");
    let limitData = JSON.parse(localStorage.getItem(limitKey)) || {count: 0};
    let count = limitData.count || 0;

    // 4. Update UI
    document.getElementById("uPic").src = user.picture || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
    document.getElementById("uName").textContent = user.name || "Guest";
    document.getElementById("uEmail").textContent = user.email || "";
    document.getElementById("tierLabel").textContent = currentTier + " PLAN";
    document.getElementById("limitText").textContent = count + " / " + maxMsgs;
    
    // Update Progress Bar
    let percentage = (count / maxMsgs) * 100;
    if (percentage > 100) percentage = 100;
    document.getElementById("progress").style.width = percentage + "%";

    // 5. Logout Function
    function logout() {
        if(confirm("Are you sure you want to logout?")) {
            localStorage.removeItem("quadronUser");
            localStorage.removeItem("activeTier"); // Clear tier on logout
            window.location.href = "login.html"; 
        }
    }
</script>

</body>
</html>
