<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadron Profile</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
:root{--line:rgba(255,255,255,.13);--yellow:#ffda00;--text:#f7f5eb;--muted:#969696}
*{box-sizing:border-box}html,body{min-height:100%}
body{margin:0;background:#000;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Arial,sans-serif;overflow:hidden}
#space{position:fixed;inset:0;width:100%;height:100%;z-index:0;background:#000}
.page{position:relative;z-index:1;min-height:100vh;display:grid;place-items:center;padding:24px}
.card{width:min(980px,100%);border:1px solid var(--line);border-radius:30px;background:rgba(14,14,14,.72);backdrop-filter:blur(24px);box-shadow:0 24px 100px rgba(0,0,0,.62);overflow:hidden}
.top{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:28px;border-bottom:1px solid var(--line)}
.id{display:flex;align-items:center;gap:18px;min-width:0}.id img{width:72px;height:72px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,218,0,.38);box-shadow:0 0 32px rgba(255,218,0,.18)}
h1{margin:0;font-size:34px;letter-spacing:-.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}p{margin:6px 0 0;color:var(--muted)}
.btn{height:44px;border-radius:24px;border:1px solid var(--line);background:rgba(255,255,255,.055);color:#eee;text-decoration:none;padding:0 17px;display:inline-flex;align-items:center;justify-content:center;font-weight:750;cursor:pointer}.btn.primary{background:#f4f4f4;color:#080808}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:28px}
.tile{border:1px solid var(--line);border-radius:24px;background:rgba(255,255,255,.045);padding:20px;min-height:150px;display:flex;flex-direction:column;justify-content:space-between}
.tile small{text-transform:uppercase;letter-spacing:.16em;color:#aaa;font-size:11px}.tile b{font-size:42px;color:#fff;letter-spacing:-.04em}.tile b span{color:var(--yellow)}
.bar{height:7px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--yellow),#fff3a6);width:0;box-shadow:0 0 18px rgba(255,218,0,.5)}
.actions{padding:0 28px 28px;display:flex;gap:12px;flex-wrap:wrap}.note{padding:0 28px 28px;color:var(--muted);line-height:1.6;font-size:14px}
@media(max-width:760px){.page{padding:12px}.top{align-items:flex-start;flex-direction:column}.stats{grid-template-columns:1fr}.actions{flex-direction:column}.btn{width:100%}h1{font-size:28px}}
</style>
</head>
<body>
<canvas id="space"></canvas>
<main class="page">
  <section class="card">
    <header class="top">
      <div class="id"><img id="pic" alt="Profile"><div><h1 id="name">Guest</h1><p id="email">Private local session</p></div></div>
      <a class="btn primary" href="home.html">Back to Quadron</a>
    </header>
    <section class="stats">
      <div class="tile"><small>Messages today</small><b id="mTxt">0 <span>/ 100</span></b><div class="bar"><span id="mBar"></span></div></div>
      <div class="tile"><small>Images today</small><b id="iTxt">0 <span>/ 5</span></b><div class="bar"><span id="iBar"></span></div></div>
      <div class="tile"><small>Videos today</small><b id="vTxt">0 <span>/ 1</span></b><div class="bar"><span id="vBar"></span></div></div>
    </section>
    <div class="actions"><button class="btn" onclick="resetUsage()">Reset counters</button><button class="btn" onclick="logout()">Logout</button></div>
    <p class="note">This profile stays minimal on purpose. Big dashboards are where focus goes to retire.</p>
  </section>
</main>
<script>
const LIMITS={messages:100,images:5,videos:1};
function getUser(){const raw=localStorage.getItem("quadronUser");if(raw==="guest"||!raw)return{name:"Guest",email:"guest@quadron.local",picture:"https://cdn-icons-png.flaticon.com/512/149/149071.png"};try{const u=JSON.parse(raw);return{name:u.name||"Guest",email:u.email||"",picture:u.picture||"https://cdn-icons-png.flaticon.com/512/149/149071.png"}}catch{return{name:"Guest",email:"guest@quadron.local",picture:"https://cdn-icons-png.flaticon.com/512/149/149071.png"}}}
const u=getUser();name.textContent=u.name;email.textContent=u.email||"Private local session";pic.src=u.picture;
function today(){return new Date().toISOString().slice(0,10)}function key(){return"quadronUsage_"+(u.email||"guest")}function usage(){let v=JSON.parse(localStorage.getItem(key())||"null");if(!v||v.date!==today())v={date:today(),messages:0,images:0,videos:0};return v}
function render(){const x=usage();mTxt.innerHTML=`${x.messages} <span>/ ${LIMITS.messages}</span>`;iTxt.innerHTML=`${x.images} <span>/ ${LIMITS.images}</span>`;vTxt.innerHTML=`${x.videos} <span>/ ${LIMITS.videos}</span>`;mBar.style.width=x.messages/LIMITS.messages*100+"%";iBar.style.width=x.images/LIMITS.images*100+"%";vBar.style.width=x.videos/LIMITS.videos*100+"%"}
function resetUsage(){localStorage.setItem(key(),JSON.stringify({date:today(),messages:0,images:0,videos:0}));render()}function logout(){localStorage.removeItem("quadronUser");location.href="index.html"}render();
const canvas=space,ctx=canvas.getContext("2d");let stars=[],shooters=[],w,h,last=0;function resize(){w=canvas.width=innerWidth*devicePixelRatio;h=canvas.height=innerHeight*devicePixelRatio;stars=Array.from({length:100},()=>({x:Math.random()*w,y:Math.random()*h,r:(Math.random()*1.2+.3)*devicePixelRatio,a:Math.random()*.65+.12,s:(Math.random()*9+4)*devicePixelRatio,t:Math.random()*6}))}function addShooter(){shooters.push({x:Math.random()*w*.8+w*.15,y:-60*devicePixelRatio,len:(Math.random()*160+105)*devicePixelRatio,v:(Math.random()*460+470)*devicePixelRatio,life:0,max:1.1})}function draw(ts){const dt=Math.min((ts-last)/1000,.033)||.016;last=ts;ctx.clearRect(0,0,w,h);ctx.fillStyle="#000";ctx.fillRect(0,0,w,h);for(const s of stars){s.x+=s.s*dt;s.t+=dt*1.6;if(s.x>w+8){s.x=-8;s.y=Math.random()*h}ctx.globalAlpha=s.a*(.4+.6*((Math.sin(s.t)+1)/2));ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill()}if(Math.random()<dt*.58)addShooter();shooters=shooters.filter(o=>(o.life+=dt)<o.max);for(const o of shooters){o.x-=o.v*.42*dt;o.y+=o.v*dt;const p=o.life/o.max;ctx.globalAlpha=(1-p)*.45;ctx.strokeStyle="rgba(255,255,255,.8)";ctx.lineWidth=2*devicePixelRatio;ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(o.x+o.len*.42,o.y-o.len);ctx.stroke()}ctx.globalAlpha=1;requestAnimationFrame(draw)}addEventListener("resize",resize);resize();requestAnimationFrame(draw);
</script>
</body>
</html>
