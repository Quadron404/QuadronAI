<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadron Login</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
body{display:none;margin:0;height:100vh;background:black;font-family:Arial;display:flex;color:white;overflow:hidden;}
#leftPanel{width:40%;min-width:380px;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#000;}
#loginBox{width:320px;text-align:center;}
.loginBtn{width:100%;padding:14px;margin:10px 0;background:#050505;border:2px solid #ffe600;border-radius:8px;color:#ffe600;cursor:pointer;transition:.25s;}
.loginBtn:hover{background:#ffe600;color:black;box-shadow:0 0 20px #ffe600;}
#rightPanel{flex:1;display:flex;justify-content:center;align-items:center;background:black;position:relative;}
#quadronText{font-size:100px;font-weight:bold;text-shadow:0 0 25px #fff;}
#skip{margin-top:18px;font-size:14px;opacity:.7;cursor:pointer;}
@media (max-width:700px){ body{flex-direction:column;} #leftPanel, #rightPanel{width:100%;} }
</style>
</head>
<body>

<div id="leftPanel">
    <div id="loginBox">
        <h2>Log into Quadron</h2>
        <div id="g_id_onload" data-client_id="YOUR_GOOGLE_ID" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-shape="pill"></div>
        
        <button class="loginBtn" style="margin-top:20px" onclick="emailLogin()">Login with Email</button>
        <button class="loginBtn" onclick="guestLogin()">Skip Sign-in</button>
        <div id="skip" onclick="guestLogin()">Continue as guest</div>
    </div>
</div>

<div id="rightPanel">
    <div id="quadronText">Quadron</div>
</div>

<script>
window.onload = () => {
    const user = localStorage.getItem("quadronUser");
    if(user) {
        window.location.href = "home.html";
    } else {
        document.body.style.display = "flex";
    }
};

function handleCredentialResponse(response){
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    localStorage.setItem("quadronUser", JSON.stringify({
        name: payload.name,
        email: payload.email,
        picture: payload.picture
    }));
    enterSite();
}

function emailLogin(){
    let email = prompt("Enter your email");
    if(!email) return;
    localStorage.setItem("quadronUser", JSON.stringify({name: "User", email: email}));
    enterSite();
}

function guestLogin(){
    // Set user as "guest" string
    localStorage.setItem("quadronUser", "guest");
    enterSite();
}

function enterSite(){
    window.location.href = "home.html";
}
</script>
</body>
</html>
