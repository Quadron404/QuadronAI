<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<link rel="icon" href="favicon.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
/* ONLY ADDED THIS */
a{
color:#00aaff;
text-shadow:0 0 10px #00aaff;
text-decoration:none;
}
</style>

<!-- KEEP YOUR ORIGINAL STYLE EXACTLY SAME -->
</head>

<body>

<!-- KEEP HTML SAME -->

<script>

/* ULTRA FAST TYPING */
function fastType(el,text){
let span=document.createElement("span");
span.className="aiText";
span.innerHTML=text;
el.appendChild(span);
}

/* LINK PARSER */
function linkify(text){
return text.replace(/https?:\/\/[^\s]+/g,url=>{
return `<a href="${url}" target="_blank">${url}</a>`;
});
}

/* LIMIT TRACKING */
function updateUsage(){
let user=JSON.parse(localStorage.getItem("quadronUser"))||{};
let key="limit_"+(user.email||"guest");

let data=JSON.parse(localStorage.getItem(key))||{count:0};
data.count++;
localStorage.setItem(key,JSON.stringify(data));
}

/* EXPLORE MODE FIX */
function buildPrompt(t){
if(mode==="code") return "ONLY CODE\n"+t;
if(mode==="explore") return "Give detailed answer with sources and links "+t;
return t;
}

/* SEND FIX */
async function send(){
let text=msg.value.trim();
if(!text)return;

updateUsage();

messages.innerHTML+=`<p class="userText">You: ${text}</p>`;
msg.value="";

let p=document.createElement("p");
messages.appendChild(p);

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:buildPrompt(text),mode})
});

let data=await res.json();
let reply=data.reply;

/* CODE DETECT */
let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);

if(m){
let lang=m[1]||"html";
let code=m[2];

let box=document.createElement("div");
box.className="codeBox";

/* SAVE ORIGINAL FULL HTML */
box.dataset.full = `
<div class="codeHeader">
<span>&lt;/&gt; ${lang}</span>
<div>
<span class="copyBtn" onclick="copyCode(this)">Copy</span>
<span class="copyBtn" onclick="runCode(this)">Run</span>
<span class="copyBtn" onclick="debugCode(this)">Debug</span>
</div>
</div>
<div class="spinner"></div>
<pre></pre>
`;

box.innerHTML=box.dataset.full;

p.appendChild(box);

let pre=box.querySelector("pre");
let spin=box.querySelector(".spinner");

/* ULTRA FAST CODE LOAD */
pre.textContent=code;
spin.remove();
hljs.highlightElement(pre);

}else{
reply=linkify(reply);
fastType(p,"Quadron: "+reply);
}
}

/* RUN FIX */
function runCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

box.dataset.code=code;

box.innerHTML=`
<button style="float:right;color:#fff;background:none;border:1px solid #fff;text-shadow:0 0 10px #fff;" onclick="restoreCode(this)">Back</button>
<iframe style="width:100%;height:250px;"></iframe>
`;

box.querySelector("iframe").srcdoc=code;
}

/* FULL RESTORE */
function restoreCode(btn){
let box=btn.closest(".codeBox");

box.innerHTML=box.dataset.full;

let pre=box.querySelector("pre");
pre.textContent=box.dataset.code;

hljs.highlightElement(pre);
}

</script>

</body>
</html>
