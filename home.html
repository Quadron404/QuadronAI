<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* SAME UI — NO CHANGES */
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
.blur-bg{filter:blur(5px);}
header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 12px #ffd900;}
#logo{font-weight:bold;font-size:18px;}
#menuBtn{cursor:pointer;font-size:24px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:900;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;overflow-y:auto;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}
.menuItem{padding:10px;cursor:pointer;margin-top:8px;color:#ffd900;font-weight:bold;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
button{padding:10px;background:#ffd900;color:#000;border:none;}
img.ai-img{max-width:100%;margin-top:8px;border-radius:10px;}
canvas{margin-top:10px;}
</style>
</head>

<body>

<header>
<div id="logo">Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">
<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="codeMode()">Code /</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI()">Evaluate</div>
</div>

<div id="chat">
<div id="messages"></div>
<div id="inputArea">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

<script>
const messages=document.getElementById("messages");

let exploreActive=false;
let codeModeActive=false;
let evaluateMode=false;

/* PROMPT SYSTEM */
function buildPrompt(userText){

let base=`You are Quadron AI developed by Rawat Systems.
Personality: Tony Stark + Deadpool.
Ultra sarcastic, witty, argumentative.
Use emoji if necessary (not excessive).
Add images only if user asks.

`;

if(codeModeActive){
return "Return ONLY one code block. No explanation.";
}

if(exploreActive){
return base+`
Be an explorer.
Give ultra detailed answer.
Be sarcastic but informative.
Generate ideas, conclusions.
Provide image links compulsorily.
`;
}

if(evaluateMode){
return `
Perform ultra detailed evaluation.
Include graphs, pie charts, data.
Provide sources and strong conclusion.
NO sarcasm. Pure logic.
`;
}

return base + userText;
}

/* GPT TYPE ANIMATION */
function typeText(el,text){
let i=0;
let interval=setInterval(()=>{
el.innerHTML="<b>Quadron:</b> "+text.slice(0,i);
i++;
if(i>text.length)clearInterval(interval);
},10);
}

/* IMAGE DETECT */
function renderImages(container,text){
let urlRegex=/(https?:\/\/[^\s]+)/g;
let urls=text.match(urlRegex);
if(urls){
urls.forEach(u=>{
if(u.match(/\.(jpg|png|jpeg|webp|gif)/)){
let img=document.createElement("img");
img.src=u;
img.className="ai-img";
container.appendChild(img);
}
});
}
}

/* CHART DETECT */
function renderChart(container,text){
try{
let data=JSON.parse(text);
if(data.type){
let canvas=document.createElement("canvas");
container.appendChild(canvas);

new Chart(canvas,{
type:data.type,
data:{
labels:data.labels,
datasets:[{data:data.values}]
}
});
}
}catch(e){}
}

/* SEND */
async function send(){
let text=msg.value.trim();
if(!text)return;

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`;
msg.value="";

let p=document.createElement("p");
messages.appendChild(p);

let prompt=buildPrompt(text);

let res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:prompt})});
let data=await res.json();

let reply=data.reply;

/* CODE */
let codeMatch=reply.match(/```(\w+)?\n([\s\S]*?)```/);
if(codeMatch){
p.innerHTML="<pre>"+codeMatch[2]+"</pre>";
}else{
typeText(p,reply);
renderImages(p,reply);
renderChart(p,reply);
}

messages.scrollTop=messages.scrollHeight;
}

/* MODES */

function newChat(){
messages.innerHTML="";
exploreActive=false;
codeModeActive=false;
evaluateMode=false;
}

function codeMode(){
messages.innerHTML="";
codeModeActive=true;
exploreActive=false;
evaluateMode=false;
messages.innerHTML="<b>Quadron:</b> Describe what you want to code";
}

function exploreMode(){
messages.innerHTML="";
exploreActive=true;
codeModeActive=false;
evaluateMode=false;
messages.innerHTML="<b>Quadron:</b> Explore the Universe ";
}

function evaluateModeUI(){
messages.innerHTML="";
evaluateMode=true;
exploreActive=false;
codeModeActive=false;
messages.innerHTML="<b>Quadron:</b> Describe what you want to evaluate ";
}

</script>

</body>
</html>
