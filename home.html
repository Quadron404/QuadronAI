<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;}
#menuBtn{font-size:24px;cursor:pointer;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;}
#sidePanel.open{transform:translateX(0);}
.menuItem{padding:10px;color:#ffd900;cursor:pointer;}

#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;}
#inputArea{display:flex;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;}
button{padding:10px;background:#ffd900;border:none;}

.codeBox{background:#000;border:1px solid #ffd900;margin-top:8px;position:relative;}
.codeHeader{background:#111;padding:6px;}
.codeContent{padding:10px;white-space:pre;}

.spinner{
position:absolute;
right:10px;
top:8px;
width:14px;height:14px;
border:2px solid #ffd900;
border-top:2px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}
</style>
</head>

<body>

<header>
<div>Quadron AI</div>
<div id="menuBtn">☰</div>
</header>

<div id="overlay"></div>

<div id="sidePanel">
<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="codeMode()">Code /</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI()">Evaluate</div>
</div>

<div id="chat">
<div id="messages"></div>
<div id="inputArea">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

<script>
const messages=document.getElementById("messages");
const menu=document.getElementById("menuBtn");
const panel=document.getElementById("sidePanel");
const overlay=document.getElementById("overlay");

/* MENU FIX */
menu.onclick=()=>{
panel.classList.add("open");
overlay.style.display="block";
};
overlay.onclick=()=>{
panel.classList.remove("open");
overlay.style.display="none";
};

/* MODES */
let mode="normal";

function newChat(){messages.innerHTML="";mode="normal";}
function codeMode(){messages.innerHTML="";mode="code";}
function exploreMode(){messages.innerHTML="";mode="explore";}
function evaluateModeUI(){messages.innerHTML="";mode="evaluate";}

/* PROMPT FIX */
function buildPrompt(t){

if(mode==="code")
return `ONLY code block.\n${t}`;

if(mode==="explore")
return `Explain with images. Use image URLs.\n${t}`;

if(mode==="evaluate")
return `Give answer + include graph JSON strictly:
{"type":"line","labels":["A","B"],"values":[10,20]}
${t}`;

return `You are Quadron AI.
Never say you cannot show images or links.
Always generate graphs when asked.
${t}`;
}

/* FORMAT */
function formatText(t){
return t
.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")
.replace(/\n/g,"<br>")
.replace(/https?:\/\/[^\s]+/g,""); // remove links from text
}

/* IMAGE FIX */
function renderImages(el,text){

// markdown
let md=[...text.matchAll(/!\[.*?\]\((.*?)\)/g)];
md.forEach(m=>{
let img=document.createElement("img");
img.src=m[1];
img.style.maxWidth="100%";
img.style.marginTop="10px";
el.appendChild(img);
});

// direct links
let urls=text.match(/https?:\/\/[^\s]+/g);
if(!urls)return;

urls.forEach(u=>{
if(/\.(jpg|png|jpeg|webp)/i.test(u)){
let img=document.createElement("img");
img.src=u;
img.style.maxWidth="100%";
img.style.marginTop="10px";
el.appendChild(img);
}
});
}

/* GRAPH FIX */
function renderChart(el,text){

// detect keywords if no JSON
if(text.toLowerCase().includes("pie chart")){
createChart(el,"pie",["A","B"],[50,50]);
return;
}

// JSON detect
let m=text.match(/\{[\s\S]*"type"[\s\S]*\}/);
if(!m)return;

try{
let d=JSON.parse(m[0]);
createChart(el,d.type,d.labels,d.values);
}catch(e){}
}

function createChart(el,type,labels,data){

let canvas=document.createElement("canvas");
canvas.style.marginTop="15px";
el.appendChild(canvas);

new Chart(canvas,{
type:type,
data:{
labels:labels,
datasets:[{
data:data,
borderWidth:2
}]
},
options:{
responsive:true,
animation:false
}
});
}

/* TYPE */
function typeText(el,text){

let span=document.createElement("span");
el.innerHTML="<b>Quadron:</b> ";
el.appendChild(span);

let clean=formatText(text);
let i=0;

function t(){
span.innerHTML=clean.slice(0,i);
i++;

if(i<=clean.length){
requestAnimationFrame(t);
}else{
renderImages(el,text);
renderChart(el,text);
}
}
t();
}

/* SEND */
async function send(){
let text=msg.value.trim();
if(!text)return;

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`;
msg.value="";

let p=document.createElement("p");
messages.appendChild(p);

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:buildPrompt(text)})
});

let data=await res.json();
let reply=data.reply;

/* CODE */
let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);

if(m){
let box=document.createElement("div");
box.className="codeBox";

let header=document.createElement("div");
header.className="codeHeader";
header.innerText=m[1]||"code";

let spin=document.createElement("div");
spin.className="spinner";

let pre=document.createElement("pre");
pre.className="codeContent";

box.appendChild(header);
box.appendChild(spin);
box.appendChild(pre);
p.appendChild(box);

let code=m[2];
let i=0;

function t(){
pre.textContent+=code[i];
i++;

if(i<code.length){
requestAnimationFrame(t);
}else{
spin.remove();
hljs.highlightElement(pre);
renderChart(p,code);
}
}
t();

}else{
typeText(p,reply);
}

messages.scrollTop=messages.scrollHeight;
}

msg.addEventListener("keydown",e=>{
if(e.key==="Enter") send();
});
</script>

</body>
</html>
