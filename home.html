<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<link rel="icon" href="favicon.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
/* SAME UI - UNCHANGED */
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;transition:.3s;}
.blur-bg{filter:blur(6px);}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 15px #ffd900;}
header div:first-child{font-weight:bold;text-shadow:0 0 15px #ffd900;}
#menuBtn{cursor:pointer;font-size:24px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:500;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}
#menuProfile{display:flex;gap:10px;padding:10px;border-bottom:1px solid #333;cursor:pointer;}
#menuProfile img{width:40px;height:40px;border-radius:50%;border:1px solid #ffd900;}
.menuItem{padding:10px;cursor:pointer;margin-top:8px;font-weight:bold;text-shadow:0 0 10px #fff;}
.menuFooter{margin-top:auto;text-align:center;font-size:12px;color:#fff;text-shadow:0 0 10px #fff;}
.menuFooter span{color:#ffd900;text-shadow:0 0 10px #ffd900;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;box-shadow:0 0 20px #ffd900;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
input::placeholder{color:rgba(255,255,255,0.3);}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;border-radius:20px;box-shadow:0 0 15px #ffd900;transition:.2s;}
button:hover{box-shadow:0 0 35px #ffd900;}
.userText{color:#ffd900;text-shadow:0 0 10px #ffd900;}
.aiText{color:#fff;text-shadow:0 0 10px #fff;}
.footer{text-align:center;font-size:12px;margin:10px;color:#fff;text-shadow:0 0 10px #fff;}
.footer a{color:#ffd900;text-shadow:0 0 15px #ffd900;text-decoration:none;}

/* CODE BOX ADDITION */
.codeHeader{display:flex;justify-content:space-between;padding:6px;border-bottom:1px solid #ffd900;}
.codeTitle{color:#fff;text-shadow:0 0 10px #fff;}
.codeBtns span{margin-left:10px;cursor:pointer;color:#fff;text-shadow:0 0 10px #fff;}
.backBtn{color:#ffd900 !important;text-shadow:0 0 10px #ffd900;}
.loader{width:18px;height:18px;border:2px solid #fff;border-top:2px solid transparent;border-radius:50%;animation:spin 1s linear infinite;margin:5px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.link{color:#00f;text-shadow:0 0 8px #00f;}
</style>
</head>

<body>

<header>
  <div>Quadron AI</div>
  <div id="menuBtn">☰</div>
</header>

<div id="overlay"></div>

<div id="sidePanel">
  <div id="menuProfile">
    <img id="profilePic">
    <div>
      <div id="profileName"></div>
      <div id="profileEmail" style="font-size:12px;"></div>
    </div>
  </div>

  <div class="menuItem" id="newChatBtn">New Chat</div>
  <div class="menuItem" id="codeModeBtn">Code /</div>
  <div class="menuItem" id="exploreModeBtn">Explore</div>
  <div class="menuItem" id="voiceModeBtn">Voice Mode</div>

  <div class="menuFooter">
    Developed by <span>Rawat Systems</span>
  </div>
</div>

<div id="chat">
  <div id="messages"></div>
  <div id="inputArea">
    <input id="msg" placeholder="Type here.....">
    <button onclick="send()">Send</button>
  </div>
</div>

<div class="footer">
  Quadron AI can make mistakes, by using it you accept our
  <a href="terms.html">Terms & Conditions</a>
</div>

<script>

/* SAME ORIGINAL JS ABOVE UNCHANGED */

/* FAST CODE TYPE */
function typeCode(el,text){
  let i=0;
  let int=setInterval(()=>{
    el.textContent+=text[i++];
    if(i>=text.length) clearInterval(int);
  },2);
}

/* LINK DETECT */
function makeLink(txt){
  if(!txt.includes("https")) return txt;
  let i=txt.indexOf("https");
  let link=txt.substring(i);
  return txt.substring(0,i)+`<a href="${link}" target="_blank" class="link">${link}</a>`;
}

/* SEND */
async function send(){
  let text=msg.value.trim();
  if(!text)return;

  messages.innerHTML+=`<p class="userText">You: ${text}</p>`;
  msg.value="";

  let p=document.createElement("p");
  messages.appendChild(p);

  let finalPrompt=text;

  if(mode==="code") finalPrompt="ONLY RETURN CODE.\n"+text;

  if(mode==="explore"){
    let wiki=await getWikiData(text);
    finalPrompt=`Use this data:\n${wiki}\nExplain clearly and give one source link at end.\n${text}`;
  }

  let res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:finalPrompt})});
  let reply=(await res.json()).reply;

  if(mode==="code"){

    let box=document.createElement("div");
    box.style.background="#000";
    box.style.border="1px solid #ffd900";
    box.style.borderRadius="8px";

    let header=document.createElement("div");
    header.className="codeHeader";

    let title=document.createElement("div");
    title.className="codeTitle";
    title.textContent="</> code";

    let btns=document.createElement("div");
    btns.className="codeBtns";

    let copy=document.createElement("span");
    copy.textContent="Copy";

    let run=document.createElement("span");
    run.textContent="Run";

    let debug=document.createElement("span");
    debug.textContent="Debugg";

    btns.append(copy,run,debug);
    header.append(title,btns);

    let loader=document.createElement("div");
    loader.className="loader";

    let pre=document.createElement("pre");

    box.append(header,loader,pre);
    p.appendChild(box);

    localStorage.setItem("code_temp",reply);

    typeCode(pre,reply);
    setTimeout(()=>loader.remove(),500);

    copy.onclick=()=>{
      navigator.clipboard.writeText(localStorage.getItem("code_temp"));
      copy.textContent="Copied !";
      setTimeout(()=>copy.textContent="Copy",1000);
    };

    run.onclick=()=>{
      let code=localStorage.getItem("code_temp");

      pre.remove();
      btns.innerHTML="";

      let back=document.createElement("span");
      back.textContent="Back";
      back.className="backBtn";
      btns.append(back);

      let iframe=document.createElement("iframe");
      iframe.style.width="100%";
      iframe.style.height="300px";
      box.appendChild(iframe);
      iframe.srcdoc=code;

      back.onclick=()=>{
        iframe.remove();
        btns.innerHTML="";
        btns.append(copy,run,debug);
        box.appendChild(pre);
        pre.textContent="";
        typeCode(pre,code);
      };
    };

    debug.onclick=async ()=>{
      let code=localStorage.getItem("code_temp");
      let res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:"Fix this code:\n"+code})});
      let fixed=(await res.json()).reply;
      localStorage.setItem("code_temp",fixed);
      pre.textContent="";
      typeCode(pre,fixed);
    };

    return;
  }

  if(mode==="explore"){
    p.innerHTML=`<span class="aiText">Quadron: ${makeLink(reply)}</span>`;
    return;
  }

  fastType(p,"Quadron: "+reply);
}

</script>

</body>
</html>
