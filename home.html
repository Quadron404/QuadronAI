<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}

/* BLUR ONLY BG */
.blur-bg{filter:blur(6px);}

/* HEADER */
header{
display:flex;justify-content:space-between;
padding:12px;background:#000;
border-bottom:2px solid #ffd900;
box-shadow:0 0 15px #ffd900;
}
#menuBtn{cursor:pointer;font-size:24px;}

/* SIDE MENU */
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;}
#sidePanel{
position:fixed;right:0;top:0;width:260px;height:100%;
background:#111;transform:translateX(100%);
transition:.3s;padding:15px;z-index:1000;
display:flex;flex-direction:column;
}
#sidePanel.open{transform:translateX(0);}

#menuProfile{
display:flex;gap:10px;padding:10px;
border-bottom:1px solid #333;cursor:pointer;
}
#menuProfile img{width:40px;height:40px;border-radius:50%;border:1px solid #ffd900;}

.menuItem{padding:10px;cursor:pointer;margin-top:8px;font-weight:bold;text-shadow:0 0 10px #fff;}

.menuFooter{margin-top:auto;text-align:center;font-size:12px;}
.menuFooter span{color:#fff;text-shadow:0 0 10px #fff;}
.menuFooter b{color:#ffd900;text-shadow:0 0 15px #ffd900;}

/* CHAT */
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{
height:65vh;overflow:auto;
background:#111;padding:10px;
border:1px solid #ffd900;
border-radius:12px;
box-shadow:0 0 20px #ffd900;
}

/* INPUT */
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{
flex:1;padding:10px;
background:black;color:#ffd900;
border:1px solid #ffd900;
border-radius:10px;
}
button{
padding:10px;
background:#ffd900;color:#000;
border:none;
cursor:pointer;
box-shadow:0 0 20px #ffd900;
}

/* TEXT */
.userText{color:#ffd900;text-shadow:0 0 10px #ffd900;}
.aiText{color:#fff;text-shadow:0 0 10px #fff;}

/* CODE */
.codeBox{
background:#000;border:1px solid #ffd900;
margin-top:8px;border-radius:8px;
overflow:hidden;position:relative;
}
.codeHeader{
display:flex;justify-content:space-between;
padding:6px;background:#111;font-size:12px;
border-bottom:1px solid #ffd900;
}
.copyBtn{
cursor:pointer;padding:4px 8px;
border:1px solid #ffd900;border-radius:4px;
margin-left:5px;
}

/* FIXED SPINNER */
.spinner{
position:absolute;width:20px;height:20px;
border:3px solid #fff;border-top:3px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
top:8px;right:10px;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* FOOTER */
.footer{text-align:center;font-size:12px;margin:10px;color:#fff;text-shadow:0 0 10px #fff;}
.footer a{color:#ffd900;text-shadow:0 0 15px #ffd900;text-decoration:none;}
</style>
</head>

<body>

<header id="mainUI">
<div>Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">

<div id="menuProfile">
<img id="profilePic">
<div>
<div id="profileName"></div>
<div id="profileEmail" style="font-size:12px;"></div>
</div>
</div>

<div class="menuItem" onclick="newChat();closeMenu()">New Chat</div>
<div class="menuItem" onclick="codeMode();closeMenu()">Code /</div>
<div class="menuItem" onclick="exploreMode();closeMenu()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI();closeMenu()">Evaluate</div>

<div class="menuFooter">
<span>Developed By <b>Rawat Systems</b></span>
</div>

</div>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

<div class="footer">
Quadron AI can make mistakes , by using it you agree our 
<a href="terms.html">Terms & Conditions</a>
</div>

<script>

/* USER */
let user=JSON.parse(localStorage.getItem("quadronUser"));
if(user){
profileName.textContent=user.name;
profileEmail.textContent=user.email;
profilePic.src=user.picture;
}else{
profileName.textContent="Guest";
profilePic.src="https://via.placeholder.com/40";
}

/* MENU BLUR FIX */
function openMenu(){
sidePanel.classList.add("open");
overlay.style.display="block";
mainUI.classList.add("blur-bg");
chat.classList.add("blur-bg");
}
function closeMenu(){
sidePanel.classList.remove("open");
overlay.style.display="none";
mainUI.classList.remove("blur-bg");
chat.classList.remove("blur-bg");
}

/* MODES */
let codeModeActive=false,exploreActive=false,evaluateMode=false;

function buildPrompt(t){
if(codeModeActive) return "ONLY CODE "+t;
if(exploreActive) return "WIKIPEDIA "+t;
if(evaluateMode) return "TAVILY ONLY "+t;
return t;
}

/* ULTRA FAST */
function fastType(el,text){
let span=document.createElement("span");
span.className="aiText";
el.appendChild(span);

let i=0;
let interval=setInterval(()=>{
span.textContent=text.slice(0,i);
i++;
if(i>text.length) clearInterval(interval);
},0);
}

/* SEND */
async function send(){

let text=msg.value.trim();
if(!text)return;

messages.innerHTML+=`<p class="userText">You: ${text}</p>`;
msg.value="";

let p=document.createElement("p");
messages.appendChild(p);

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:buildPrompt(text)})
});

let data=await res.json();
let reply=data.reply;

if(codeModeActive && !reply.includes("```")){
reply="```html\n"+reply+"\n```";
}

let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);

if(m){
createCodeBox(p,m[1]||"html",m[2]);
}else{
fastType(p,"QUADRON : "+reply);
}
}

/* CODE BOX */
function createCodeBox(parent,lang,code){
let box=document.createElement("div");
box.className="codeBox";

box.innerHTML=`
<div class="codeHeader">
<span>&lt;/&gt; ${lang}</span>
<div>
<span class="copyBtn" onclick="copyCode(this)">Copy</span>
<span class="copyBtn" onclick="runCode(this)">Run</span>
<span class="copyBtn" onclick="debugCode(this)">Debug</span>
</div>
</div>
<div class="spinner"></div>
<pre class="codeContent"></pre>
`;

parent.appendChild(box);

let pre=box.querySelector("pre");

let i=0;
let interval=setInterval(()=>{
pre.textContent+=code[i];
i++;
if(i>=code.length){
clearInterval(interval);
box.querySelector(".spinner").remove();
hljs.highlightElement(pre);
}
},0);
}

/* RUN */
function runCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

let original=box.innerHTML;

box.innerHTML=`
<button style="position:absolute;top:5px;right:5px;background:#fff;color:#000;">Back</button>
<iframe style="width:100%;height:250px;"></iframe>
`;

box.querySelector("iframe").srcdoc=code;

box.querySelector("button").onclick=()=>{
box.innerHTML=original;
};
}

/* DEBUG */
async function debugCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:"ONLY FIX CODE\n"+code})
});

let d=await res.json();
let clean=d.reply.replace(/```[\s\S]*?\n|```/g,"");

box.remove();
createCodeBox(messages,"html",clean);
}

</script>

</body>
</html>
