<!DOCTYPE html>
<html>
<head>
<title>Quadron AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0a0a0a;
color:#ffd900;
font-family:Arial;
margin:0;
overflow-x:hidden;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#000;
border-bottom:2px solid #ffd900;
}

#menuBtn{
font-size:24px;
cursor:pointer;
}

/* OVERLAY */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
backdrop-filter:blur(6px);
background:rgba(0,0,0,0.4);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:998;
}
#overlay.active{
opacity:1;
pointer-events:auto;
}

/* SIDE PANEL */
#sidePanel{
position:fixed;
top:0;
right:0;
width:270px;
height:100%;
background:#111;
transform:translateX(100%);
transition:.3s;
padding:15px;
display:flex;
flex-direction:column;
justify-content:space-between;
z-index:999;
}
#sidePanel.open{
transform:translateX(0);
}

/* MENU ITEM */
.menuItem{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-radius:8px;
cursor:pointer;
transition:.2s;
}
.menuItem:hover{
background:rgba(255,217,0,0.1);
box-shadow:0 0 12px #ffd900;
}

.menuIcon{
width:18px;
height:18px;
background:#ffd900;
border-radius:4px;
}

/* PROFILE (TOP MENU) */
#menuProfile{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
padding:10px;
border-bottom:1px solid #444;
}

#menuProfile img{
width:40px;
height:40px;
border-radius:50%;
border:2px solid #ffd900;
}

#menuProfileText{
display:flex;
flex-direction:column;
font-size:12px;
}

/* PERSONALITY LIST */
.subMenu{
margin-left:10px;
display:none;
flex-direction:column;
}

.subMenu .menuItem{
font-size:13px;
}

.selectedTick{
margin-left:auto;
color:#ffd900;
}

/* TOGGLE SWITCH */
.switch{
margin-left:auto;
position:relative;
width:40px;
height:20px;
background:#333;
border-radius:20px;
cursor:pointer;
}
.switch::after{
content:"";
position:absolute;
width:16px;
height:16px;
background:#999;
border-radius:50%;
top:2px;
left:2px;
transition:.2s;
}
.switch.active{
background:#ffd900;
}
.switch.active::after{
left:22px;
background:#000;
}

/* CHAT */
#chat{
width:100%;
max-width:800px;
margin:auto;
padding:10px;
box-sizing:border-box;
}

#messages{
background:#111;
border:1px solid #ffd900;
height:65vh;
overflow:auto;
padding:10px;
border-radius:10px;
}

/* INPUT FIX (IMPORTANT) */
#inputArea{
display:flex;
gap:8px;
margin-top:10px;
width:100%;
}

input{
flex:1;
min-width:0;
padding:12px;
background:black;
color:#ffd900;
border:1px solid #ffd900;
border-radius:6px;
}

button{
padding:12px;
white-space:nowrap;
}

/* FOOTER */
.footer{
text-align:center;
font-size:12px;
margin:10px;
}
.footer a{
color:#ffd900;
text-decoration:none;
text-shadow:0 0 8px #ffd900;
}

/* PROFILE PAGE */
#profilePage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
flex-direction:column;
align-items:center;
padding:20px;
z-index:2000;
}

</style>
</head>

<body>

<header>
<h3>Quadron AI</h3>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<!-- SIDE PANEL -->
<div id="sidePanel">

<div>

<!-- USER -->
<div id="menuProfile" onclick="openProfilePage()">
<img id="profilePic">
<div id="menuProfileText">
<div id="profileName"></div>
<div id="profileEmail"></div>
</div>
</div>

<!-- MENU ITEMS -->
<div class="menuItem" onclick="newChat()"><div class="menuIcon"></div>New Chat</div>
<div class="menuItem"><div class="menuIcon"></div>Voice Mode</div>
<div class="menuItem"><div class="menuIcon"></div>Quadron 7</div>

<!-- PERSONALITY -->
<div class="menuItem" onclick="togglePersonality()">
<div class="menuIcon"></div>Personality Swap
</div>

<div class="subMenu" id="personalityMenu"></div>

<!-- TRUTH PROTOCOL -->
<div class="menuItem">
<div class="menuIcon"></div>Truth Protocol
<div class="switch" id="truthToggle" onclick="toggleTruth(event)"></div>
</div>

</div>

</div>

<!-- PROFILE PAGE -->
<div id="profilePage">
<img id="profilePicBig" style="width:80px;border-radius:50%;border:2px solid #ffd900;">
<h3 id="profileNameBig"></h3>
<p id="profileEmailBig"></p>

<p style="text-align:center;">
Quadron AI can make mistakes , By using it you agree our 
<a href="terms.html" style="color:#ffd900;">Terms & Conditions</a>
</p>

<button onclick="logout()">Logout</button>
<button onclick="closeProfilePage()">Back</button>
</div>

<!-- CHAT -->
<div id="chat">
<div id="messages"></div>
<div id="loader">Quadron thinking...</div>

<div id="inputArea">
<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>
</div>
</div>

<div class="footer">
Quadron AI can make mistakes , By using it you agree our 
<a href="terms.html">Terms & Conditions</a>
</div>

<script>

/* MENU */
function openMenu(){
sidePanel.classList.add("open")
overlay.classList.add("active")
}
function closeMenu(){
sidePanel.classList.remove("open")
overlay.classList.remove("active")
}

/* PROFILE PAGE */
function openProfilePage(){
document.getElementById("profilePage").style.display="flex"
closeMenu()
}
function closeProfilePage(){
document.getElementById("profilePage").style.display="none"
}

/* USER */
let username=null,userEmail=null

const user=JSON.parse(localStorage.getItem("quadronUser")||"{}")

if(user.email){
username=user.name
userEmail=user.email

profilePic.src=user.picture||"https://cdn-icons-png.flaticon.com/512/149/149071.png"
profilePic.style.display="block"

profileName.innerText=username
profileEmail.innerText=userEmail

profilePicBig.src=profilePic.src
profileNameBig.innerText=username
profileEmailBig.innerText=userEmail
}

/* PERSONALITY */
const personalities=["Alpha","Beta","Gamma","Omega","Delta","Sigma","Zeta","Quadron Main"]
let selectedPersonality="Quadron Main"

function togglePersonality(){
let menu=document.getElementById("personalityMenu")
menu.style.display = menu.style.display==="flex"?"none":"flex"
}

const pMenu=document.getElementById("personalityMenu")

personalities.forEach(p=>{
let div=document.createElement("div")
div.className="menuItem"
div.innerHTML='<div class="menuIcon"></div>'+p+'<span class="selectedTick">'+(p==="Quadron Main"?"✔":"")+'</span>'
div.onclick=()=>{
selectedPersonality=p
updatePersonalityUI()
}
pMenu.appendChild(div)
})

function updatePersonalityUI(){
[...pMenu.children].forEach(el=>{
el.querySelector(".selectedTick").innerText=
el.innerText.includes(selectedPersonality)?"✔":""
})
}

/* TRUTH */
let truthMode=false
function toggleTruth(e){
e.stopPropagation()
truthMode=!truthMode
document.getElementById("truthToggle").classList.toggle("active",truthMode)
}

/* NEW CHAT */
function newChat(){
messages.innerHTML=""
closeMenu()
}

/* LOGOUT */
function logout(){
localStorage.removeItem("quadronUser")
location.href="index.html"
}

/* TIME GREETING */
function getTimeContext(){
let h=new Date().getHours()
if(h<12)return "morning"
if(h<18)return "afternoon"
return "night"
}

/* API */
async function askAI(message){

let personalityPrompt=`Respond as ${selectedPersonality} personality: ultra intelligent, sarcastic, universe aware.`
let truthPrompt= truthMode ? "Use pure logic, no emotions, no sugarcoating, only sharp sarcasm." : ""

let fullPrompt = `
${personalityPrompt}
${truthPrompt}
User message: ${message}
`

const res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:fullPrompt})
})

let data=await res.json()
return data.reply
}

/* INIT */
window.onload=async function(){

let intro=`It is ${getTimeContext()}. Give a short sarcastic greeting.`

let reply=await askAI(intro)

let p=document.createElement("p")
p.innerHTML="<b>Quadron:</b> "+reply
messages.appendChild(p)
}

/* SEND */
async function send(){

let text=msg.value.trim()
if(!text)return

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`
msg.value=""

let reply=await askAI(text)

messages.innerHTML+=`<p><b>Quadron:</b> ${reply}</p>`
messages.scrollTop=messages.scrollHeight
}

</script>

</body>
</html>
