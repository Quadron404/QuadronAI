<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;}
canvas{background:white;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>

<header>
<div>Quadron AI</div>
<div id="menuBtn">☰</div>
</header>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<script>
const messages=document.getElementById("messages");
let evaluateMode=false;
let chartCount=0;

/* FORMAT */
function formatText(text){
  return text.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>");
}

/* CLEAN AI GRAPH CODE */
function cleanGraphCode(code, canvasId){
  if(!code) return null;

  // remove ``` blocks if any
  code = code.replace(/```javascript|```/g,"");

  // replace any ctx with our canvas
  code = code.replace(/document\.getElementById\(["'].*?["']\)/g,
    `document.getElementById("${canvasId}")`);

  // ensure ctx exists
  if(!code.includes("getContext")){
    code = `
      const ctx = document.getElementById("${canvasId}").getContext("2d");
      ${code}
    `;
  }

  return code;
}

/* SEND */
async function send(){
let text=msg.value.trim();
if(!text)return;

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`;
msg.value="";

/* EVALUATE MODE */
if(evaluateMode){

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text,evaluate:true})
});

let data=await res.json();

/* TEXT */
let p=document.createElement("p");
p.innerHTML="<b>Quadron:</b> "+formatText(data.reply);
messages.appendChild(p);

/* GRAPH FIX */
if(data.graph){

chartCount++;
let canvasId="chart_"+chartCount;

let canvas=document.createElement("canvas");
canvas.id=canvasId;
messages.appendChild(canvas);

let fixedCode = cleanGraphCode(data.graph, canvasId);

try{
new Function(fixedCode)();
}catch(e){
console.log("Graph error:", e);

/* fallback simple chart */
const ctx = canvas.getContext("2d");
new Chart(ctx,{
type:"bar",
data:{
labels:["Data"],
datasets:[{label:"Fallback",data:[1]}]
}
});
}

}

}else{

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

let data=await res.json();

let p=document.createElement("p");
p.innerHTML="<b>Quadron:</b> "+formatText(data.reply);
messages.appendChild(p);
}

messages.scrollTop=messages.scrollHeight;
}

/* TOGGLE */
document.getElementById("menuBtn").onclick=()=>{
evaluateMode=!evaluateMode;
messages.innerHTML="<b>Quadron:</b> 🔎 Evaluate Mode "+(evaluateMode?"ON":"OFF");
};

msg.addEventListener("keydown",e=>{if(e.key==="Enter")send();});
</script>

</body>
</html>
