<!DOCTYPE html>
<html>
<head>
<title>Quadron AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0a0a0a;
color:#ffd900;
font-family:Arial;
margin:0;
}

/* BLUR */
.blur{
filter:blur(5px);
pointer-events:none;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:12px;
background:#000;
border-bottom:2px solid #ffd900;
box-shadow:0 0 12px #ffd900;
}

#logo{
font-weight:bold;
font-size:18px;
}

#menuBtn{cursor:pointer;font-size:22px;}

/* OVERLAY */
#overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:900;
}

/* SIDE PANEL */
#sidePanel{
position:fixed;
right:0;
top:0;
width:260px;
height:100%;
background:#111;
transform:translateX(100%);
transition:.3s;
padding:15px;
z-index:1000;
}
#sidePanel.open{transform:translateX(0);}

/* PROFILE TOP */
#menuProfile{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-bottom:1px solid #333;
}

#menuProfile img{
width:40px;
height:40px;
border-radius:50%;
border:1px solid #ffd900;
}

/* MENU ITEM */
.menuItem{
padding:10px;
cursor:pointer;
background:rgba(255,217,0,0.08);
box-shadow:0 0 6px #ffd900;
margin-top:8px;
}
.menuItem:hover{
box-shadow:0 0 25px #ffd900;
}

/* SWITCH */
.switch{
margin-left:auto;
width:40px;height:20px;
background:#333;border-radius:20px;
position:relative;
}
.switch::after{
content:"";position:absolute;width:16px;height:16px;
background:#999;border-radius:50%;
top:2px;left:2px;transition:.2s;
}
.switch.active{background:#ffd900;}
.switch.active::after{left:22px;background:#000;}

#truthInfoBtn{
margin-left:6px;
cursor:pointer;
}

/* CHAT */
#chat{
max-width:800px;
margin:auto;
padding:10px;
}

#messages{
height:65vh;
overflow:auto;
background:#111;
padding:10px;
border:1px solid #ffd900;
box-shadow:0 0 15px #ffd900;
border-radius:12px;
}

/* INPUT */
#inputArea{
display:flex;
gap:8px;
margin-top:10px;
}

input{
flex:1;
padding:10px;
background:black;
color:#ffd900;
border:1px solid #ffd900;
border-radius:10px;
}

/* BUTTON */
button{
padding:10px;
background:#ffd900;
color:#000;
border:none;
box-shadow:0 0 12px #ffd900;
cursor:pointer;
}

/* CODE BOX */
.codeBox{
background:#000;
border:1px solid #ffd900;
margin-top:8px;
box-shadow:0 0 10px #ffd900;
border-radius:8px;
}

.codeHeader{
display:flex;
justify-content:space-between;
padding:6px 10px;
background:#111;
font-size:12px;
border-bottom:1px solid #ffd900;
}

.copyBtn{
cursor:pointer;
}

.codeContent{
padding:10px;
overflow:auto;
font-family:monospace;
color:#00ffcc;
white-space:pre;
}

/* FOOTER */
.footer{
text-align:center;
font-size:12px;
margin:10px;
}
.footer a{
color:#ffd900;
text-decoration:none;
}

</style>
</head>

<body>

<header>
<div id="logo">Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<!-- SIDE PANEL -->
<div id="sidePanel">

<div id="menuProfile">
<img src="https://via.placeholder.com/40">
<div>
<div id="profileName"></div>
<div style="font-size:12px;" id="profileEmail"></div>
</div>
</div>

<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="location.href='voice.html'">Voice Mode</div>
<div class="menuItem" onclick="location.href='quadron7.html'">Quadron 7</div>

<div class="menuItem">
Truth Protocol
<span id="truthInfoBtn" onclick="openTruthInfo()">i</span>
<div class="switch" id="truthToggle" onclick="toggleTruth(event)"></div>
</div>

</div>

<!-- CHAT -->
<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<div class="footer">
Quadron AI can make mistakes, By using it you agree our 
<a href="terms.html">Terms & Conditions</a>
</div>

<script>

/* MENU */
function openMenu(){
sidePanel.classList.add("open");
overlay.style.display="block";
document.body.classList.add("blur");
}
function closeMenu(){
sidePanel.classList.remove("open");
overlay.style.display="none";
document.body.classList.remove("blur");
}

/* USER (ALLOW GUEST) */
let user=JSON.parse(localStorage.getItem("quadronUser")||"{}")

if(!user.name){
user={name:"Guest User",email:"Guest Mode"}
}

profileName.innerText=user.name
profileEmail.innerText=user.email

/* TRUTH */
let truthMode=false
function toggleTruth(e){
e.stopPropagation()
truthMode=!truthMode
truthToggle.classList.toggle("active",truthMode)
}

/* CODE DETECTION */
function detectLang(code){
if(code.startsWith("<")) return "HTML"
if(code.includes("def ")) return "Python"
if(code.includes("console.log")) return "JavaScript"
if(code.includes("#include")) return "C/C++"
if(code.includes("public class")) return "Java"
return "Code"
}

function createCodeBox(code){
let lang=detectLang(code)
return `
<div class="codeBox">
<div class="codeHeader">
<span>${lang}</span>
<span class="copyBtn" onclick="copyCode(this)">Copy</span>
</div>
<div class="codeContent">${code.replace(/</g,"&lt;")}</div>
</div>`
}

function formatText(text){
text=text.replace(/```([\s\S]*?)```/g,(m,c)=>createCodeBox(c))
return text.replace(/\n/g,"<br>")
}

function copyCode(btn){
let code=btn.parentElement.nextElementSibling.innerText
navigator.clipboard.writeText(code)
btn.innerText="Copied!"
setTimeout(()=>btn.innerText="Copy",1500)
}

/* FIXED TYPE (NO BREAKING HTML) */
function typeText(text,el){
el.innerHTML="<b>Quadron:</b> "
let i=0

let interval=setInterval(()=>{
el.innerHTML="<b>Quadron:</b> "+formatText(text.slice(0,i))
i++
if(i>text.length) clearInterval(interval)
},10)
}

/* AI */
async function askAI(message){

let truth=truthMode?
"Answer with strict logic, scientific reasoning, no emotions. ":""

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:`${truth}User: ${message}`})
})

let data=await res.json()
return data.reply
}

/* GREETING (NO TIME/WEATHER) */
window.onload=async()=>{
let reply=await askAI("Give a short sarcastic greeting.")
let p=document.createElement("p")
messages.appendChild(p)
typeText(reply,p)
}

/* ENTER SEND */
msg.addEventListener("keydown",function(e){
if(e.key==="Enter") send()
})

/* SEND */
async function send(){

let text=msg.value.trim()
if(!text)return

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`
msg.value=""

let p=document.createElement("p")
messages.appendChild(p)

let reply=await askAI(text)
typeText(reply,p)
}

/* NEW CHAT */
function newChat(){messages.innerHTML=""}

</script>

</body>
</html>
