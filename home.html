<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
.blur-bg{filter:blur(6px);}

/* HEADER */
header{
display:flex;justify-content:space-between;align-items:center;
padding:12px;background:#000;border-bottom:2px solid #ffd900;
box-shadow:0 0 12px #ffd900;
}
#logo{font-weight:bold;font-size:18px;}

/* MENU */
#overlay{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.4);display:none;z-index:900;
}
#sidePanel{
position:fixed;right:0;top:0;width:260px;height:100%;
background:#111;transform:translateX(100%);
transition:.3s;padding:15px;z-index:1000;
display:flex;flex-direction:column;justify-content:space-between;
}
#sidePanel.open{transform:translateX(0);}

.menuItem{
padding:10px;cursor:pointer;margin-top:8px;
font-weight:bold;color:#ffd900;
}
.menuItem:hover{text-shadow:0 0 10px #ffd900;}

.menuFooter{color:white;font-size:12px;}
.menuFooter span{color:#ffd900;text-shadow:0 0 10px #ffd900;}

/* CHAT */
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{
height:65vh;overflow:auto;background:#111;padding:10px;
border:1px solid #ffd900;border-radius:12px;
box-shadow:0 0 10px #ffd900 inset;
}

/* INPUT */
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{
flex:1;padding:10px;background:black;color:#ffd900;
border:1px solid #ffd900;border-radius:10px;
}

/* BUTTON */
button{
padding:8px 14px;
background:none;
border:1px solid #ffd900;
color:#ffd900;
border-radius:6px;
cursor:pointer;
text-shadow:0 0 8px #ffd900; /* ✅ glow text only */
}

/* CODE BOX */
.codeBox{
background:#000;border:1px solid #ffd900;
margin-top:10px;border-radius:8px;overflow:hidden;
position:relative;
}
.codeHeader{
display:flex;justify-content:space-between;
align-items:center;padding:6px 10px;background:#111;
border-bottom:1px solid #ffd900;font-size:12px;
}
.codeLang{transition:0.2s;}
.codeBtns button{margin-left:5px;}
.codeContent{padding:10px;white-space:pre;overflow:auto;}

/* SPINNER */
.spinner{
position:absolute;width:16px;height:16px;
border:3px solid #ffd900;border-top:3px solid transparent;
border-radius:50%;animation:spin 1s linear infinite;
top:8px;left:8px;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* FOOTER */
.footer{
text-align:center;font-size:13px;margin:10px;color:white;
}
.footer a{
color:#ffd900;text-decoration:none;
text-shadow:0 0 10px #ffd900;
}
</style>
</head>

<body>

<header>
<div id="logo">Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">
<div>
<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="codeMode()">Code /</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI()">Evaluate</div>
</div>

<div class="menuFooter">
Developed by <span>Rawat Systems</span>
</div>
</div>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<div class="footer">
Quadron AI can make mistakes, by using it you agree our 
<a href="terms.html">Terms & Conditions</a>
</div>

<script>
const messages=document.getElementById("messages");
const chat=document.getElementById("chat");

/* MENU FIX */
function openMenu(){
sidePanel.classList.add("open");
overlay.style.display="block";
chat.classList.add("blur-bg");
}
function closeMenu(){
sidePanel.classList.remove("open");
overlay.style.display="none";
chat.classList.remove("blur-bg");
}

/* MODES */
let explore=false;
let evaluate=false;

/* TEXT */
function formatText(t){
return t.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>");
}

/* TYPE */
function typeText(el,text){
let span=document.createElement("span");
el.innerHTML="<b>Quadron:</b> ";
el.appendChild(span);

let i=0;
function t(){
span.innerHTML=formatText(text.slice(0,i));
i+=2;
if(i<=text.length) requestAnimationFrame(t);
}
t();
}

/* CODE BOX */
function renderCode(container,reply){

let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);
if(!m) return false;

let lang=m[1]||"text";
let code=m[2];

container.innerHTML="<b>Quadron:</b>";

let box=document.createElement("div");
box.className="codeBox";

let header=document.createElement("div");
header.className="codeHeader";

header.innerHTML=`
<span class="codeLang">&lt;/&gt; ${lang}</span>
<div class="codeBtns">
<button onclick="copyCode(this)">Copy</button>
<button onclick="runCode(this)">Execute</button>
<button onclick="debugCode(this)">Debug</button>
</div>`;

let content=document.createElement("pre");
content.className="codeContent";

let spinner=document.createElement("div");
spinner.className="spinner";

box.appendChild(header);
box.appendChild(spinner);
box.appendChild(content);
container.appendChild(box);

let langEl=header.querySelector(".codeLang");
langEl.style.marginLeft="20px";

/* TYPE */
let i=0;
function tc(){
content.textContent+=code[i];
i++;
if(i<code.length){
requestAnimationFrame(tc);
}else{
spinner.remove();
langEl.style.marginLeft="0px";
hljs.highlightElement(content);
}
}
tc();

return true;
}

/* COPY */
function copyCode(btn){
let code=btn.closest(".codeBox").querySelector("pre").textContent;
navigator.clipboard.writeText(code);
}

/* EXECUTE */
function runCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

if(btn.innerText==="Back"){
box.innerHTML="";
renderCode(box.parentElement,"```html\n"+code+"\n```");
return;
}

let iframe=document.createElement("iframe");
iframe.style.width="100%";
iframe.style.height="250px";
iframe.srcdoc=code;

box.innerHTML="";
box.appendChild(iframe);
btn.innerText="Back";
}

/* DEBUG */
async function debugCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

let res=await fetch("/api/debug",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({code})
});

let data=await res.json();

/* replace same box */
box.innerHTML="";
renderCode(box.parentElement,"```html\n"+data.fixed+"\n```");
}

/* SEND */
async function send(){

let text=msg.value.trim();
if(!text) return;

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`;
msg.value="";

let p=document.createElement("p");
messages.appendChild(p);

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:text,
explore:explore,
evaluate:evaluate
})
});

let data=await res.json();

if(!renderCode(p,data.reply)){
typeText(p,data.reply);
}

messages.scrollTop=messages.scrollHeight;
}

/* MODES */
function newChat(){
messages.innerHTML="";
explore=false;
evaluate=false;
closeMenu(); // ✅ always close
}

function codeMode(){
messages.innerHTML="";
closeMenu();
}

function exploreMode(){
messages.innerHTML="";
explore=true;
closeMenu(); // ✅ fixed
}

function evaluateModeUI(){
messages.innerHTML="";
evaluate=true;
closeMenu(); // ✅ fixed
}

/* ENTER */
msg.addEventListener("keydown",e=>{
if(e.key==="Enter") send();
});
</script>

</body>
</html>
