<!DOCTYPE html>
<html>
<head>
<script src="https://quge5.com/88/tag.min.js" data-zone="228883" async data-cfasync="false"></script>

<meta charset="UTF-8">
<title>Quadron AI</title>
<link rel="icon" href="favicon.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
/* UI STYLES - STABILIZED */
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;transition:.3s; overflow-x: hidden;}
.blur-bg{filter:blur(6px);}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 15px #ffd900; position: sticky; top: 0; z-index: 100;}
header div:first-child{font-weight:bold;text-shadow:0 0 15px #ffd900;}
#menuBtn{cursor:pointer;font-size:24px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:500;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}
#menuProfile{display:flex;gap:10px;padding:10px;border-bottom:1px solid #333;}
#menuProfile img{width:40px;height:40px;border-radius:50%;border:2px solid #ffd900;}
#profileName{font-weight:bold;color:#ffd900;}
#chat{max-width:800px;margin:auto;padding:10px; display: flex; flex-direction: column;}
#messages{height:65vh;overflow-y:auto;background:#111;padding:15px;border:1px solid #ffd900;border-radius:12px;box-shadow:0 0 20px #ffd900; margin-bottom: 10px;}
#inputArea{display:flex;gap:8px;}
input{flex:1;padding:12px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px; outline: none;}
button{padding:10px 20px;background:#ffd900;color:#000;border:none;cursor:pointer;border-radius:20px;font-weight: bold;}
.userText{color:#ffd900; margin-bottom: 10px; font-weight: bold;}
.aiText{color:#fff; margin-bottom: 15px; line-height: 1.4;}
.sourceBox {display: block; margin: 15px 0; padding: 15px; border: 1px solid #ffd900; border-radius: 12px; background: rgba(255, 217, 0, 0.05); text-align: center;}
.sourceTitle {font-size: 10px; letter-spacing: 1px; color: #ffd900; margin-bottom: 10px; opacity: 0.8;}
</style>
</head>

<body>

<header>
  <div>Quadron AI</div>
  <div id="menuBtn">☰</div>
</header>

<div id="overlay"></div>

<div id="sidePanel">
  <div id="menuProfile">
    <img id="profilePic" src="https://via.placeholder.com/40">
    <div>
      <div id="profileName">Guest</div>
      <div id="profileEmail"></div>
    </div>
  </div>
  <div class="menuItem" id="newChatBtn">New Chat</div>
  <div class="menuItem" id="codeModeBtn">Code /</div>
  <div class="menuItem" id="exploreModeBtn">Explore</div>
  <div id="chatHistory" style="margin-top:15px;overflow:auto;max-height:300px;"></div>
</div>

<div id="chat">
  <div id="messages"></div>
  <div id="inputArea">
    <input id="msg" placeholder="Type here....." autocomplete="off">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
let aiReplyCount = 0;
let currentChatId = null;
let isFirstMessage = true;
let currentMessages = [];

const messages = document.getElementById("messages");
const msg = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");

// --- UTILITY FUNCTIONS ---
function fastType(el, text) {
  let span = document.createElement("span");
  span.className = "aiText";
  el.appendChild(span);
  let j = 0;
  let interval = setInterval(() => {
    span.innerHTML += text[j++];
    if (j >= text.length) {
      clearInterval(interval);
      messages.scrollTop = messages.scrollHeight;
    }
  }, 15);
}

// --- MULTITAG AD FUNCTION ---
function insertChatAd() {
  const adId = "ad_" + Date.now();
  const adContainer = document.createElement("div");
  adContainer.className = "sourceBox";
  adContainer.innerHTML = `
    <div class="sourceTitle">SPONSORED CONTENT</div>
    <div id="${adId}" style="min-height:50px; width:100%;"></div>
  `;
  messages.appendChild(adContainer);

  // Force-injecting the Multitag script into the specific div
  const s = document.createElement("script");
  s.src = "https://quge5.com/88/tag.min.js";
  s.dataset.zone = "228883";
  s.dataset.cfasync = "false";
  s.async = true;
  
  document.getElementById(adId).appendChild(s);
  
  // Note: If the box stays empty, the Multitag chose to trigger a 
  // Popunder (background) instead of a visible banner.
  messages.scrollTop = messages.scrollHeight;
}

// --- CORE CHAT FUNCTIONS ---
async function autoGreeting() {
  if(sessionStorage.getItem("greeted")) return;
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: "Say a quick sarcastic hello"})
    });
    const data = await res.json();
    const p = document.createElement("p");
    messages.appendChild(p);
    fastType(p, "Quadron: " + data.reply);
    sessionStorage.setItem("greeted", "true");
  } catch(e) { console.error("Greeting failed"); }
}

async function send() {
  const text = msg.value.trim();
  if(!text) return;

  // Add User Message
  const uP = document.createElement("p");
  uP.className = "userText";
  uP.textContent = "You: " + text;
  messages.appendChild(uP);
  msg.value = "";

  // Prepare AI Response Placeholder
  const aiP = document.createElement("p");
  messages.appendChild(aiP);
  messages.scrollTop = messages.scrollHeight;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    fastType(aiP, "Quadron: " + data.reply);
    
    aiReplyCount++;
    // Check for Ad trigger every 3 replies
    if(aiReplyCount % 3 === 0) {
      setTimeout(insertChatAd, 1000);
    }
  } catch(e) { 
    aiP.textContent = "Quadron: Connection lost. Try again."; 
  }
}

// --- EVENT LISTENERS ---
document.addEventListener("DOMContentLoaded", () => {
  // Fix for Send Button
  sendBtn.onclick = (e) => {
    e.preventDefault();
    send();
  };

  // Enter Key Fix
  msg.addEventListener("keypress", (e) => {
    if(e.key === "Enter") send();
  });

  // Sidebar Logic
  document.getElementById("menuBtn").onclick = () => {
    document.getElementById("sidePanel").classList.add("open");
    document.getElementById("overlay").style.display = "block";
  };
  
  document.getElementById("overlay").onclick = () => {
    document.getElementById("sidePanel").classList.remove("open");
    document.getElementById("overlay").style.display = "none";
  };

  autoGreeting();
});
</script>

</body>
</html>
