<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<link rel="icon" href="favicon.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
body {
  background:#0a0a0a;
  color:#ffd900;
  font-family:Arial;
  margin:0;
  transition:.3s;
}

.blur-bg { filter:blur(6px); }

header {
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#000;
  border-bottom:2px solid #ffd900;
  box-shadow:0 0 15px #ffd900;
}

header div:first-child {
  font-weight:bold;
  text-shadow:0 0 15px #ffd900;
}

#menuBtn { cursor:pointer; font-size:24px; }

#overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:500;
}

#sidePanel {
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#111;
  transform:translateX(100%);
  transition:.3s;
  padding:15px;
  z-index:1000;
  display:flex;
  flex-direction:column;
}

#sidePanel.open { transform:translateX(0); }

.menuItem {
  padding:10px;
  cursor:pointer;
  margin-top:8px;
  font-weight:bold;
  text-shadow:0 0 10px #fff;
}

.menuFooter {
  margin-top:auto;
  text-align:center;
  font-size:12px;
  position:relative;
  bottom:10px;
}

.menuFooter {
  color:#fff;
  text-shadow:0 0 8px #fff;
}

.menuFooter span {
  color:#ffd900;
  text-shadow:0 0 12px #ffd900;
}

#chat {
  max-width:800px;
  margin:auto;
  padding:10px;
}

#messages {
  height:65vh;
  overflow:auto;
  background:#111;
  padding:10px;
  border:1px solid #ffd900;
  border-radius:12px;
  box-shadow:0 0 20px #ffd900;
}

#inputArea {
  display:flex;
  gap:8px;
  margin-top:10px;
}

input {
  flex:1;
  padding:10px;
  background:black;
  color:#ffd900;
  border:1px solid #ffd900;
  border-radius:10px;
}

button {
  padding:10px;
  background:#ffd900;
  color:#000;
  border:none;
  cursor:pointer;
  border-radius:20px;
  box-shadow:0 0 15px #ffd900;
}

.userText { color:#ffd900; }
.aiText { color:#fff; }

.codeBox {
  background:#000;
  border:1px solid #ffd900;
  margin-top:8px;
  border-radius:8px;
  overflow:hidden;
}

.codeHeader {
  display:flex;
  justify-content:space-between;
  padding:6px;
  background:#111;
  font-size:12px;
  border-bottom:1px solid #ffd900;
}

.copyBtn {
  cursor:pointer;
  padding:4px 8px;
  border:1px solid #fff;
  border-radius:4px;
  margin-left:5px;
  color:#fff;
}

.link {
  color:#00bfff;
  text-shadow:0 0 10px #00bfff;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div>Quadron AI</div>
  <div id="menuBtn">☰</div>
</header>

<div id="overlay"></div>

<div id="sidePanel">
  <div class="menuItem" onclick="menuAction(newChat)">New Chat</div>
  <div class="menuItem" onclick="window.open('code.html','_blank')">Code /</div>
  <div class="menuItem" onclick="window.open('explore.html','_blank')">Explore</div>
  <div class="menuItem" onclick="voiceMode()">Voice Mode</div>

  <div class="menuFooter">
    Developed by <span>Rawat Systems</span>
  </div>
</div>

<div id="chat">
  <div id="messages"></div>
  <div id="inputArea">
    <input id="msg" placeholder="Type here.....">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

/* DAILY LIMIT SYSTEM */
function checkLimit(){
  let data = JSON.parse(localStorage.getItem("limitData")) || {count:0,time:Date.now()};
  
  if(Date.now() - data.time > 86400000){
    data = {count:0,time:Date.now()};
  }

  if(data.count >= 100){
    messages.innerHTML += `<p class="aiText">Quadron: Daily limit exceeded</p>`;
    return false;
  }

  data.count++;
  localStorage.setItem("limitData", JSON.stringify(data));
  return true;
}

/* MENU */
menuBtn.onclick = ()=>{ sidePanel.classList.add("open"); overlay.style.display="block"; }
overlay.onclick = ()=>{ sidePanel.classList.remove("open"); overlay.style.display="none"; }

function menuAction(fn){
  sidePanel.classList.remove("open");
  overlay.style.display="none";
  fn();
}

/* LINK DETECTOR */
function formatText(text){
  return text.replace(/(https?:\/\/[^\s]+)/g, url =>
    `<span class="link" onclick="window.open('${url}')">${url}</span>`
  );
}

/* CODE DETECTOR */
function renderResponse(text){
  if(text.includes("```")){
    let code = text.split("```")[1];

    return `
    <div class="codeBox">
      <div class="codeHeader">
        <span>Code</span>
        <div>
          <span class="copyBtn" onclick="copyCode(this)">Copy</span>
          <span class="copyBtn">Run</span>
          <span class="copyBtn">Debug</span>
        </div>
      </div>
      <pre><code>${code}</code></pre>
    </div>`;
  }
  return formatText(text);
}

/* COPY */
function copyCode(el){
  let code = el.closest(".codeBox").innerText;
  navigator.clipboard.writeText(code);
  el.innerText = "Copied !";
  setTimeout(()=> el.innerText="Copy",1500);
}

/* SEND */
async function send(){
  if(!checkLimit()) return;

  let text = msg.value.trim();
  if(!text) return;

  messages.innerHTML += `<p class="userText">You: ${text}</p>`;
  msg.value = "";

  let p = document.createElement("div");
  messages.appendChild(p);

  let res = await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:text})
  });

  let reply = (await res.json()).reply;
  p.innerHTML = `<div class="aiText">Quadron: ${renderResponse(reply)}</div>`;

  hljs.highlightAll();
}

/* ENTER */
msg.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

</script>

</body>
</html>
