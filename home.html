<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
body{background:#0a0a0a;font-family:Arial;margin:0;color:#fff;}
.blur-bg{filter:blur(6px);}

/* HEADER */
header{
display:flex;justify-content:space-between;
padding:12px;background:#000;
border-bottom:2px solid #ffd900;
}
#menuBtn{cursor:pointer;color:#ffd900;font-size:22px;}

/* MENU */
#overlay{position:fixed;width:100%;height:100%;display:none;background:rgba(0,0,0,0.4);}
#sidePanel{
position:fixed;right:0;top:0;width:260px;height:100%;
background:#111;transform:translateX(100%);
transition:.3s;padding:15px;display:flex;flex-direction:column;
}
#sidePanel.open{transform:translateX(0);}

/* PROFILE */
.profile{
text-align:center;margin-bottom:20px;
}
.profile img{
width:60px;height:60px;border-radius:50%;
border:2px solid #ffd900;
}
.profileName{
color:#ffd900;text-shadow:0 0 10px #ffd900;
}
.profileEmail{font-size:12px;color:#ccc;}

/* MENU ITEMS */
.menuItem{padding:10px;color:#ffd900;cursor:pointer;}
.menuFooter{margin-top:auto;font-size:12px;color:white;}
.menuFooter span{color:#ffd900;text-shadow:0 0 10px #ffd900;}

/* CHAT */
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border-radius:10px;}

/* TEXT GLOW */
.userLabel, .aiLabel{
color:#ffd900;
text-shadow:0 0 12px #ffd900;
font-weight:bold;
}
.userText{
color:#ffd900;
text-shadow:0 0 10px #ffd900;
}
.aiText{
color:#fff;
text-shadow:0 0 10px #fff;
}

/* INPUT */
#inputArea{display:flex;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;}

/* SEND BUTTON */
#sendBtn{
background:#ffd900;color:black;
border:none;padding:10px 16px;
box-shadow:0 0 12px #ffd900;
transition:.3s;
}
#sendBtn:hover{
box-shadow:0 0 30px #ffd900,0 0 60px #ffd900;
}

/* CODE BOX */
.codeBox{background:#000;border:1px solid #ffd900;margin-top:10px;}
.codeHeader{display:flex;justify-content:space-between;background:#111;padding:5px;}
.codeBtns button{
background:none;border:1px solid #ffd900;color:#ffd900;
text-shadow:0 0 8px #ffd900;
margin-left:5px;
}
.codeContent{padding:10px;white-space:pre;}

/* IMAGE DISPLAY */
.imgBox img{
max-width:100%;border-radius:10px;margin-top:8px;
box-shadow:0 0 10px #ffd900;
}
</style>
</head>

<body>

<header>
<div>Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">

<div class="profile">
<img id="avatar" src="https://via.placeholder.com/60">
<div class="profileName" id="name">Guest</div>
<div class="profileEmail" id="email">Not signed in</div>
</div>

<div>
<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="codeMode()">Code /</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateMode()">Evaluate</div>
</div>

<div class="menuFooter">
Developed by <span>Rawat Systems</span>
</div>

</div>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg">
<button id="sendBtn" onclick="send()">Send</button>
</div>
</div>

<script>
let mode="normal";

/* MENU */
function openMenu(){sidePanel.classList.add("open");overlay.style.display="block";}
function closeMenu(){sidePanel.classList.remove("open");overlay.style.display="none";}

/* MODES */
function newChat(){messages.innerHTML="";mode="normal";closeMenu();greet();}
function codeMode(){messages.innerHTML="";mode="code";closeMenu();}
function exploreMode(){messages.innerHTML="";mode="explore";closeMenu();}
function evaluateMode(){messages.innerHTML="";mode="evaluate";closeMenu();}

/* GREETING */
async function greet(){
if(mode!=="normal") return;
let res=await fetch("/api/chat",{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:"sarcastic greeting",mode:"normal"})});
let d=await res.json();
addAI(d.reply);
}

/* ADD MSG */
function addUser(t){
messages.innerHTML+=`<p><span class="userLabel">You:</span> <span class="userText">${t}</span></p>`;
}
function addAI(t){
let p=document.createElement("p");
p.innerHTML=`<span class="aiLabel">Quadron:</span> <span class="aiText">${t}</span>`;
messages.appendChild(p);
}

/* CODE BOX */
function renderCode(code){
let box=document.createElement("div");
box.className="codeBox";
box.innerHTML=`
<div class="codeHeader">
<div>&lt;/&gt;</div>
<div class="codeBtns">
<button onclick="copyCode(this)">Copy</button>
<button onclick="runCode(this)">Execute</button>
<button onclick="debugCode(this)">Debug</button>
</div>
</div>
<pre class="codeContent">${code}</pre>`;
messages.appendChild(box);
}

/* EXECUTE */
function runCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

let iframe=document.createElement("iframe");
iframe.srcdoc=code;

box.innerHTML="";
box.appendChild(iframe);

let back=document.createElement("button");
back.innerText="Back";
back.onclick=()=>{box.innerHTML="";renderCode(code);}
box.appendChild(back);
}

/* DEBUG */
async function debugCode(btn){
let code=btn.closest(".codeBox").querySelector("pre").textContent;
let res=await fetch("/api/debug",{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({code})});
let d=await res.json();
renderCode(d.fixed);
}

/* COPY */
function copyCode(btn){
navigator.clipboard.writeText(btn.closest(".codeBox").querySelector("pre").textContent);
}

/* SEND */
async function send(){
let text=msg.value.trim();
if(!text) return;
addUser(text);
msg.value="";

let res=await fetch("/api/chat",{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text,mode})});

let d=await res.json();

/* CODE MODE FORCE */
if(mode==="code"){
renderCode(d.reply);
}else{
addAI(d.reply);
}

/* IMAGES (EVALUATE MODE) */
if(d.images){
let box=document.createElement("div");
box.className="imgBox";
d.images.forEach(i=>{
let img=document.createElement("img");
img.src=i;
box.appendChild(img);
});
messages.appendChild(box);
}

messages.scrollTop=messages.scrollHeight;
}

/* INIT */
window.onload=()=>greet();
</script>

</body>
</html>
