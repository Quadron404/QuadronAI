<!DOCTYPE html>
<html>
<head>
<script src="https://quge5.com/88/tag.min.js" data-zone="228887" async data-cfasync="false"></script>

<meta charset="UTF-8">
<title>Quadron AI</title>
<link rel="icon" href="favicon.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
/* CORE UI STYLES [cite: 1] */
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;transition:.3s;overflow-x:hidden;}
.blur-bg{filter:blur(6px);}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 15px #ffd900;position:sticky;top:0;z-index:100;}
header div:first-child{font-weight:bold;text-shadow:0 0 15px #ffd900;}
#menuBtn{cursor:pointer;font-size:24px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:500;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}
#menuProfile{display:flex;gap:10px;padding:10px;border-bottom:1px solid #333;cursor:pointer;}
#menuProfile img{width:40px;height:40px;border-radius:50%;border:2px solid #ffd900;box-shadow:0 0 10px #ffd900;}
#profileName{font-weight:bold;color:#ffd900;text-shadow:0 0 10px #ffd900;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow-y:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;box-shadow:0 0 20px #ffd900;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;outline:none;}
button{padding:10px 20px;background:#ffd900;color:#000;border:none;cursor:pointer;border-radius:20px;box-shadow:0 0 15px #ffd900;font-weight:bold;}
.userText{color:#ffd900;text-shadow:0 0 10px #ffd900;margin-bottom:10px;}
.aiText{color:#fff;text-shadow:0 0 10px #fff;margin-bottom:15px;display:block;}
.codeBox{background:#000;border:1px solid #ffd900;border-radius:10px;margin-top:10px;overflow:hidden;}
.sourceBox{display:flex;align-items:center;gap:10px;margin-top:10px;padding:10px;border:1px solid #fff;border-radius:10px;cursor:pointer;box-shadow:0 0 10px #fff;}
</style>
</head>

<body>

<header>
  <div>Quadron AI</div>
  <div id="menuBtn">☰</div>
</header>

<div id="overlay"></div>

<div id="sidePanel">
  <div id="menuProfile">
    <img id="profilePic" src="https://via.placeholder.com/40">
    <div>
      <div id="profileName">Guest</div>
      <div id="profileEmail" style="font-size:12px;"></div>
    </div>
  </div>
  <div class="menuItem" id="newChatBtn">New Chat</div>
  <div class="menuItem" id="codeModeBtn">Code /</div>
  <div class="menuItem" id="exploreModeBtn">Explore</div>
  <div id="chatHistory" style="margin-top:15px;overflow:auto;max-height:300px;"></div>
</div>

<div id="chat">
  <div id="messages"></div>
  <div id="inputArea">
    <input id="msg" placeholder="Type here....." autocomplete="off">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
// --- GLOBAL VARIABLES ---
let currentChatId = null;
let isFirstMessage = true;
let db;
let currentMessages = [];
let mode = "normal";

const messages = document.getElementById("messages");
const msg = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");

// --- DATABASE SETUP [cite: 21, 22, 23] ---
let req = indexedDB.open("quadronDB", 1);
req.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("chats", { keyPath: "id" });
};
req.onsuccess = e => {
  db = e.target.result;
  loadChatList();
};

// --- CHAT LOGIC ---
function fastType(el, text) {
  let span = document.createElement("span");
  span.className = "aiText";
  el.appendChild(span);
  let j = 0;
  let interval = setInterval(() => {
    span.innerHTML += text[j++];
    if (j >= text.length) {
      clearInterval(interval);
      messages.scrollTop = messages.scrollHeight;
    }
  }, 5);
}

async function send() {
  let text = msg.value.trim();
  if (!text) return;

  if (isFirstMessage) {
    currentChatId = "chat_" + Date.now();
    isFirstMessage = false;
  }

  messages.innerHTML += `<p class="userText">You: ${text}</p>`;
  currentMessages.push({ role: "user", content: text });
  msg.value = "";
  messages.scrollTop = messages.scrollHeight;

  let p = document.createElement("p");
  messages.appendChild(p);

  try {
    let res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });
    let data = await res.json();
    fastType(p, "Quadron: " + data.reply);
    currentMessages.push({ role: "ai", content: data.reply });
  } catch (e) {
    p.innerHTML = "<span class='aiText'>Quadron: Error connecting to server.</span>";
  }
}

async function autoGreeting() {
  if (sessionStorage.getItem("greeted")) return;
  try {
    let res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: "Say a quick sarcastic hello to Guest" })
    });
    let data = await res.json();
    let p = document.createElement("p");
    messages.appendChild(p);
    fastType(p, "Quadron: " + data.reply);
    sessionStorage.setItem("greeted", "true");
  } catch (e) { console.log("Greeting failed"); }
}

// --- EVENT LISTENERS [cite: 38, 98] ---
document.addEventListener("DOMContentLoaded", () => {
  sendBtn.onclick = send;
  msg.onkeydown = (e) => { if (e.key === "Enter") send(); };

  document.getElementById("menuBtn").onclick = () => {
    document.getElementById("sidePanel").classList.add("open");
    document.getElementById("overlay").style.display = "block";
  };

  document.getElementById("overlay").onclick = () => {
    document.getElementById("sidePanel").classList.remove("open");
    document.getElementById("overlay").style.display = "none";
  };

  document.getElementById("newChatBtn").onclick = () => {
    messages.innerHTML = "";
    isFirstMessage = true;
    currentMessages = [];
    document.getElementById("sidePanel").classList.remove("open");
    document.getElementById("overlay").style.display = "none";
  };

  autoGreeting();
});

// Helper for chat list [cite: 27, 28]
function loadChatList() {
  if (!db) return;
  let history = document.getElementById("chatHistory");
  history.innerHTML = "";
  let tx = db.transaction("chats", "readonly");
  let store = tx.objectStore("chats");
  store.openCursor().onsuccess = e => {
    let cursor = e.target.result;
    if (cursor) {
      let div = document.createElement("div");
      div.className = "menuItem";
      div.textContent = cursor.value.title;
      history.appendChild(div);
      cursor.continue();
    }
  };
}
</script>

</body>
</html>
