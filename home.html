<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;}
canvas{background:white;border-radius:10px;margin:15px 0;}
</style>
</head>

<body>

<header>
<div>Quadron AI</div>
<div id="menuBtn">☰</div>
</header>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<script>
const messages=document.getElementById("messages");
let evaluateMode=false;
let chartCount=0;

/* FORMAT */
function formatText(text){
  return text.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>");
}

/* SPLIT PARAGRAPHS */
function splitParas(text){
  return text.split(/\n\s*\n/);
}

/* CREATE REAL CHART */
function createRealChart(data){

  chartCount++;
  let canvas=document.createElement("canvas");
  messages.appendChild(canvas);

  const labels = data.map(d => d.datetime);
  const prices = data.map(d => parseFloat(d.close));

  const ctx = canvas.getContext("2d");

  new Chart(ctx,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"Price",
        data:prices,
        tension:0.3
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{display:true}
      },
      scales:{
        x:{display:false}
      }
    }
  });
}

/* RENDER */
function renderEvaluate(reply, prices){

  const parts = splitParas(reply);

  for(let i=0;i<parts.length;i++){

    let p=document.createElement("p");
    p.innerHTML="<b>Quadron:</b> "+formatText(parts[i]);
    messages.appendChild(p);

    /* AFTER PARA 1 → GRAPH */
    if(i===0 && prices && data.showGraph){
  createRealChart(prices);
}

    /* AFTER PARA 2 → SECOND GRAPH */
    if(i===1 && prices){
      createRealChart(prices);
    }
  }
}

/* SEND */
async function send(){
let text=msg.value.trim();
if(!text)return;

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`;
msg.value="";

if(evaluateMode){

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text,evaluate:true})
});

let data=await res.json();

renderEvaluate(data.reply, data.prices,data );

}else{

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

let data=await res.json();

let p=document.createElement("p");
p.innerHTML="<b>Quadron:</b> "+formatText(data.reply);
messages.appendChild(p);
}

messages.scrollTop=messages.scrollHeight;
}

/* TOGGLE */
document.getElementById("menuBtn").onclick=()=>{
evaluateMode=!evaluateMode;
messages.innerHTML="<b>Quadron:</b> 🔎 Evaluate Mode "+(evaluateMode?"ON":"OFF");
};

msg.addEventListener("keydown",e=>{if(e.key==="Enter")send();});
</script>

</body>
</html>
