<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* NO UI CHANGES — ONLY ADDITIONS */

.profilePage{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#000;z-index:2000;
display:none;
justify-content:center;
align-items:center;
}

.profileCard{
padding:30px;
border:2px solid #ffd900;
box-shadow:0 0 40px #ffd900;
text-align:center;
border-radius:15px;
}

.profileCard img{
width:90px;height:90px;border-radius:50%;
border:2px solid #ffd900;
box-shadow:0 0 20px #ffd900;
}

.cylinder{
position:absolute;
right:20px;
top:60px;
padding:6px 14px;
border:2px solid #ffd900;
border-radius:50px;
color:#fff;
text-shadow:0 0 10px #fff;
box-shadow:0 0 15px #ffd900;
font-size:12px;
}

.cyl2{top:100px;}

</style>
</head>

<body>

<header>
<div id="logo">Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">

<div id="menuProfile" onclick="openProfile()">
<img id="profilePic">
<div>
<div id="profileName"></div>
<div style="font-size:12px;" id="profileEmail"></div>
</div>
</div>

<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="location.href='voice.html'">Voice Mode</div>
<div class="menuItem" onclick="location.href='quadron7.html'">Quadron 7</div>
<div class="menuItem" onclick="codeMode()">Code /</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI()">Evaluate</div>

<div class="menuFooter">
Developed by <span>Rawat Systems</span>
</div>

</div>

<div class="profilePage" id="profilePage">
<div class="profileCard">
<img id="pImg"><br><br>
<div id="pName"></div>
<div id="pEmail"></div><br>
<div id="limitText"></div><br>
<button onclick="closeProfile()">Close</button>
</div>
</div>

<div class="cylinder">Real Time Data</div>
<div class="cylinder cyl2">Encyclopedia</div>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

<script>

const messages=document.getElementById("messages");

let user=JSON.parse(localStorage.getItem("quadronUser"));

/* LOAD USER */
if(user && user!=="guest"){
profilePic.src=user.picture||"";
profileName.innerText=user.name||"User";
profileEmail.innerText=user.email||"";
}

/* GREETING ONCE */
if(user && user.email && !localStorage.getItem("greeted")){
localStorage.setItem("greeted","yes");
setTimeout(()=>{
typeText(messages,`Oh great, ${user.name} showed up. Let's pretend I'm excited.`);
},300);
}

/* CHAT LIMIT */
function checkLimit(){
let key="limit_"+user.email;
let data=JSON.parse(localStorage.getItem(key))||{count:0,date:new Date().toDateString()};
if(data.date!==new Date().toDateString()){
data={count:0,date:new Date().toDateString()};
}
if(data.count>=100){
alert("Daily limit reached");
return false;
}
data.count++;
localStorage.setItem(key,JSON.stringify(data));
return true;
}

/* PROFILE */
function openProfile(){
document.getElementById("profilePage").style.display="flex";

pImg.src=user.picture||"";
pName.innerText=user.name||"";
pEmail.innerText=user.email||"";

let data=JSON.parse(localStorage.getItem("limit_"+user.email))||{count:0};
limitText.innerText=`${data.count}/100 used today`;
}

function closeProfile(){
profilePage.style.display="none";
}

/* MENU */
function openMenu(){
sidePanel.classList.add("open");
overlay.style.display="block";
document.body.classList.add("blur-bg");
}
function closeMenu(){
sidePanel.classList.remove("open");
overlay.style.display="none";
document.body.classList.remove("blur-bg");
}

/* MODES */
let exploreActive=false;
let codeModeActive=false;
let evaluateMode=false;

/* PROMPT */
function buildPrompt(t){

if(codeModeActive){
return "ONLY code. "+t;
}

if(exploreActive){
return "Use Wikipedia data. "+t;
}

if(evaluateMode){
return "Use Tavily API real-time data. "+t;
}

return `Sarcastic reply for ${user.name}: `+t;
}

/* TYPE FAST */
function typeText(el,text){
let p=document.createElement("p");
p.innerHTML='<span class="ai">Quadron:</span> <span class="aiText">'+text+'</span>';
el.appendChild(p);
}

/* SEND */
async function send(){

if(user && user.email){
if(!checkLimit()) return;
}

let text=msg.value.trim();
if(!text)return;

messages.innerHTML+=`<p><span class="you">You:</span> ${text}</p>`;
msg.value="";

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:buildPrompt(text),
user:user
})
});

let data=await res.json();
let reply=data.reply;

let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);

if(m){
renderCode(m[2],m[1]||"html");
}else{
typeText(messages,reply);
}
}

/* CODE BOX */
function renderCode(code,lang){

let box=document.createElement("div");
box.className="codeBox";

box.innerHTML=`
<div class="codeHeader">
<span>&lt;/&gt; ${lang}</span>
<span>
<span class="copyBtn" onclick="copyCode(this)">Copy</span>
<span class="copyBtn" onclick="runCode(this)">Run</span>
<span class="copyBtn" onclick="debugCode(this)">Debug</span>
</span>
</div>
<pre class="codeContent"></pre>`;

messages.appendChild(box);

let pre=box.querySelector("pre");
pre.textContent=code;

hljs.highlightElement(pre);
}

/* RUN */
function runCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

box.dataset.code=code;

box.innerHTML=`
<button onclick="restoreCode(this)" style="float:right">Back</button>
<iframe style="width:100%;height:300px;"></iframe>`;

box.querySelector("iframe").srcdoc=code;
}

function restoreCode(btn){
let box=btn.parentElement;
renderCode(box.dataset.code,"html");
box.remove();
}

/* DEBUG */
async function debugCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

let res=await fetch("/api/debug",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({code})
});

let d=await res.json();

box.querySelector("pre").textContent=d.code;
hljs.highlightElement(box.querySelector("pre"));
}

/* MODES */
function codeMode(){
closeMenu();
messages.innerHTML="";
codeModeActive=true;exploreActive=false;evaluateMode=false;
typeText(messages,"Describe what you want to code");
}

function exploreMode(){
closeMenu();
messages.innerHTML="";
exploreActive=true;codeModeActive=false;evaluateMode=false;
typeText(messages,"Explore the universe");
}

function evaluateModeUI(){
closeMenu();
messages.innerHTML="";
evaluateMode=true;codeModeActive=false;exploreActive=false;
typeText(messages,"Evaluate World");
}

function newChat(){
closeMenu();
messages.innerHTML="";
}

/* ENTER */
msg.addEventListener("keydown",e=>{
if(e.key==="Enter") send();
});

</script>
</body>
</html>
