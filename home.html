<!DOCTYPE html>
<html>
<head>
<title>Quadron AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0a0a0a;
color:#ffd900;
font-family:Arial;
margin:0;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:12px;
background:#000;
border-bottom:2px solid #ffd900;
box-shadow:0 0 12px #ffd900;
}

#menuBtn{cursor:pointer;font-size:22px;}

/* SIDE PANEL */
#overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:900;
}

#sidePanel{
position:fixed;
right:0;
top:0;
width:260px;
height:100%;
background:#111;
transform:translateX(100%);
transition:.3s;
padding:15px;
z-index:1000;
}
#sidePanel.open{transform:translateX(0);}

/* PROFILE */
#menuProfile{
display:flex;
gap:10px;
cursor:pointer;
padding:10px;
border-bottom:1px solid #333;
}

/* MENU ITEM */
.menuItem{
display:flex;
align-items:center;
gap:10px;
padding:10px;
cursor:pointer;
transition:.2s;
background:rgba(255,217,0,0.08);
box-shadow:0 0 6px #ffd900;
}
.menuItem:hover{
box-shadow:0 0 25px #ffd900;
}

/* ICON */
.menuIcon img{
width:20px;
filter:drop-shadow(0 0 6px #ffd900);
}

/* SWITCH */
.switch{
margin-left:auto;
width:40px;height:20px;
background:#333;border-radius:20px;
position:relative;
}
.switch::after{
content:"";position:absolute;width:16px;height:16px;
background:#999;border-radius:50%;
top:2px;left:2px;transition:.2s;
}
.switch.active{background:#ffd900;}
.switch.active::after{left:22px;background:#000;}

/* INFO BUTTON */
#truthInfoBtn{
margin-left:auto;
margin-right:6px;
cursor:pointer;
text-shadow:0 0 10px #ffd900;
}

/* CHAT */
#chat{
max-width:800px;
margin:auto;
padding:10px;
}

#messages{
height:65vh;
overflow:auto;
background:#111;
padding:10px;
border:1px solid #ffd900;
box-shadow:0 0 15px #ffd900;
}

/* INPUT */
#inputArea{
display:flex;
gap:8px;
margin-top:10px;
}

input{
flex:1;
padding:10px;
background:black;
color:#ffd900;
border:1px solid #ffd900;
}

/* BUTTON FULL GLOW */
button{
padding:10px;
background:#ffd900;
color:#000;
border:none;
box-shadow:0 0 12px #ffd900;
transition:.2s;
}
button:hover{
box-shadow:0 0 35px #ffd900;
}

/* PROFILE PAGE */
#profilePage{
display:none;
position:fixed;
width:100%;
height:100%;
background:#0a0a0a;
z-index:2000;
align-items:center;
justify-content:center;
flex-direction:column;
gap:15px;
}

/* POPUP */
#truthPopup{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:3000;
align-items:center;
justify-content:center;
}

#truthBox{
background:#111;
padding:20px;
border:1px solid #ffd900;
box-shadow:0 0 20px #ffd900;
text-align:center;
}

pre{
background:#000;
padding:10px;
overflow:auto;
border:1px solid #ffd900;
}

/* FOOTER */
.footer{
text-align:center;
font-size:12px;
margin:10px;
}
.footer a{
color:#ffd900;
text-shadow:0 0 10px #ffd900;
text-decoration:none;
}

</style>
</head>

<body>

<header>
<div>Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<!-- SIDE PANEL -->
<div id="sidePanel">

<div id="menuProfile" onclick="openProfilePage()">
<div id="profileName"></div>
</div>

<div class="menuItem" onclick="newChat()">
<div class="menuIcon"><img src="icons/chat.png"></div>New Chat
</div>

<div class="menuItem" onclick="location.href='voice.html'">
<div class="menuIcon"><img src="icons/voice.png"></div>Voice Mode
</div>

<div class="menuItem">
<div class="menuIcon"><img src="icons/quadron.png"></div>Quadron 7
</div>

<div class="menuItem">
<div class="menuIcon"><img src="icons/truth.png"></div>Truth Protocol
<div id="truthInfoBtn" onclick="openTruthInfo()">i</div>
<div class="switch" id="truthToggle" onclick="toggleTruth(event)"></div>
</div>

</div>

<!-- PROFILE PAGE -->
<div id="profilePage">
<h2 id="profileNameBig"></h2>
<p id="profileEmailBig"></p>

<p>
Quadron AI can make mistakes, By using it you agree our 
<a href="terms.html">Terms & Conditions</a>
</p>

<button onclick="logout()">Logout</button>
<button onclick="closeProfilePage()">Back</button>
</div>

<!-- TRUTH POPUP -->
<div id="truthPopup">
<div id="truthBox">
<h3>Truth Protocol</h3>
<p>Pure logic, scientific evidence, zero emotions.</p>
<button onclick="closeTruthInfo()">Close</button>
</div>
</div>

<!-- CHAT -->
<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

<div class="footer">
Quadron AI can make mistakes, By using it you agree our 
<a href="terms.html">Terms & Conditions</a>
</div>

<script>

/* MENU */
function openMenu(){sidePanel.classList.add("open");overlay.style.display="block";}
function closeMenu(){sidePanel.classList.remove("open");overlay.style.display="none";}

/* PROFILE PAGE */
function openProfilePage(){profilePage.style.display="flex";closeMenu();}
function closeProfilePage(){profilePage.style.display="none";}

/* USER / GUEST FIX */
let user=JSON.parse(localStorage.getItem("quadronUser")||"{}")

if(!user.email){
user={name:"Guest777",email:""}
}

profileName.innerText=user.name
profileNameBig.innerText=user.name
profileEmailBig.innerText=user.email || "Guest Mode"

/* TRUTH */
let truthMode=false
function toggleTruth(e){
e.stopPropagation()
truthMode=!truthMode
truthToggle.classList.toggle("active",truthMode)
}

/* POPUP */
function openTruthInfo(){truthPopup.style.display="flex"}
function closeTruthInfo(){truthPopup.style.display="none"}

/* FORMAT */
function formatText(text){
return text.replace(/\n/g,"<br>").replace(/```([\s\S]*?)```/g,'<pre>$1</pre>')
}

/* TYPE */
function typeText(text,el){
let i=0
el.innerHTML="<b>Quadron:</b> "
let int=setInterval(()=>{
el.innerHTML+=text.charAt(i)
i++
if(i>=text.length) clearInterval(int)
},15)
}

/* AI */
async function askAI(message){

let truth=truthMode?
"Explain it in ultra logical way mentioning all mathematical calculations, scientific evidences, discoveries and answer with no emotions, no sugarcoating, pure logic and data.":""

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:`${truth} User: ${message}`})
})

let data=await res.json()
return data.reply
}

/* GREETING */
window.onload=async()=>{
let h=new Date().getHours()
let time=h<12?"morning":h<18?"afternoon":"night"

let reply=await askAI(`Greet sarcastically mentioning ${time} and weather.`)

let p=document.createElement("p")
messages.appendChild(p)
typeText(reply,p)
}

/* SEND */
async function send(){

if(!user.email){
alert("Login required to use Quadron")
return
}

let text=msg.value.trim()
if(!text)return

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`
msg.value=""

let p=document.createElement("p")
messages.appendChild(p)

let reply=await askAI(text)
typeText(reply,p)

}

/* NEW CHAT */
function newChat(){messages.innerHTML=""}

/* LOGOUT */
function logout(){
localStorage.removeItem("quadronUser")
location.href="index.html"
}

</script>

</body>
</html>
