<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}

/* BLUR ONLY BACKGROUND */
.blurBg > *:not(#sidePanel):not(#overlay){
filter:blur(6px);
}

/* HEADER */
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 15px #ffd900;}
#menuBtn{cursor:pointer;font-size:24px;}

/* MENU */
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}

.menuItem{padding:10px;cursor:pointer;margin-top:8px;font-weight:bold;color:#fff;text-shadow:0 0 10px #fff;}

.menuFooter{text-align:center;font-size:12px;margin-top:auto;}
.menuFooter span{color:#fff;text-shadow:0 0 10px #fff;}
.menuFooter b{color:#ffd900;text-shadow:0 0 15px #ffd900;}

/* CHAT */
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;}
.userText{color:#ffd900;}
.aiText{color:#fff;text-shadow:0 0 10px #fff;}

/* CODE */
.codeBox{background:#000;border:1px solid #ffd900;margin-top:8px;border-radius:8px;overflow:hidden;position:relative;}
.codeHeader{display:flex;justify-content:space-between;padding:6px;background:#111;border-bottom:1px solid #ffd900;}

.copyBtn{cursor:pointer;padding:4px 8px;border:1px solid #ffd900;border-radius:4px;margin-left:5px;}

.spinner{
position:absolute;width:20px;height:20px;
border:3px solid #fff;border-top:3px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
top:5px;left:5px;
box-shadow:0 0 15px #fff;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* FOOTER */
.footer{text-align:center;font-size:12px;margin:10px;color:#fff;text-shadow:0 0 10px #fff;}
.footer a{color:#ffd900;text-shadow:0 0 15px #ffd900;text-decoration:none;}
</style>
</head>

<body onclick="globalClick(event)">

<header>
<div>Quadron AI</div>
<div id="menuBtn" onclick="openMenu(event)">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">

<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="codeMode()">Code /</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI()">Evaluate</div>

<div class="menuFooter">
<span>Developed by <b>Rawat Systems</b></span>
</div>

</div>

<div id="messages"></div>

<input id="msg">
<button onclick="send()">Send</button>

<div class="footer">
Quadron AI can make mistakes , by using it you agree our 
<a href="terms.html">Terms & Conditions</a>
</div>

<script>

/* USER */
let user=JSON.parse(localStorage.getItem("quadronUser"));

/* GREETING ALWAYS */
if(user){
fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:`sarcastic greeting for ${user.name}`,user:user.name})})
.then(r=>r.json())
.then(d=>{
messages.innerHTML=`<p class="aiText">Quadron: ${d.reply}</p>`;
});
}

/* MENU */
function openMenu(e){
e.stopPropagation();
sidePanel.classList.add("open");
overlay.style.display="block";
document.body.classList.add("blurBg");
}
function closeMenu(){
sidePanel.classList.remove("open");
overlay.style.display="none";
document.body.classList.remove("blurBg");
}

/* CLICK OUTSIDE CLOSE */
function globalClick(e){
if(!sidePanel.contains(e.target) && !menuBtn.contains(e.target)){
closeMenu();
}
}

/* MODES */
let codeModeActive=false,exploreActive=false,evaluateMode=false;

function reset(){
messages.innerHTML="";
closeMenu();
}

function codeMode(){
reset();
codeModeActive=true;exploreActive=false;evaluateMode=false;
fastType("Quadron: Describe What You Want To Code");
}

function exploreMode(){
reset();
exploreActive=true;codeModeActive=false;
fastType("Quadron: Explore The Universe");
}

function evaluateModeUI(){
reset();
evaluateMode=true;codeModeActive=false;
fastType("Quadron: Evaluate Stars");
}

/* FAST TYPE */
function fastType(text){
let p=document.createElement("p");
p.className="aiText";
messages.appendChild(p);
p.textContent=text;
}

/* SEND */
async function send(){

let text=msg.value.trim();
if(!text)return;

messages.innerHTML+=`<p class="userText">You: ${text}</p>`;
msg.value="";

let prompt=text;
if(codeModeActive) prompt="ONLY_CODE "+text;
if(exploreActive) prompt="WIKI "+text;
if(evaluateMode) prompt="TAVILY "+text;

let res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:prompt,user:user?.name})});

let data=await res.json();
let reply=data.reply;

/* FORCE CODE */
if(codeModeActive && !reply.includes("```")){
reply="```html\n"+reply+"\n```";
}

let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);

if(m){
createCodeBox(m[1]||"html",m[2]);
}else{
fastType("Quadron: "+reply);
}
}

/* CODE BOX */
function createCodeBox(lang,code){
let box=document.createElement("div");
box.className="codeBox";

box.innerHTML=`
<div class="codeHeader">
<span>&lt;/&gt; ${lang}</span>
<div>
<span class="copyBtn" onclick="copyCode(this)">Copy</span>
<span class="copyBtn" onclick="runCode(this)">Run</span>
<span class="copyBtn" onclick="debugCode(this)">Debug</span>
</div>
</div>
<div class="spinner"></div>
<pre></pre>
`;

messages.appendChild(box);

let pre=box.querySelector("pre");
pre.textContent=code;
hljs.highlightElement(pre);
}

/* COPY */
function copyCode(btn){
navigator.clipboard.writeText(btn.closest(".codeBox").querySelector("pre").textContent);
btn.innerText="Copied!";
setTimeout(()=>btn.innerText="Copy",1500);
}

/* RUN */
function runCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

let original=box.innerHTML;

box.innerHTML=`
<button style="position:absolute;top:5px;right:5px;background:#fff;color:#000;">Back</button>
<iframe style="width:100%;height:250px;"></iframe>
`;

box.querySelector("iframe").srcdoc=code;

box.querySelector("button").onclick=()=>{
box.innerHTML=original;
};
}

/* DEBUG */
async function debugCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

let res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:"ONLY_CODE FIX:\n"+code})});

let d=await res.json();
let newCode=d.reply.replace(/```[\s\S]*?\n|```/g,"");

box.remove();
createCodeBox("html",newCode);
}

</script>
</body>
</html>
