<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;transition:.3s;}
.blur{filter:blur(6px);}

/* HEADER */
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 15px #ffd900;}
#menuBtn{cursor:pointer;font-size:24px;}

/* SIDE MENU */
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}

#menuProfile{display:flex;gap:10px;padding:10px;border-bottom:1px solid #333;cursor:pointer;}
#menuProfile img{width:40px;height:40px;border-radius:50%;border:1px solid #ffd900;}

.menuItem{padding:10px;cursor:pointer;margin-top:8px;font-weight:bold;color:#fff;text-shadow:0 0 10px #fff;}

.menuFooter{text-align:center;font-size:12px;margin-top:auto;}
.menuFooter span{color:#fff;text-shadow:0 0 10px #fff;}
.menuFooter b{color:#ffd900;text-shadow:0 0 15px #ffd900;}

/* CHAT */
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;box-shadow:0 0 20px #ffd900;}

/* INPUT */
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}

button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;box-shadow:0 0 20px #ffd900;}

/* TEXT */
.userText{color:#ffd900;text-shadow:0 0 10px #ffd900;}
.aiText{color:#fff;text-shadow:0 0 10px #fff;}

/* CODE */
.codeBox{background:#000;border:1px solid #ffd900;margin-top:8px;border-radius:8px;overflow:hidden;position:relative;}
.codeHeader{display:flex;justify-content:space-between;padding:6px;background:#111;font-size:12px;border-bottom:1px solid #ffd900;}
.copyBtn{cursor:pointer;padding:2px 6px;border:1px solid #ffd900;border-radius:4px;margin-left:5px;}

.spinner{position:absolute;width:20px;height:20px;border:3px solid #fff;border-top:3px solid transparent;border-radius:50%;animation:spin 1s linear infinite;top:8px;right:10px;}
@keyframes spin{100%{transform:rotate(360deg);}}

/* CYLINDER LABEL */
.cylinder{
position:absolute;right:10px;top:60px;
padding:6px 12px;border-radius:20px;
border:2px solid #ffd900;
color:#fff;text-shadow:0 0 10px #fff;
box-shadow:0 0 15px #ffd900;
}

/* FOOTER */
.footer{text-align:center;font-size:12px;margin:10px;color:#fff;text-shadow:0 0 10px #fff;}
.footer a{color:#ffd900;text-shadow:0 0 15px #ffd900;text-decoration:none;}
</style>
</head>

<body>

<header>
<div>Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">

<div id="menuProfile" onclick="openProfilePage()">
<img id="profilePic">
<div>
<div id="profileName"></div>
<div id="profileEmail" style="font-size:12px;"></div>
</div>
</div>

<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="codeMode()">Code /</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI()">Evaluate</div>

<div class="menuFooter">
<span>Developed by <b>Rawat Systems</b></span>
</div>

</div>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<div class="footer">
Quadron AI can make mistakes , by using it you agree our 
<a href="terms.html">Terms & Conditions</a>
</div>

<div id="modeLabel" class="cylinder"></div>

<script>

/* USER */
let user=JSON.parse(localStorage.getItem("quadronUser"));
if(user){
profileName.textContent=user.name;
profileEmail.textContent=user.email;
profilePic.src=user.picture;
}else{
profileName.textContent="Guest";
profilePic.src="https://via.placeholder.com/40";
}

/* CHAT LIMIT */
let usage=JSON.parse(localStorage.getItem("usage")||"{}");
let today=new Date().toDateString();
if(!usage[today]) usage[today]=0;

function checkLimit(){
if(usage[today]>=100){
alert("Daily limit reached");
return false;
}
usage[today]++;
localStorage.setItem("usage",JSON.stringify(usage));
return true;
}

/* GREETING ONCE */
if(user && !localStorage.getItem("greeted")){
messages.innerHTML=`<p class="aiText">QUADRON : Oh look, ${user.name} finally showed up. Try not to break anything.</p>`;
localStorage.setItem("greeted","1");
}

/* MENU */
function openMenu(){
document.body.classList.add("blur");
sidePanel.classList.add("open");
overlay.style.display="block";
}
function closeMenu(){
document.body.classList.remove("blur");
sidePanel.classList.remove("open");
overlay.style.display="none";
}

/* MODES */
let codeModeActive=false,exploreActive=false,evaluateMode=false;

function resetModes(){
messages.innerHTML="";
closeMenu();
}

function codeMode(){
resetModes();
codeModeActive=true;exploreActive=false;evaluateMode=false;
typeSystem("Describe what you want to code");
modeLabel.innerText="</> Code";
}
function exploreMode(){
resetModes();
exploreActive=true;codeModeActive=false;
typeSystem("Explore the universe");
modeLabel.innerText="Encyclopedia";
}
function evaluateModeUI(){
resetModes();
evaluateMode=true;codeModeActive=false;
typeSystem("Evaluate World");
modeLabel.innerText="Real Time Data";
}

function newChat(){resetModes();}

/* TYPE */
function typeSystem(text){
let p=document.createElement("p");
messages.appendChild(p);
fastType(p,"QUADRON : "+text);
}

/* FAST TYPE */
function fastType(el,text){
let span=document.createElement("span");
span.className="aiText";
el.appendChild(span);
span.textContent=text;
}

/* SEND */
async function send(){
if(!checkLimit())return;

let text=msg.value.trim();
if(!text)return;

messages.innerHTML+=`<p class="userText">You: ${text}</p>`;
msg.value="";

let p=document.createElement("p");
messages.appendChild(p);

let prompt=text;
if(codeModeActive) prompt="ONLY CODE "+text;
if(exploreActive) prompt="WIKIPEDIA "+text;
if(evaluateMode) prompt="TAVILY "+text;

let res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:prompt,user:user?.name})});
let data=await res.json();
let reply=data.reply;

if(codeModeActive && !reply.includes("```")){
reply="```html\n"+reply+"\n```";
}

let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);

if(m){
createCodeBox(p,m[1]||"html",m[2]);
}else{
fastType(p,"QUADRON : "+reply);
}
}

/* CODE BOX */
function createCodeBox(parent,lang,code){
let box=document.createElement("div");
box.className="codeBox";

box.innerHTML=`
<div class="codeHeader">
<span>&lt;/&gt; ${lang}</span>
<div>
<span class="copyBtn" onclick="copyCode(this)">Copy</span>
<span class="copyBtn" onclick="runCode(this)">Run</span>
<span class="copyBtn" onclick="debugCode(this)">Debug</span>
</div>
</div>
<div class="spinner"></div>
<pre class="codeContent"></pre>
`;

parent.appendChild(box);

let pre=box.querySelector("pre");
pre.textContent=code;
hljs.highlightElement(pre);
}

/* COPY */
function copyCode(btn){
navigator.clipboard.writeText(btn.closest(".codeBox").querySelector("pre").textContent);
}

/* RUN */
function runCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

box.innerHTML=`
<button style="position:absolute;top:5px;right:5px;background:#fff;color:#000;" onclick="restoreCode(this)">Back</button>
<iframe style="width:100%;height:250px;"></iframe>
`;

box.dataset.code=code;
box.querySelector("iframe").srcdoc=code;
}

function restoreCode(btn){
let box=btn.parentElement;
createCodeBox(box.parentElement,"html",box.dataset.code);
box.remove();
}

/* DEBUG */
async function debugCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

let res=await fetch("/api/debug",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code})});
let d=await res.json();

box.innerHTML="";
createCodeBox(box.parentElement,"html",d.fixed);
box.remove();
}

</script>
</body>
</html>
