<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;transition:.3s;}
.blur-bg{filter:blur(6px);}

/* HEADER */
header{
display:flex;justify-content:space-between;align-items:center;
padding:12px;background:#000;border-bottom:2px solid #ffd900;
box-shadow:0 0 12px #ffd900;
}
#logo{font-weight:bold;font-size:18px;}

/* HAMBURGER */
#menuBtn{
cursor:pointer;font-size:24px;
color:#ffd900;
text-shadow:0 0 10px #ffd900;
transition:.3s;
}
#menuBtn:hover{
text-shadow:0 0 20px #ffd900,0 0 30px #ffd900;
}

/* MENU */
#overlay{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.4);display:none;z-index:900;
}
#sidePanel{
position:fixed;right:0;top:0;width:260px;height:100%;
background:#111;transform:translateX(100%);
transition:.3s;padding:15px;z-index:1000;
display:flex;flex-direction:column;justify-content:space-between;
}
#sidePanel.open{transform:translateX(0);}

.menuItem{
padding:10px;cursor:pointer;margin-top:8px;
font-weight:bold;color:#ffd900;
transition:.2s;
}
.menuItem:hover{text-shadow:0 0 10px #ffd900;}

/* MENU FOOTER */
.menuFooter{
margin-top:auto;
font-size:12px;
color:white;
}
.menuFooter span{
color:#ffd900;
text-shadow:0 0 10px #ffd900;
}

/* CHAT */
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{
height:65vh;overflow:auto;background:#111;padding:10px;
border:1px solid #ffd900;border-radius:12px;
box-shadow:0 0 10px #ffd900,0 0 20px #ffd900 inset;
}

/* INPUT */
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{
flex:1;padding:10px;background:black;color:#ffd900;
border:1px solid #ffd900;border-radius:10px;
}

/* SEND BUTTON */
button{
padding:10px 16px;
background:#ffd900;color:#000;border:none;
border-radius:25px;
cursor:pointer;
box-shadow:0 0 10px #ffd900;
transition:.3s;
}
button:hover{
box-shadow:0 0 20px #ffd900,0 0 40px #ffd900;
}

/* CODE BOX (CHATGPT STYLE) */
.codeBox{
background:#0d0d0d;
border:1px solid #333;
border-radius:12px;
margin-top:10px;
overflow:hidden;
}
.codeHeader{
display:flex;
justify-content:space-between;
padding:8px;
background:#1a1a1a;
font-size:12px;
}
.codeBtns button{
margin-left:5px;
border-radius:6px;
padding:4px 8px;
}
.codeContent{
padding:10px;
white-space:pre;
overflow:auto;
}

/* FOOTER */
.footer{
text-align:center;
font-size:13px;
margin:10px;
color:white;
}
.footer a{
color:#ffd900;
text-shadow:0 0 10px #ffd900;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<div id="logo">Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">
<div>
<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="codeMode()">Code /</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI()">Evaluate</div>
</div>

<div class="menuFooter">
Created by <span>Rawat Systems</span>
</div>
</div>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<div class="footer">
Quadron AI can make mistakes, by using it you agree our 
<a href="terms.html">Terms & Conditions</a>
</div>

<script>
const messages=document.getElementById("messages");

/* MENU */
function openMenu(){
sidePanel.classList.add("open");
overlay.style.display="block";
document.body.classList.add("blur-bg");
}
function closeMenu(){
sidePanel.classList.remove("open");
overlay.style.display="none";
document.body.classList.remove("blur-bg");
}

/* MODES */
let exploreActive=false;
let codeModeActive=false;
let evaluateMode=false;

/* TEXT FORMAT (BOLD SUPPORT) */
function formatText(text){
return text.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>");
}

/* FAST TYPING */
function typeText(el,text){
let span=document.createElement("span");
el.innerHTML="<b>Quadron:</b> ";
el.appendChild(span);

let i=0;
function t(){
span.innerHTML=formatText(text.slice(0,i));
i+=2;
if(i<=text.length) requestAnimationFrame(t);
}
t();
}

/* CODE BOX */
function renderCode(container,reply){

let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);
if(!m) return false;

let code=m[2];
let lang=m[1]||"html";

container.innerHTML="<b>Quadron:</b>";

let box=document.createElement("div");
box.className="codeBox";

let header=document.createElement("div");
header.className="codeHeader";

header.innerHTML=`
<span>${lang}</span>
<div class="codeBtns">
<button onclick="copyCode(this)">Copy</button>
<button onclick="runCode(this)">Execute</button>
</div>
`;

let content=document.createElement("pre");
content.className="codeContent";
content.textContent=code;

box.appendChild(header);
box.appendChild(content);
container.appendChild(box);

hljs.highlightElement(content);

return true;
}

/* COPY */
function copyCode(btn){
let code=btn.closest(".codeBox").querySelector("pre").textContent;
navigator.clipboard.writeText(code);
}

/* RUN */
function runCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

if(btn.innerText==="Back"){
box.innerHTML="";
renderCode(box.parentElement, "```html\n"+code+"\n```");
return;
}

if(code.includes("cdn") || code.includes("script src")){
alert("External Libraries Used In The Code");
return;
}

let iframe=document.createElement("iframe");
iframe.srcdoc=code;

box.innerHTML="";
box.appendChild(iframe);

btn.innerText="Back";
}

/* SEND */
async function send(){

let text=msg.value.trim();
if(!text) return;

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`;
msg.value="";

let p=document.createElement("p");
messages.appendChild(p);

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text,evaluate:evaluateMode})
});

let data=await res.json();

if(!renderCode(p,data.reply)){
typeText(p,data.reply);
}

messages.scrollTop=messages.scrollHeight;
}

/* MODES */
function newChat(){
messages.innerHTML="";
exploreActive=false;
codeModeActive=false;
evaluateMode=false;
closeMenu();
fetchGreeting();
}

function codeMode(){
messages.innerHTML="";
codeModeActive=true;
closeMenu();
let p=document.createElement("p");
messages.appendChild(p);
typeText(p,"Describe what you want to code");
}

function exploreMode(){
messages.innerHTML="";
exploreActive=true;
closeMenu();
let p=document.createElement("p");
messages.appendChild(p);
typeText(p,"Explore anything...");
}

function evaluateModeUI(){
messages.innerHTML="";
evaluateMode=true;
closeMenu();
let p=document.createElement("p");
messages.appendChild(p);
typeText(p,"What should I evaluate?");
}

/* GREETING (NOT IN MODES) */
async function fetchGreeting(){
if(codeModeActive || exploreActive || evaluateMode) return;

let p=document.createElement("p");
messages.appendChild(p);

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:"Give a short sarcastic greeting"})
});

let data=await res.json();
typeText(p,data.reply);
}

/* ENTER */
msg.addEventListener("keydown",e=>{
if(e.key==="Enter") send();
});

/* INIT */
window.onload=()=>{newChat();}
</script>

</body>
</html>
