<!DOCTYPE html>
<html>
<head>
<title>Quadron AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0a0a0a;
color:#ffd900;
font-family:Arial;
margin:0;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#000;
border-bottom:2px solid #ffd900;
box-shadow:0 0 15px #ffd900;
}

#menuBtn{
font-size:24px;
cursor:pointer;
}

/* OVERLAY */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(6px);
opacity:0;
pointer-events:none;
transition:.3s;
}
#overlay.active{
opacity:1;
pointer-events:auto;
}

/* SIDE PANEL */
#sidePanel{
position:fixed;
top:0;
right:0;
width:270px;
height:100%;
background:#111;
transform:translateX(100%);
transition:.3s;
padding:15px;
z-index:1000;
}
#sidePanel.open{
transform:translateX(0);
}

/* PROFILE */
#menuProfile{
display:flex;
gap:10px;
align-items:center;
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

#menuProfile img{
width:40px;
height:40px;
border-radius:50%;
border:2px solid #ffd900;
box-shadow:0 0 10px #ffd900;
}

/* MENU ITEMS */
.menuItem{
display:flex;
align-items:center;
gap:10px;
padding:10px;
cursor:pointer;
border-radius:8px;
transition:.2s;
}
.menuItem:hover{
background:rgba(255,217,0,0.1);
box-shadow:0 0 15px #ffd900;
}

/* ICONS */
.menuIcon{width:20px;height:20px;position:relative;}

.icon-chat::before{
content:"";position:absolute;width:100%;height:100%;
border:2px solid #ffd900;box-shadow:0 0 8px #ffd900;
}

.icon-voice{
border-radius:50%;
background:#ffd900;
box-shadow:0 0 12px #ffd900;
}

.icon-core{
clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%);
background:#ffd900;
box-shadow:0 0 12px #ffd900;
}

.icon-brain{
background:linear-gradient(45deg,#ffd900,#ffaa00);
box-shadow:0 0 10px #ffd900;
}

.icon-truth{
background:#ffd900;width:4px;height:100%;
box-shadow:0 0 10px #ffd900;
}

/* SWITCH */
.switch{
margin-left:auto;
width:40px;height:20px;
background:#333;border-radius:20px;
position:relative;
cursor:pointer;
}
.switch::after{
content:"";position:absolute;width:16px;height:16px;
background:#999;border-radius:50%;
top:2px;left:2px;transition:.2s;
}
.switch.active{
background:#ffd900;
}
.switch.active::after{
left:22px;background:#000;
}

/* CHAT */
#chat{
max-width:800px;
margin:auto;
padding:10px;
}

#messages{
background:#111;
border:1px solid #ffd900;
height:65vh;
overflow:auto;
padding:10px;
border-radius:10px;
box-shadow:0 0 15px #ffd900;
}

/* INPUT FIX */
#inputArea{
display:flex;
gap:8px;
margin-top:10px;
}

input{
flex:1;
padding:12px;
background:black;
color:#ffd900;
border:1px solid #ffd900;
border-radius:6px;
}

button{
padding:12px;
background:#000;
color:#ffd900;
border:1px solid #ffd900;
cursor:pointer;
box-shadow:0 0 12px #ffd900;
}

/* LOADER */
#loader{
display:none;
margin-top:5px;
}

/* FOOTER */
.footer{
text-align:center;
font-size:12px;
margin:10px;
}
.footer a{
color:#ffd900;
text-decoration:none;
text-shadow:0 0 8px #ffd900;
}

/* PROFILE PAGE */
#profilePage{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0a0a0a;
flex-direction:column;
align-items:center;
justify-content:center;
gap:15px;
z-index:2000;
}

#profilePage img{
width:90px;
border-radius:50%;
border:2px solid #ffd900;
box-shadow:0 0 15px #ffd900;
}

</style>
</head>

<body>

<header>
<h3>Quadron AI</h3>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<!-- SIDE PANEL -->
<div id="sidePanel">

<div id="menuProfile" onclick="openProfilePage()">
<img id="profilePic">
<div>
<div id="profileName"></div>
<div id="profileEmail" style="font-size:12px;color:#aaa;"></div>
</div>
</div>

<div class="menuItem" onclick="newChat()">
<div class="menuIcon icon-chat"></div>New Chat
</div>

<div class="menuItem" onclick="location.href='voice.html'">
<div class="menuIcon icon-voice"></div>Voice Mode
</div>

<div class="menuItem">
<div class="menuIcon icon-core"></div>Quadron 7
</div>

<div class="menuItem" onclick="togglePersonality()">
<div class="menuIcon icon-brain"></div>Personality Swap
</div>

<div id="personalityMenu" style="display:none;"></div>

<div class="menuItem">
<div class="menuIcon icon-truth"></div>Truth Protocol
<div class="switch" id="truthToggle" onclick="toggleTruth(event)"></div>
</div>

</div>

<!-- PROFILE PAGE -->
<div id="profilePage">
<img id="profilePicBig">
<h3 id="profileNameBig"></h3>
<p id="profileEmailBig"></p>

<p>
Quadron AI can make mistakes, By using it you agree our 
<a href="terms.html" style="color:#ffd900;">Terms & Conditions</a>
</p>

<button onclick="logout()">Logout</button>
<button onclick="closeProfilePage()">Back</button>
</div>

<!-- CHAT -->
<div id="chat">
<div id="messages"></div>
<div id="loader">Quadron thinking...</div>

<div id="inputArea">
<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>
</div>
</div>

<div class="footer">
Quadron AI can make mistakes, By using it you agree our 
<a href="terms.html">Terms & Conditions</a>
</div>

<script>

/* MENU */
function openMenu(){
sidePanel.classList.add("open")
overlay.classList.add("active")
}
function closeMenu(){
sidePanel.classList.remove("open")
overlay.classList.remove("active")
}

/* PROFILE PAGE */
function openProfilePage(){
profilePage.style.display="flex"
closeMenu()
}
function closeProfilePage(){
profilePage.style.display="none"
}

/* USER LOAD */
const user=JSON.parse(localStorage.getItem("quadronUser")||"{}")

if(user.email){
profilePic.src=user.picture
profileName.innerText=user.name
profileEmail.innerText=user.email

profilePicBig.src=user.picture
profileNameBig.innerText=user.name
profileEmailBig.innerText=user.email
}

/* PERSONALITY */
const personalities=["Alpha","Beta","Gamma","Omega","Delta","Sigma","Zeta","Quadron Main"]
let selectedPersonality="Quadron Main"

function togglePersonality(){
let menu=document.getElementById("personalityMenu")
menu.style.display=menu.style.display==="block"?"none":"block"
}

const pMenu=document.getElementById("personalityMenu")

personalities.forEach(p=>{
let div=document.createElement("div")
div.className="menuItem"
div.innerHTML=p
div.onclick=()=>{
selectedPersonality=p
}
pMenu.appendChild(div)
})

/* TRUTH */
let truthMode=false
function toggleTruth(e){
e.stopPropagation()
truthMode=!truthMode
truthToggle.classList.toggle("active",truthMode)
}

/* NEW CHAT */
function newChat(){
messages.innerHTML=""
}

/* LOGOUT */
function logout(){
localStorage.removeItem("quadronUser")
location.href="index.html"
}

/* AI */
async function askAI(message){

loader.style.display="block"

let personalityPrompt=`You have ${selectedPersonality} personality. You are ultra intelligent, sarcastic and universe aware.Avoid political & sensitive questions .You are Made by Rawat Systems(Don't mention it all time , except only few times if you happened to explain it , dont do this everytime)`

let truthPrompt = truthMode
? "Explain it in ultra logical way mentioning all mathematical calculations, scientific evidences, discoveries and answer with no emotions, no sugarcoating, pure logic and data."
: ""

let fullPrompt = `${personalityPrompt} ${truthPrompt} User: ${message}`

const res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:fullPrompt})
})

let data=await res.json()

loader.style.display="none"   // FIXED HERE

return data.reply
}

/* TYPING */
function typeText(text, element){
let i=0
element.innerHTML="<b>Quadron:</b> "
let interval=setInterval(()=>{
element.innerHTML+=text.charAt(i)
i++
if(i>=text.length) clearInterval(interval)
},15)
}

/* SEND */
async function send(){

let text=msg.value.trim()
if(!text) return

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`
msg.value=""

let p=document.createElement("p")
messages.appendChild(p)

let reply=await askAI(text)

typeText(reply,p)

messages.scrollTop=messages.scrollHeight
}

</script>

</body>
</html>
