<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}

/* HEADER */
header{
display:flex;justify-content:space-between;align-items:center;
padding:12px;background:#000;border-bottom:2px solid #ffd900;
box-shadow:0 0 12px #ffd900;
}
#logo{font-weight:bold;}
#menuBtn{cursor:pointer;font-size:24px;}

/* MENU */
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;z-index:900;}

#sidePanel{
position:fixed;right:0;top:0;width:260px;height:100%;
background:#111;transform:translateX(100%);
transition:.3s;padding:15px;z-index:1000;
display:flex;flex-direction:column;
}
#sidePanel.open{transform:translateX(0);}

#menuProfile{
display:flex;gap:10px;align-items:center;
padding:10px;border-bottom:1px solid #333;
cursor:pointer;
}
#menuProfile img{
width:40px;height:40px;border-radius:50%;
border:1px solid #ffd900;
}

.menuItem{
padding:10px;margin-top:8px;
cursor:pointer;font-weight:bold;
color:#ffd900;
transition:.2s;
}
.menuItem:hover{
background:#222;
box-shadow:0 0 10px #ffd900;
}

/* FOOTER HEAD FIX */
.menuFooter{
margin-top:auto;
text-align:center;
font-size:12px;
padding-top:10px;
border-top:1px solid #333;
}
.menuFooter span{
color:#ffd900;
text-shadow:0 0 12px #ffd900;
}

/* CHAT */
#chat{max-width:800px;margin:auto;padding:10px;}

#messages{
height:65vh;
overflow:auto;
background:#111;
padding:10px;
border:1px solid #ffd900;
border-radius:12px;
box-shadow:0 0 20px #ffd900;
}

/* TEXT COLORS */
.you{color:#ffd900;text-shadow:0 0 10px #ffd900;}
.ai{color:#fff;text-shadow:0 0 10px #fff;}

/* INPUT */
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{
flex:1;padding:10px;
background:black;color:#ffd900;
border:1px solid #ffd900;
border-radius:10px;
}

button{
padding:10px;background:#ffd900;color:#000;
border:none;cursor:pointer;
box-shadow:0 0 15px #ffd900;
transition:.2s;
}
button:hover{
box-shadow:0 0 40px #ffd900,0 0 80px #ffd900;
}

/* CODE BOX */
.codeBox{
background:#000;
border:1px solid #ffd900;
margin-top:8px;border-radius:8px;
position:relative;
overflow:hidden;
}
.codeHeader{
display:flex;justify-content:space-between;
padding:6px 10px;background:#111;
border-bottom:1px solid #ffd900;
font-size:12px;
}
.codeContent{padding:10px;white-space:pre;}

/* SPIRAL */
.spinner{
position:absolute;width:18px;height:18px;
border:3px solid #ffd900;
border-top:3px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
top:8px;left:8px;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* FOOTER CENTER */
.footer{
text-align:center;font-size:12px;margin:10px;
}
.footer a{
color:#ffd900;
text-shadow:0 0 12px #ffd900;
}
</style>
</head>

<body>

<header>
<div id="logo">Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">

<div id="menuProfile" onclick="openProfilePage()">
<img id="profilePic">
<div>
<div id="profileName"></div>
<div id="profileEmail" style="font-size:12px;"></div>
</div>
</div>

<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="codeMode()">Code /</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI()">Evaluate</div>

<div class="menuFooter">
Developed by <span>Rawat Systems</span>
</div>

</div>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

<div class="footer">
Quadron AI can make mistakes —
<a href="terms.html">Terms & Conditions</a>
</div>

<script>
const messages=document.getElementById("messages");

/* LOAD USER */
let user=JSON.parse(localStorage.getItem("quadronUser"));
if(user && user!=="guest"){
profileName.textContent=user.name;
profileEmail.textContent=user.email;
profilePic.src=user.picture;
}else{
profileName.textContent="Guest";
profilePic.src="https://via.placeholder.com/40";
}

/* GREETING ONLY NORMAL MODE */
window.onload=()=>{
if(!localStorage.getItem("visited")){
messages.innerHTML=`<p class="ai">Welcome to Quadron</p>`;
localStorage.setItem("visited",true);
}
};

/* MENU FIX */
function openMenu(){
document.getElementById("sidePanel").classList.add("open");
document.getElementById("overlay").style.display="block";
}
function closeMenu(){
document.getElementById("sidePanel").classList.remove("open");
document.getElementById("overlay").style.display="none";
}

/* MODES */
let codeModeActive=false, exploreActive=false, evaluateMode=false;

function typeFast(el,text){
let i=0;
let speed=text.length/120;
let int=setInterval(()=>{
el.textContent=text.slice(0,i);
i++;
if(i>=text.length) clearInterval(int);
},speed);
}

function newChat(){
messages.innerHTML="";
codeModeActive=false;exploreActive=false;evaluateMode=false;
}

function codeMode(){
newChat();
codeModeActive=true;
let p=document.createElement("p");
messages.appendChild(p);
typeFast(p,"Start coding...");
}

function exploreMode(){
newChat();
exploreActive=true;
let p=document.createElement("p");
messages.appendChild(p);
typeFast(p,"Exploring knowledge...");
}

function evaluateModeUI(){
newChat();
evaluateMode=true;
let p=document.createElement("p");
messages.appendChild(p);
typeFast(p,"Evaluating...");
}

/* SEND */
async function send(){
let text=msg.value.trim();
if(!text) return;

messages.innerHTML+=`<p class="you">You: ${text}</p>`;
msg.value="";

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message: codeModeActive ? "ONLY CODE "+text : text
})
});

let data=await res.json();
let reply=data.reply;

let p=document.createElement("p");
messages.appendChild(p);

/* CODE */
let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);

if(m){
let lang=m[1]||"text";
let code=m[2];

let box=document.createElement("div");
box.className="codeBox";

box.innerHTML=`
<div class="codeHeader">
<span>&lt;/&gt; ${lang}</span>
<div>
<span onclick="copyCode(this)">Copy</span>
<span onclick="runCode(this)">Run</span>
<span onclick="debugCode(this)">Debug</span>
</div>
</div>
<div class="spinner"></div>
<pre class="codeContent"></pre>
`;

p.appendChild(box);

let content=box.querySelector("pre");
let spin=box.querySelector(".spinner");

/* FAST TYPE */
let i=0;
let speed=code.length/120;
let int=setInterval(()=>{
content.textContent=code.slice(0,i);
i++;
if(i>=code.length){
clearInterval(int);
spin.remove();
hljs.highlightElement(content);
}
},speed);

}else{
p.className="ai";
typeFast(p,"Quadron: "+reply);
}
}

/* RUN */
function runCode(btn){
btn.style.transform="scale(1.2)";
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

let iframe=document.createElement("iframe");
iframe.style.width="100%";
iframe.style.height="250px";
iframe.srcdoc=code;

box.innerHTML="";
box.appendChild(iframe);

let back=document.createElement("button");
back.innerText="Back";
back.onclick=()=>location.reload();
box.appendChild(back);
}

/* DEBUG */
async function debugCode(btn){
btn.style.transform="scale(1.2)";
let box=btn.closest(".codeBox");
let pre=box.querySelector("pre");

let spin=document.createElement("div");
spin.className="spinner";
box.appendChild(spin);

let res=await fetch("/api/debug",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({code:pre.textContent})
});

let d=await res.json();

pre.textContent=d.fixed;
spin.remove();
hljs.highlightElement(pre);
}

/* COPY */
function copyCode(btn){
navigator.clipboard.writeText(btn.closest(".codeBox").querySelector("pre").textContent);
}
</script>

</body>
</html>
