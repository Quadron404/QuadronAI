<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Highlight.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 12px #ffd900;}
#logo{font-weight:bold;font-size:18px;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;box-shadow:0 0 15px #ffd900;border-radius:12px;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
button{padding:10px;background:#ffd900;color:#000;border:none;box-shadow:0 0 12px #ffd900;cursor:pointer;}
.codeBox{background:#000;border:1px solid #ffd900;margin-top:8px;border-radius:8px;overflow:auto;font-family:monospace;white-space:pre;line-height:1.3em;position:relative;}
.codeHeader{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#111;font-size:12px;font-weight:bold;border-bottom:1px solid #ffd900;gap:8px;}
.copyBtn{cursor:pointer;color:#ffd900;padding:2px 6px;border:1px solid #ffd900;border-radius:4px;font-size:12px;}
.codeContent{padding:10px;overflow:auto;white-space:pre;word-wrap:break-word;}
.spinner{width:16px;height:16px;border:3px solid #ffd900;border-top:3px solid transparent;border-radius:50%;animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.footer{text-align:center;font-size:12px;margin:10px;}
.footer a{color:#ffd900;text-decoration:none;}
</style>
</head>
<body>

<header>
<div id="logo">Quadron AI</div>
</header>

<div id="chat">
<div id="messages"></div>
<div id="inputArea">
<input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<div class="footer">
Quadron AI can make mistakes, By using it you agree our 
<a href="terms.html">Terms & Conditions</a>
</div>

<script>
const messages = document.getElementById("messages");
const msgInput = document.getElementById("msg");

// List of common programming keywords for code detection
const codeKeywords = ["function","def","class","var","let","const","int","float","double","printf","console","return","#include","import","package","public","private","void","main"];

function createCodeBox(code, lang="text") {
  const box = document.createElement("div");
  box.className = "codeBox";
  const header = document.createElement("div");
  header.className = "codeHeader";
  const spinner = document.createElement("span");
  spinner.className = "spinner";
  header.appendChild(spinner);
  const langLabel = document.createElement("span");
  langLabel.innerText = lang.toUpperCase();
  header.appendChild(langLabel);
  const copyBtn = document.createElement("span");
  copyBtn.className = "copyBtn";
  copyBtn.innerText = "Copy";
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(code);
    copyBtn.innerText = "Copied!";
    setTimeout(()=>copyBtn.innerText="Copy",1500);
  };
  header.appendChild(copyBtn);

  const content = document.createElement("pre");
  content.className = "codeContent";
  const codeEl = document.createElement("code");
  codeEl.className = `language-${lang}`;
  content.appendChild(codeEl);

  box.appendChild(header);
  box.appendChild(content);

  let i=0;
  function typeChar(){
    if(i<code.length){
      codeEl.textContent += code[i];
      hljs.highlightElement(codeEl);
      i++;
      requestAnimationFrame(typeChar);
    } else spinner.style.display="none";
  }
  typeChar();
  return box;
}

function detectCodeAndFormat(text){
  const words = text.split(/\s+/);
  let codeDetected = false;
  let codeBuffer = [];
  let nonCodeCount = 0;
  let resultText = "";
  let language = "text";

  for(let w of words){
    if(codeKeywords.includes(w.toLowerCase()) || w.includes("()") || w.includes("{}") || w.includes(";") || w.includes("=")){
      if(!codeDetected) codeDetected = true;
      codeBuffer.push(w);
      nonCodeCount=0;
    } else {
      if(codeDetected){
        nonCodeCount++;
        if(nonCodeCount>=5){
          language = detectLanguage(codeBuffer.join(" "));
          return {code: codeBuffer.join(" "), lang: language, textBefore: resultText};
        } else codeBuffer.push(w);
      } else resultText += w + " ";
    }
  }
  if(codeDetected) language = detectLanguage(codeBuffer.join(" "));
  return codeDetected ? {code: codeBuffer.join(" "), lang: language, textBefore: resultText} : {textBefore: text};
}

// Very simple language detector based on keywords
function detectLanguage(code){
  code = code.toLowerCase();
  if(code.includes("def") || code.includes("import")) return "python";
  if(code.includes("console.") || code.includes("function")) return "javascript";
  if(code.includes("#include") || code.includes("printf")) return "c";
  if(code.includes("class") && code.includes("public")) return "java";
  if(code.includes("int main")) return "c";
  return "text";
}

function typeText(text){
  const p = document.createElement("p");
  p.innerHTML="<b>Quadron:</b> ";
  messages.appendChild(p);

  let idx = 0;
  function step(){
    if(idx<text.length){
      const chunk = text.slice(0, idx+1);
      const detection = detectCodeAndFormat(chunk);
      p.innerHTML="<b>Quadron:</b> "+(detection.textBefore || "");
      if(detection.code){
        const codeBox = createCodeBox(detection.code, detection.lang);
        messages.appendChild(codeBox);
        idx = text.length; // stop after one code box
      } else idx++;
      requestAnimationFrame(step);
    }
  }
  step();
}

async function askAI(message){
  let res = await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message})});
  let data = await res.json();
  return data.reply;
}

async function send(){
  let text = msgInput.value.trim();
  if(!text) return;
  messages.innerHTML += `<p><b>You:</b> ${text}</p>`;
  msgInput.value="";
  const reply = await askAI(text);
  typeText(reply);
}

msgInput.addEventListener("keydown",e=>{if(e.key==="Enter") send()});
</script>
</body>
</html>
