<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
/* KEEPING YOUR UI EXACT */
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 12px #ffd900;}
#logo{font-weight:bold;font-size:18px;}
#menuBtn{cursor:pointer;font-size:24px;}

#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:900;}

#sidePanel{
position:fixed;right:0;top:0;width:260px;height:100%;
background:#111;transform:translateX(100%);
transition:.3s;padding:15px;z-index:1000;
overflow-y:auto;display:flex;flex-direction:column;
}
#sidePanel.open{transform:translateX(0);}

#menuProfile{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid #333;cursor:pointer;}
#menuProfile img{width:40px;height:40px;border-radius:50%;border:1px solid #ffd900;}

.menuItem{padding:10px;cursor:pointer;margin-top:8px;color:#ffd900;font-weight:bold;}

.menuFooter{text-align:center;font-size:12px;margin-top:15px;}
.menuFooter span{color:#ffd900;text-shadow:0 0 10px #ffd900;}

#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;}

#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}

button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;}

.codeBox{background:#000;border:1px solid #ffd900;margin-top:8px;border-radius:8px;overflow:hidden;}
.codeHeader{display:flex;justify-content:space-between;padding:6px 10px;background:#111;font-size:12px;}
.copyBtn{cursor:pointer;margin-left:6px;}

.codeContent{padding:10px;white-space:pre;}

.footer{text-align:center;font-size:12px;margin:10px;}
.footer a{color:#ffd900;text-shadow:0 0 10px #ffd900;}
</style>
</head>

<body>

<header>
<div id="logo">Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">

<div id="menuProfile" onclick="openProfilePage()">
<img id="profilePic">
<div>
<div id="profileName"></div>
<div id="profileEmail" style="font-size:12px;"></div>
</div>
</div>

<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="codeMode()">Code /</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI()">Evaluate</div>

<div class="menuFooter">
Developed by <span>Rawat Systems</span>
</div>

</div>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

<div class="footer">
Quadron AI can make mistakes,
<a href="terms.html">Terms & Conditions</a>
</div>

<script>
const messages=document.getElementById("messages");

/* USER LOAD */
let user=JSON.parse(localStorage.getItem("quadronUser"));

if(user && user!=="guest"){
profileName.textContent=user.name||"User";
profileEmail.textContent=user.email||"";
profilePic.src=user.picture||"https://via.placeholder.com/40";
}else{
profileName.textContent="Guest";
profileEmail.textContent="";
profilePic.src="https://via.placeholder.com/40";
}

/* GREETING ONLY AFTER LOGIN */
window.onload=()=>{
if(user && user!=="guest"){
messages.innerHTML=`<p>Welcome ${user.name}</p>`;
}
};

/* CHAT LIMIT */
function checkLimit(){
let key="limit_"+(user?.email||"guest");
let data=JSON.parse(localStorage.getItem(key))||{count:0,date:new Date().toDateString()};

if(data.date!==new Date().toDateString()){
data={count:0,date:new Date().toDateString()};
}

if(data.count>=100){
alert("Daily limit reached");
return false;
}

data.count++;
localStorage.setItem(key,JSON.stringify(data));
return true;
}

/* MENU */
function openMenu(){sidePanel.classList.add("open");overlay.style.display="block";}
function closeMenu(){sidePanel.classList.remove("open");overlay.style.display="none";}

/* PROFILE PAGE */
function openProfilePage(){
window.open("profile.html","_blank");
}

/* MODES */
let codeModeActive=false, exploreActive=false, evaluateMode=false;

function buildPrompt(t){
if(codeModeActive) return "ONLY CODE "+t;
if(exploreActive) return "Use Wikipedia + deep info "+t;
if(evaluateMode) return "Use Tavily data "+t;
return t;
}

/* SEND */
async function send(){
if(!checkLimit()) return;

let text=msg.value.trim();
if(!text)return;

messages.innerHTML+=`<p>You: ${text}</p>`;
msg.value="";

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:buildPrompt(text)})
});

let data=await res.json();
let reply=data.reply;

let p=document.createElement("p");
messages.appendChild(p);

/* CODE MODE */
let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);

if(m){
let code=m[2];

let box=document.createElement("div");
box.className="codeBox";

box.innerHTML=`
<div class="codeHeader">
<span>&lt;/&gt;</span>
<div>
<span class="copyBtn" onclick="copyCode(this)">Copy</span>
<span class="copyBtn" onclick="runCode(this)">Run</span>
<span class="copyBtn" onclick="debugCode(this)">Debug</span>
</div>
</div>
<pre class="codeContent">${code}</pre>
`;

p.appendChild(box);
}else{
p.innerText="Quadron: "+reply;
}
}

/* COPY */
function copyCode(btn){
navigator.clipboard.writeText(btn.closest(".codeBox").querySelector("pre").textContent);
}

/* RUN + BACK */
function runCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

let iframe=document.createElement("iframe");
iframe.style.width="100%";
iframe.style.height="250px";
iframe.srcdoc=code;

box.innerHTML="";
box.appendChild(iframe);

let back=document.createElement("button");
back.innerText="Back";
back.onclick=()=>{
box.innerHTML=`
<pre class="codeContent">${code}</pre>
`;
};
box.appendChild(back);
}

/* DEBUG FIX */
async function debugCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

let res=await fetch("/api/debug",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({code})
});

let d=await res.json();

box.querySelector("pre").textContent=d.fixed;
}

/* MODES */
function codeMode(){codeModeActive=true;exploreActive=false;evaluateMode=false;}
function exploreMode(){exploreActive=true;codeModeActive=false;evaluateMode=false;}
function evaluateModeUI(){evaluateMode=true;exploreActive=false;codeModeActive=false;}
</script>

</body>
</html>
