<head>
<meta charset="UTF-8">
<title>Quadron AI</title>

<script>(function(s){s.dataset.zone='10874325',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

<link rel="icon" href="favicon.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
/* UI REMAINS UNCHANGED */
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;transition:.3s;}
.blur-bg{filter:blur(6px);}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 15px #ffd900;}
header div:first-child{font-weight:bold;text-shadow:0 0 15px #ffd900;}
#menuBtn{cursor:pointer;font-size:24px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:500;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}
#menuProfile{display:flex;gap:10px;padding:10px;border-bottom:1px solid #333;cursor:pointer;}
#menuProfile img{width:40px;height:40px;border-radius:50%;border:2px solid #ffd900;box-shadow:0 0 10px #ffd900;transition:0.2s;}
#profileName{font-weight:bold;color:#ffd900;text-shadow:0 0 10px #ffd900;transition:0.2s;}
#profileEmail{color:#ffd900;text-shadow:0 0 8px #ffd900;transition:0.2s;}
.menuItem{padding:10px;cursor:pointer;margin-top:8px;font-weight:bold;color:#fff;text-shadow:0 0 8px #fff, 0 0 15px #fff;transition:0.2s;}
.menuItem:hover{text-shadow:0 0 15px #fff, 0 0 30px #fff, 0 0 50px #fff;}
#chatHistory div {padding: 6px;cursor: pointer;color: #ffd900;font-weight: bold;text-shadow: 0 0 6px #ffd900, 0 0 12px #ffd900;transition: 0.3s;}
#chatHistory div:hover {color: #ffd900;text-shadow: 0 0 10px #ffd900,0 0 20px #ffd900,0 0 40px #ffd900,0 0 70px #ffd900;}
.menuFooter{margin-top:auto;text-align:center;font-size:12px;color:#fff;text-shadow:0 0 10px #fff;}
.menuFooter span{color:#ffd900;text-shadow:0 0 10px #ffd900;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;box-shadow:0 0 20px #ffd900;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
input::placeholder{color:rgba(255,255,255,0.3);}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;border-radius:20px;box-shadow:0 0 15px #ffd900;transition:.2s;}
button:hover{box-shadow:0 0 35px #ffd900;}
.userText{color:#ffd900;text-shadow:0 0 10px #ffd900;}
.aiText{color:#fff;text-shadow:0 0 10px #fff;}
.footer{text-align:center;font-size:12px;margin:10px;color:#fff;text-shadow:0 0 10px #fff;}
.footer a{color:#ffd900;text-shadow:0 0 15px #ffd900;text-decoration:none;}
.codeBox{background:#000;border:1px solid #ffd900;border-radius:10px;margin-top:10px;overflow:hidden;}
.codeTop{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #ffd900;}
.codeTitle{color:#fff;text-shadow:0 0 10px #fff;}
.codeBtns span{margin-left:10px;cursor:pointer;color:#fff;text-shadow:0 0 10px #fff;}
.backBtn{color:#ffd900;text-shadow:0 0 10px #ffd900;cursor:pointer;}
.loader{width:20px;height:20px;border:3px solid #fff;border-top:3px solid transparent;border-radius:50%;animation:spin 1s linear infinite;margin:5px;}
@keyframes spin{100%{transform:rotate(360deg);}}
.sourceBox{display:flex;align-items:center;gap:10px;margin-top:10px;padding:10px;border:1px solid #fff;border-radius:10px;cursor:pointer;transition:0.2s;box-shadow:0 0 10px #fff;}
.sourceBox:hover{box-shadow:0 0 25px #fff;}
.sourceBox img{width:20px;height:20px;}
.sourceText{display:flex;flex-direction:column;}
.sourceTitle{color:#fff;font-size:14px;text-shadow:0 0 5px #fff;}
.sourceLink{color:#aaa;font-size:12px;}
</style>
</head>

<body>

<header>
  <div>Quadron AI</div>
  <div id="menuBtn">☰</div>
</header>

<div id="overlay"></div>

<div id="sidePanel">
  <div id="menuProfile">
    <img id="profilePic">
    <div>
      <div id="profileName"></div>
      <div id="profileEmail" style="font-size:12px;"></div>
    </div>
  </div>
  <div class="menuItem" id="newChatBtn">New Chat</div>
  <div class="menuItem" id="codeModeBtn">Code /</div>
  <div class="menuItem" id="exploreModeBtn">Explore</div>
  <div class="menuItem" id="voiceModeBtn">Voice Mode</div>
  <div id="chatHistory" style="margin-top:15px;overflow:auto;max-height:300px;"></div>
  <div class="menuFooter">Developed by <span>Rawat Systems</span></div>
</div>

<div id="chat">
  <div id="messages"></div>
  <div id="inputArea">
    <input id="msg" placeholder="Type here.....">
    <button id="sendBtn">Send</button>
  </div>
</div>

<div class="footer">
  Quadron AI can make mistakes, by using it you accept our <a href="terms.html">Terms & Conditions</a>
</div>

<script>
// --- CORE LOGIC ---
let currentChatId = null;
let isFirstMessage = true;
let db;
let currentMessages = [];
let adCounter = 0; 

// INITIALIZE DB
let req = indexedDB.open("quadronDB", 1);
req.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("chats", { keyPath: "id" });
};
req.onsuccess = e => {
  db = e.target.result;
  loadChatList();
};

// --- AD SYSTEM: THE KILLSWITCH ---
function injectAdSystem() {
    const clickHandler = (e) => {
        // Stop ad script from seeing the click before we are ready
        e.stopImmediatePropagation();

        let adScript = document.createElement('script');
        adScript.id = "active-ad-logic";
        adScript.dataset.zone = '10874922';
        adScript.src = 'https://al5sm.com/tag.min.js';
        document.body.appendChild(adScript);

        // Nuke it after 6 seconds
        setTimeout(() => {
            window.removeEventListener('click', clickHandler, true);
            
            // 1. Remove script tag
            const tag = document.getElementById("active-ad-logic");
            if(tag) tag.remove();

            // 2. Kill persistent listeners
            document.onclick = null;
            document.body.onclick = null;
            window.onclick = null;

            // 3. Nuclear Option: Clone and Replace Body to strip ALL ghost listeners
            const oldBody = document.body;
            const newBody = oldBody.cloneNode(true);
            oldBody.parentNode.replaceChild(newBody, oldBody);

            // 4. Re-bind all necessary UI listeners to the new body elements
            rebindEventListeners();
        }, 6000);
    };

    // Use Capture phase (true) to intercept BEFORE the ad script takes over
    window.addEventListener('click', clickHandler, true);
}

// --- REBINDER (REQUIRED AFTER CLONE) ---
function rebindEventListeners() {
    document.getElementById("sendBtn").onclick = send;
    document.getElementById("menuBtn").onclick = () => {
        document.getElementById("sidePanel").classList.add("open");
        document.getElementById("overlay").style.display="block";
        document.getElementById("chat").classList.add("blur-bg");
    };
    document.getElementById("overlay").onclick = closeMenu;
    document.getElementById("newChatBtn").onclick = () => menuAction(newChat);
    document.getElementById("codeModeBtn").onclick = () => menuAction(codeMode);
    document.getElementById("exploreModeBtn").onclick = () => menuAction(exploreMode);
    document.getElementById("voiceModeBtn").onclick = () => { closeMenu(); voiceMode(); };
    document.getElementById("menuProfile").onclick = () => { closeMenu(); window.location.href="profile.html"; };
    document.getElementById("msg").onkeydown = e => { if(e.key === "Enter") send(); };
}

// --- UI HELPERS ---
function closeMenu(){
  document.getElementById("sidePanel").classList.remove("open");
  document.getElementById("overlay").style.display="none";
  document.getElementById("chat").classList.remove("blur-bg");
}
function menuAction(fn){ closeMenu(); if(fn) fn(); }

// --- CHAT FUNCTIONS ---
async function send() {
    let limitKey = "limit_" + (user.email || "guest");
    let limitData = JSON.parse(localStorage.getItem(limitKey)) || {count: 0};
    if(limitData.count >= 100){ alert("LIMIT CROSSED"); return; }

    const input = document.getElementById("msg");
    let text = input.value.trim();
    if(!text) return;

    limitData.count++;
    localStorage.setItem(limitKey, JSON.stringify(limitData));

    // TRIGGER AD SYSTEM EVERY 5 MESSAGES
    adCounter++;
    if(adCounter % 5 === 0) {
        injectAdSystem();
    }

    // Logic for sending message
    if(isFirstMessage) {
        currentChatId = "chat_" + Date.now();
        isFirstMessage = false;
    }

    const messages = document.getElementById("messages");
    messages.innerHTML += `<p class="userText">You: ${text}</p>`;
    currentMessages.push({ role: "user", content: text });
    input.value = "";

    // API Call (Simplified for brevity)
    try {
        let res = await fetch("/api/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: text })
        });
        let reply = (await res.json()).reply;
        let p = document.createElement("p");
        messages.appendChild(p);
        fastType(p, "Quadron: " + reply);
        currentMessages.push({ role: "ai", content: reply });
    } catch(e) {}
}

function fastType(el, text) {
    let span = document.createElement("span");
    span.className = "aiText";
    el.appendChild(span);
    let j = 0;
    let int = setInterval(() => {
        span.innerHTML += text[j++];
        if(j >= text.length) clearInterval(int);
    }, 5);
}

// --- BOOTSTRAP ---
let user = JSON.parse(localStorage.getItem("quadronUser") || '{"name":"Guest"}');
window.onload = () => {
    rebindEventListeners();
    document.getElementById("profileName").textContent = user.name;
    document.getElementById("profilePic").src = user.picture || "https://via.placeholder.com/40";
};

// Functions like loadChatList, saveChat, newChat, etc. remain the same as previous versions
</script>
</body>
</html>
