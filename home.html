<script>

/* MENU BLUR */
const chatSection=document.getElementById("chat");
const footerSection=document.querySelector(".footer");

function openMenu(){
sidePanel.classList.add("open");
overlay.style.display="block";
chatSection.classList.add("blur-bg");
footerSection.classList.add("blur-bg");
}
function closeMenu(){
sidePanel.classList.remove("open");
overlay.style.display="none";
chatSection.classList.remove("blur-bg");
footerSection.classList.remove("blur-bg");
}

/* USER SYSTEM */
let user=JSON.parse(localStorage.getItem("quadronUser")||"{}")

if(!user.name){
user={name:"Guest88",email:"Guest88@fakegmail.com"}
profilePic.style.display="none"
}else{
profilePic.src=user.pic || "https://via.placeholder.com/40"
}

profileName.innerText=user.name
profileEmail.innerText=user.email

/* TRUTH */
let truthMode=false
function toggleTruth(e){
e.stopPropagation()
truthMode=!truthMode
truthToggle.classList.toggle("active",truthMode)
}

/* LANGUAGE DETECTION */
function detectLang(code){
if(code.includes("def ") || code.includes("import ")) return "Python"
if(code.includes("console.log") || code.includes("function")) return "JavaScript"
if(code.includes("#include")) return "C"
if(code.includes("<html") || code.includes("<div")) return "HTML"
return "Code"
}

/* SYNTAX ENGINE */
function highlight(code,lang){

// escape first
code=code.replace(/</g,"&lt;")

// comments
code=code.replace(/(#.*|\/\/.*)/g,'<span class="token-comment">$1</span>')

// strings
code=code.replace(/(['"`].*?['"`])/g,'<span class="token-string">$1</span>')

// numbers
code=code.replace(/\b(\d+)\b/g,'<span class="token-number">$1</span>')

// keywords
let keywords=[
"def","class","return","if","else","elif","for","while","import","from",
"function","var","let","const","int","float","char","void","include"
]

keywords.forEach(k=>{
let reg=new RegExp("\\b"+k+"\\b","g")
code=code.replace(reg,`<span class="token-keyword">${k}</span>`)
})

// functions
code=code.replace(/\b([a-zA-Z_]+)(?=\()/g,'<span class="token-function">$1</span>')

return code
}

/* CODE BOX */
function createCodeBox(code){
let lang=detectLang(code)
let highlighted=highlight(code,lang)

return `
<div class="codeBox">
<div class="codeHeader">
<span>${lang}</span>
<span class="copyBtn" onclick="copyCode(this)">Copy</span>
</div>
<div class="codeContent">${highlighted}</div>
</div>`
}

/* SMART FORMAT */
function formatText(text){

// detect code-like chunks
let lines=text.split("\n")
let result=""
let buffer=""
let isCode=false

lines.forEach(line=>{

let codeScore=0

if(/(def |function|#include|<html|console\.log)/.test(line)) codeScore+=2
if(/[{}();=]/.test(line)) codeScore++
if(/\b\d+\b/.test(line)) codeScore++

if(codeScore>=2){
isCode=true
buffer+=line+"\n"
}else{
if(isCode){
result+=createCodeBox(buffer)
buffer=""
isCode=false
}
result+=line+"<br>"
}
})

if(buffer) result+=createCodeBox(buffer)

return result
}

/* COPY FIX (WORKS EVERYWHERE) */
function copyCode(btn){
let code=btn.parentElement.nextElementSibling.innerText

let textarea=document.createElement("textarea")
textarea.value=code
document.body.appendChild(textarea)
textarea.select()
document.execCommand("copy")
document.body.removeChild(textarea)

btn.innerText="Copied!"
setTimeout(()=>btn.innerText="Copy",1500)
}

/* TYPE ENGINE */
function typeText(text,el){
let i=0
let interval=setInterval(()=>{
el.innerHTML="<b>Quadron:</b> "+formatText(text.slice(0,i))
i++
if(i>text.length) clearInterval(interval)
},10)
}

/* AI */
async function askAI(message){
let truth=truthMode?
"Answer with strict logic, scientific reasoning, no emotions. ":""

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:`${truth}User: ${message}`})
})

let data=await res.json()
return data.reply
}

/* GREETING */
window.onload=async()=>{
let reply=await askAI("Give a short sarcastic greeting.")
let p=document.createElement("p")
messages.appendChild(p)
typeText(reply,p)
}

/* ENTER SEND */
msg.addEventListener("keydown",function(e){
if(e.key==="Enter") send()
})

/* SEND */
async function send(){
let text=msg.value.trim()
if(!text)return

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`
msg.value=""

let p=document.createElement("p")
messages.appendChild(p)

let reply=await askAI(text)
typeText(reply,p)
}

/* NEW CHAT */
function newChat(){messages.innerHTML=""}

</script>
