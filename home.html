<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<link rel="icon" href="favicon.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
/* PREVIOUS UI STYLES - UNCHANGED */
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;transition:.3s;}
.blur-bg{filter:blur(6px);}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 15px #ffd900;align-items: center;}
header div:first-child{font-weight:bold;text-shadow:0 0 15px #ffd900;}
#menuBtn{cursor:pointer;font-size:24px;margin-left: 15px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:500;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}
#menuProfile{display:flex;gap:10px;padding:10px;border-bottom:1px solid #333;cursor:pointer;}
#menuProfile img{width:40px;height:40px;border-radius:50%;border:2px solid #ffd900;box-shadow:0 0 10px #ffd900;}
.menuItem{padding:10px;cursor:pointer;margin-top:8px;font-weight:bold;color:#fff;text-shadow:0 0 8px #fff;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;box-shadow:0 0 20px #ffd900;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;border-radius:20px;box-shadow:0 0 15px #ffd900;}
.userText{color:#ffd900;text-shadow:0 0 10px #ffd900;}
.aiText{color:#fff;text-shadow:0 0 10px #fff;}
.adBox {margin-top: 10px;padding: 15px;border: 2px solid #ffd900;border-radius: 12px;background: #000;text-align: center;cursor: pointer;color: #ffd900;font-weight: bold;animation: adGlow 1.5s infinite alternate;text-decoration: none;display: block;}
@keyframes adGlow { from { box-shadow: 0 0 10px #ffd900; } to { box-shadow: 0 0 25px #ffd900; } }

/* NEW UPGRADE UI ELEMENTS */
#upgradeBtn {
    background: #ffd900;
    color: #000;
    font-weight: bold;
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    box-shadow: 0 0 10px #ffd900;
    transition: 0.3s;
    animation: glowBtn 2s infinite;
    font-size: 13px;
}
@keyframes glowBtn {
    0% { box-shadow: 0 0 5px #ffd900; }
    50% { box-shadow: 0 0 20px #ffd900; }
    100% { box-shadow: 0 0 5px #ffd900; }
}

#planModal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 30px;
    z-index: 2000;
    display: none;
    width: 90%;
    max-width: 500px;
    text-align: center;
}

.plan-card {
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid #ffd900;
    margin: 10px 0;
    padding: 15px;
    border-radius: 12px;
    text-align: left;
}

.plan-card h3 { margin: 0; color: #ffd900; }
.plan-card p { font-size: 12px; margin: 5px 0; color: #fff; }

.unlock-btn {
    width: 100%;
    margin-top: 10px;
    padding: 8px;
    border-radius: 8px;
    font-weight: bold;
}

#badge {
    background: #ffd900;
    color: #000;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    margin-left: 10px;
    display: none;
}
</style>
</head>

<body>

<header>
    <div style="display:flex; align-items:center;">
        <div id="upgradeBtn">UPGRADE</div>
        <div id="badge">FREE</div>
        <div id="menuBtn">☰</div>
    </div>
    <div>Quadron AI</div>
</header>

<div id="overlay"></div>

<div id="planModal">
    <h2 style="color:#ffd900; text-shadow: 0 0 10px #ffd900;">Select Plan</h2>
    
    <div class="plan-card">
        <h3>Free</h3>
        <p>• 10 Messages / Day</p>
        <p>• Contains Ads</p>
        <button class="unlock-btn" onclick="activatePlan('free')">Selected ✅</button>
    </div>

    <div class="plan-card">
        <h3>Plus</h3>
        <p>• 20 Messages / Day</p>
        <p>• No Ads</p>
        <button class="unlock-btn" id="plusBtn" onclick="watchAd('plus')">Watch ad to unlock access</button>
    </div>

    <div class="plan-card">
        <h3>Premium</h3>
        <p>• 100 Messages / Day</p>
        <p>• No Ads | High Sarcasm</p>
        <button class="unlock-btn" id="premiumBtn" onclick="watchAd('premium')">Watch ad to unlock access</button>
    </div>
    <button onclick="closeModal()" style="margin-top:10px; background:transparent; color:#fff; border:1px solid #fff;">Close</button>
</div>

<div id="sidePanel">
  <div id="menuProfile">
    <img id="profilePic">
    <div>
      <div id="profileName"></div>
      <div id="profileEmail" style="font-size:12px;"></div>
    </div>
  </div>
  <div class="menuItem" id="newChatBtn">New Chat</div>
  <div class="menuItem" id="codeModeBtn">Code /</div>
  <div class="menuItem" id="exploreModeBtn">Explore</div>
  <div class="menuItem" id="voiceModeBtn">Voice Mode</div>
  <div id="chatHistory" style="margin-top:15px;overflow:auto;max-height:300px;"></div>
  <div class="menuFooter">Developed by <span>Rawat Systems</span></div>
</div>

<div id="chat">
  <div id="messages"></div>
  <div id="inputArea">
    <input id="msg" placeholder="Type here.....">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
let currentPlan = "free";
let planTimer = null;
let currentChatId = null;
let isFirstMessage = true;
let aiReplyCount = 0;
let db;
let currentMessages = [];

// Logic for Plans & Ads
const upgradeBtn = document.getElementById("upgradeBtn");
const planModal = document.getElementById("planModal");
const badge = document.getElementById("badge");

upgradeBtn.onclick = () => {
    planModal.style.display = "block";
    overlay.style.display = "block";
};

function closeModal() {
    planModal.style.display = "none";
    overlay.style.display = "none";
}

function watchAd(plan) {
    window.open("https://omg10.com/4/10878572", "_blank");
    
    const btn = plan === 'plus' ? document.getElementById("plusBtn") : document.getElementById("premiumBtn");
    const duration = plan === 'plus' ? 180000 : 120000; // 3 min or 2 min
    const msg = plan === 'plus' ? "Unlocked Plus for 3 minutes" : "Unlocked premium for 2 minutes";

    btn.innerHTML = "✅ " + msg;
    btn.style.background = "#4CAF50";
    
    activatePlan(plan, duration);
    setTimeout(closeModal, 1500);
}

function activatePlan(plan, duration = 0) {
    currentPlan = plan;
    badge.textContent = plan.toUpperCase();
    badge.style.display = "block";
    
    if (planTimer) clearTimeout(planTimer);
    
    if (duration > 0) {
        planTimer = setTimeout(() => {
            currentPlan = "free";
            badge.textContent = "FREE";
            alert("Premium access expired. Back to Free mode.");
        }, duration);
    }
}

// Logic for Injected Ads based on Plan
function injectAd(){
  if(currentPlan !== "free") return; // No ads for Plus/Premium
  let ad = document.createElement("a");
  ad.className = "adBox";
  ad.href = "https://omg10.com/4/10878572";
  ad.target = "_blank";
  ad.innerHTML = "SPONSORED AD <br> Click to visit";
  messages.appendChild(ad);
  messages.scrollTop = messages.scrollHeight;
}

// Updated Send function with Limits
async function send(){
  let limit = currentPlan === "free" ? 10 : (currentPlan === "plus" ? 20 : 100);
  let limitKey = "limit_" + (user.email || "guest");
  let limitData = JSON.parse(localStorage.getItem(limitKey)) || {count: 0, date: new Date().toDateString()};
  
  // Reset daily limit if date changed
  if(limitData.date !== new Date().toDateString()){
      limitData.count = 0;
      limitData.date = new Date().toDateString();
  }

  if(limitData.count >= limit){
      alert(`DAILY LIMIT OF ${limit} REACHED FOR ${currentPlan.toUpperCase()} PLAN`);
      return;
  }

  let text=msg.value.trim();
  if(!text)return;
  
  limitData.count++;
  localStorage.setItem(limitKey, JSON.stringify(limitData));

  // Chat logic (Keep same)
  messages.innerHTML+=`<p class="userText">You: ${text}</p>`;
  currentMessages.push({ role: "user", content: text });
  msg.value="";

  let p=document.createElement("p");
  messages.appendChild(p);

  // Apply Sarcasm if Premium
  let finalPrompt = text;
  if(currentPlan === "premium"){
      finalPrompt = "Respond with high sarcasm and wit: " + text;
  }

  let res=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ message: finalPrompt })
  });
  let reply=(await res.json()).reply;

  fastType(p,"Quadron: "+reply);
  currentMessages.push({ role: "ai", content: reply });
}

// Helper: FastType with ad check
function fastType(el,text){
  let span=document.createElement("span");
  span.className="aiText";
  el.appendChild(span);
  let i = 0;
  let int = setInterval(()=>{
    span.innerHTML += text[i++];
    if(i >= text.length){
      clearInterval(int);
      aiReplyCount++;
      if(aiReplyCount % 4 === 0) injectAd();
    }
  }, 5);
}

// DB & Profile logic (Keep same as original)
let req = indexedDB.open("quadronDB", 1);
req.onsuccess = e => { db = e.target.result; };
const menuBtn = document.getElementById("menuBtn");
const overlay = document.getElementById("overlay");
const sidePanel = document.getElementById("sidePanel");
const messages = document.getElementById("messages");
const msg = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");
sendBtn.onclick = send;

menuBtn.onclick = () => { sidePanel.classList.add("open"); overlay.style.display="block"; };
overlay.onclick = () => { closeModal(); sidePanel.classList.remove("open"); overlay.style.display="none"; };
msg.addEventListener("keydown",e=>{if(e.key==="Enter") send();});

let user = JSON.parse(localStorage.getItem("quadronUser") || '{"name":"Guest"}');
document.getElementById("profileName").textContent = user.name;
document.getElementById("profilePic").src = "https://via.placeholder.com/40";
</script>
</body>
</html>
