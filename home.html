<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<link rel="icon" href="favicon.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;transition:.3s;}
.blur-bg{filter:blur(6px);}

header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 15px #ffd900;}
header div:first-child{font-weight:bold;text-shadow:0 0 15px #ffd900;}
#menuBtn{cursor:pointer;font-size:24px;}

#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:500;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}

#menuProfile{display:flex;gap:10px;padding:10px;border-bottom:1px solid #333;cursor:pointer;}
#menuProfile img{width:40px;height:40px;border-radius:50%;border:1px solid #ffd900;}

.menuItem{padding:10px;cursor:pointer;margin-top:8px;font-weight:bold;text-shadow:0 0 10px #fff;}

.menuFooter{margin-top:auto;text-align:center;font-size:12px;}
.menuFooter .dev{color:#fff;text-shadow:0 0 10px #fff;}
.menuFooter .brand{color:#ffd900;text-shadow:0 0 10px #ffd900;}

#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;box-shadow:0 0 20px #ffd900;}

#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}

button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;border-radius:20px;box-shadow:0 0 15px #ffd900;}

.userText{color:#ffd900;text-shadow:0 0 10px #ffd900;}
.aiText{color:#fff;text-shadow:0 0 10px #fff;}

.codeBox{background:#000;border:1px solid #ffd900;margin-top:8px;border-radius:8px;overflow:hidden;position:relative;}
.codeHeader{display:flex;justify-content:space-between;padding:6px;background:#111;font-size:12px;border-bottom:1px solid #ffd900;}
.copyBtn{cursor:pointer;padding:4px 8px;border:1px solid #fff;border-radius:4px;margin-left:5px;color:#fff;}

.spinner{position:absolute;width:20px;height:20px;border:3px solid #fff;border-top:3px solid transparent;border-radius:50%;animation:spin 1s linear infinite;top:35px;left:10px;}
@keyframes spin{100%{transform:rotate(360deg);}}

.footer{text-align:center;font-size:12px;margin:10px;color:#fff;text-shadow:0 0 10px #fff;}
.footer a{color:#ffd900;text-shadow:0 0 15px #ffd900;text-decoration:none;}
</style>
</head>

<body>

<header>
<div>Quadron AI</div>
<div id="menuBtn">☰</div>
</header>

<div id="overlay"></div>

<div id="sidePanel">
<div id="menuProfile">
<img id="profilePic">
<div>
<div id="profileName"></div>
<div id="profileEmail" style="font-size:12px;"></div>
</div>
</div>

<div class="menuItem" onclick="menuAction(newChat)">New Chat</div>
<div class="menuItem" onclick="openNewWindow('code')">Code /</div>
<div class="menuItem" onclick="openNewWindow('explore')">Explore</div>
<div class="menuItem" onclick="voiceMode()">Voice Mode</div>

<div class="menuFooter">
<span class="dev">Developed by</span> <span class="brand">Rawat Systems</span>
</div>
</div>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="Type here.....">
<button onclick="send()">Send</button>
</div>
</div>

<div class="footer">
Quadron AI can make mistakes, by using it you accept our 
<a href="terms.html">Terms & Conditions</a>
</div>

<script>
let usage=JSON.parse(localStorage.getItem("usage"))||{count:0,time:Date.now()};

/* RESET AFTER 24H */
if(Date.now()-usage.time>86400000){
usage={count:0,time:Date.now()};
}

/* LIMIT CHECK */
function canUse(){
if(usage.count>=100){
messages.innerHTML+=`<p class="aiText">Quadron: Daily limit exceeded</p>`;
return false;
}
usage.count++;
localStorage.setItem("usage",JSON.stringify(usage));
return true;
}

/* MENU */
menuBtn.onclick=()=>{sidePanel.classList.add("open");overlay.style.display="block";chat.classList.add("blur-bg");};
overlay.onclick=()=>{sidePanel.classList.remove("open");overlay.style.display="none";chat.classList.remove("blur-bg");};

function menuAction(fn){sidePanel.classList.remove("open");overlay.style.display="none";chat.classList.remove("blur-bg");fn();}

/* NEW WINDOW MODES */
function openNewWindow(type){
window.open(window.location.href+"?mode="+type,"_blank");
}

/* BACK STORAGE */
let lastCodeData=null;

/* SEND */
async function send(){
if(!canUse()) return;

let text=msg.value.trim();
if(!text)return;

messages.innerHTML+=`<p class="userText">You: ${text}</p>`;
msg.value="";

let p=document.createElement("p");
messages.appendChild(p);

let res=await fetch("/api/chat",{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})});

let reply=(await res.json()).reply;

let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);

if(m){
let lang=m[1]||"html";
let code=m[2];

lastCodeData={lang,code};

let box=createCodeBox(lang,code);
p.appendChild(box);

}else{
p.innerHTML=`<span class="aiText">Quadron: ${reply}</span>`;
}
}

/* CREATE CODE BOX */
function createCodeBox(lang,code){
let box=document.createElement("div");
box.className="codeBox";
box.dataset.code=code;
box.dataset.lang=lang;

box.innerHTML=`
<div class="codeHeader">
<span>&lt;/&gt; ${lang}</span>
<div>
<span class="copyBtn" onclick="copyCode(this)">Copy</span>
<span class="copyBtn" onclick="runCode(this)">Run</span>
<span class="copyBtn" onclick="debugCode(this)">Debug</span>
</div>
</div>
<pre>${code}</pre>
`;

hljs.highlightElement(box.querySelector("pre"));
return box;
}

/* COPY WITH TEXT */
function copyCode(btn){
navigator.clipboard.writeText(btn.closest(".codeBox").dataset.code);
btn.innerText="Copied !";
setTimeout(()=>btn.innerText="Copy",1500);
}

/* RUN WITH BACK */
function runCode(btn){
let box=btn.closest(".codeBox");

let iframe=document.createElement("iframe");
iframe.style.width="100%";
iframe.style.height="250px";

let back=document.createElement("div");
back.className="copyBtn";
back.innerText="Back";
back.onclick=()=>restoreCode(box);

box.innerHTML="";
box.appendChild(back);
box.appendChild(iframe);

iframe.srcdoc=box.dataset.code;
}

/* BACK RESTORE */
function restoreCode(box){
let {lang,code}=lastCodeData;
let newBox=createCodeBox(lang,code);
box.replaceWith(newBox);
}

/* DEBUG */
async function debugCode(btn){
let box=btn.closest(".codeBox");
let code=box.dataset.code;

let res=await fetch("/api/chat",{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:"ONLY FIX CODE\n"+code})});

let newCode=(await res.json()).reply.replace(/```[\s\S]*?\n|```/g,"");

box.dataset.code=newCode;
box.querySelector("pre").textContent=newCode;
hljs.highlightElement(box.querySelector("pre"));
}

/* CHAT RESET */
function newChat(){messages.innerHTML="";}

msg.addEventListener("keydown",e=>{if(e.key==="Enter") send();});
</script>

</body>
</html>
