<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<link rel="icon" href="favicon.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
/* SAME UI - UNCHANGED */
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;transition:.3s;}
.blur-bg{filter:blur(6px);}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 15px #ffd900;}
header div:first-child{font-weight:bold;text-shadow:0 0 15px #ffd900;}
#menuBtn{cursor:pointer;font-size:24px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:500;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}
#menuProfile{display:flex;gap:10px;padding:10px;border-bottom:1px solid #333;cursor:pointer;}
#menuProfile img{width:40px;height:40px;border-radius:50%;border:2px solid #ffd900;box-shadow:0 0 10px #ffd900;transition:0.2s;}
#profileName{font-weight:bold;color:#ffd900;text-shadow:0 0 10px #ffd900;transition:0.2s;}
#profileEmail{color:#ffd900;text-shadow:0 0 8px #ffd900;transition:0.2s;}
.menuItem{padding:10px;cursor:pointer;margin-top:8px;font-weight:bold;color:#fff;text-shadow:0 0 8px #fff, 0 0 15px #fff;transition:0.2s;}
.menuItem:hover{text-shadow:0 0 15px #fff, 0 0 30px #fff, 0 0 50px #fff;}
#chatHistory div {padding: 6px;cursor: pointer;color: #ffd900;font-weight: bold;text-shadow: 0 0 6px #ffd900, 0 0 12px #ffd900;transition: 0.3s;}
#chatHistory div:hover {color: #ffd900;text-shadow: 0 0 10px #ffd900, 0 0 20px #ffd900, 0 0 40px #ffd900, 0 0 70px #ffd900;}
.menuFooter{margin-top:auto;text-align:center;font-size:12px;color:#fff;text-shadow:0 0 10px #fff;}
.menuFooter span{color:#ffd900;text-shadow:0 0 10px #ffd900;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;box-shadow:0 0 20px #ffd900;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
input::placeholder{color:rgba(255,255,255,0.3);}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;border-radius:20px;box-shadow:0 0 15px #ffd900;transition:.2s;}
button:hover{box-shadow:0 0 35px #ffd900;}
.userText{color:#ffd900;text-shadow:0 0 10px #ffd900;}
.aiText{color:#fff;text-shadow:0 0 10px #fff;}
.footer{text-align:center;font-size:12px;margin:10px;color:#fff;text-shadow:0 0 10px #fff;}
.footer a{color:#ffd900;text-shadow:0 0 15px #ffd900;text-decoration:none;}
.codeBox{background:#000;border:1px solid #ffd900;border-radius:10px;margin-top:10px;overflow:hidden;}
.codeTop{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #ffd900;}
.codeTitle{color:#fff;text-shadow:0 0 10px #fff;}
.codeBtns span{margin-left:10px;cursor:pointer;color:#fff;text-shadow:0 0 10px #fff;}
.backBtn{color:#ffd900;text-shadow:0 0 10px #ffd900;cursor:pointer;}
.loader{width:20px;height:20px;border:3px solid #fff;border-top:3px solid transparent;border-radius:50%;animation:spin 1s linear infinite;margin:5px;}
@keyframes spin{100%{transform:rotate(360deg);}}
.sourceBox{display:flex;align-items:center;gap:10px;margin-top:10px;padding:10px;border:1px solid #fff;border-radius:10px;cursor:pointer;transition:0.2s;box-shadow:0 0 10px #fff;}
.sourceBox img{width:20px;height:20px;}
.sourceText{display:flex;flex-direction:column;}
.sourceTitle{color:#fff;font-size:14px;text-shadow:0 0 5px #fff;}
.sourceLink{color:#aaa;font-size:12px;}
</style>
</head>

<body>

<header>
  <div>Quadron AI</div>
  <div id="menuBtn">☰</div>
</header>

<div id="overlay"></div>

<div id="sidePanel">
  <div id="menuProfile">
    <img id="profilePic">
    <div>
      <div id="profileName"></div>
      <div id="profileEmail" style="font-size:12px;"></div>
    </div>
  </div>
  <div class="menuItem" id="newChatBtn">New Chat</div>
  <div class="menuItem" id="codeModeBtn">Code /</div>
  <div class="menuItem" id="exploreModeBtn">Explore</div>
  <div class="menuItem" id="voiceModeBtn">Voice Mode</div>
  <div id="chatHistory" style="margin-top:15px;overflow:auto;max-height:300px;"></div>
  <div class="menuFooter">Developed by <span>Rawat Systems</span></div>
</div>

<div id="chat">
  <div id="messages"></div>
  <div id="inputArea">
    <input id="msg" placeholder="Type here.....">
    <button id="sendBtn">Send</button>
  </div>
</div>

<div class="footer">Quadron AI can make mistakes, by using it you accept our <a href="terms.html">Terms & Conditions</a></div>

<script>
// --- AD TRIGGER LOGIC ---
let adCounter = 0;
let adArmed = false;
let adFired = false;

function setupAdTrigger() {
  const handler = (e) => {
    if (!adArmed || adFired) return;
    e.stopImmediatePropagation();
    
    let adScript = document.createElement("script");
    adScript.dataset.zone = "10874922";
    adScript.src = "https://al5sm.com/tag.min.js";
    document.body.appendChild(adScript);

    adFired = true;

    // Notify user after 25 seconds
    setTimeout(() => {
      alert("Please refresh the page to avoid further popunders.");
    }, 25000);

    window.removeEventListener("click", handler, true);
    window.onclick = null;
    document.onclick = null;
  };
  window.addEventListener("click", handler, true);
}
setupAdTrigger();

// --- DB & CORE ---
let currentChatId = null, isFirstMessage = true, db, currentMessages = [];
let req = indexedDB.open("quadronDB", 1);
req.onupgradeneeded = e => { db = e.target.result; db.createObjectStore("chats", { keyPath: "id" }); };
req.onsuccess = e => { db = e.target.result; loadChatList(); };

function saveChat(id, data){
  let tx = db.transaction("chats", "readwrite");
  let store = tx.objectStore("chats");
  let getReq = store.get(id);
  getReq.onsuccess = () => {
    let ex = getReq.result || {};
    store.put({ id, title: data.title || ex.title || "New Chat", messages: data.messages || ex.messages || [] });
  };
}

function loadChatList(){
  let history = document.getElementById("chatHistory"); history.innerHTML = "";
  let tx = db.transaction("chats", "readonly");
  let store = tx.objectStore("chats");
  store.openCursor().onsuccess = e => {
    let cursor = e.target.result;
    if(cursor){
      let div = document.createElement("div"); div.textContent = cursor.value.title;
      let cid = cursor.value.id;
      div.onclick = () => {
        let tx2 = db.transaction("chats", "readonly");
        let s2 = tx2.objectStore("chats");
        let r2 = s2.get(cid); r2.onsuccess = () => { if(r2.result) loadChat(r2.result); };
      };
      history.appendChild(div); cursor.continue();
    }
  };
}

function loadChat(chatData){
  currentChatId = chatData.id; isFirstMessage = false;
  currentMessages = Array.isArray(chatData.messages) ? chatData.messages : [];
  messages.innerHTML = ""; closeMenu();
  currentMessages.forEach(m=>{
    let p = document.createElement("p");
    if(m.role === "user"){ p.className = "userText"; p.textContent = "You: " + m.content; messages.appendChild(p); }
    else { messages.appendChild(p); if(m.type === "code") createCodeBox(p, m.content, true); else { p.className = "aiText"; p.textContent = "Quadron: " + m.content; } }
  });
}

const menuBtn = document.getElementById("menuBtn"), overlay = document.getElementById("overlay"), sidePanel = document.getElementById("sidePanel"), messages = document.getElementById("messages"), msg = document.getElementById("msg"), sendBtn = document.getElementById("sendBtn");
sendBtn.onclick = send;

let userRaw = localStorage.getItem("quadronUser"), user = userRaw === "guest" ? {name:"Guest",email:"guest@mode",picture:"https://via.placeholder.com/40"} : JSON.parse(userRaw || '{"name":"Guest"}');
document.getElementById("profileName").textContent = user.name || "Guest";
document.getElementById("profileEmail").textContent = user.email || "";
document.getElementById("profilePic").src = user.picture || "https://via.placeholder.com/40";

menuBtn.onclick = () => { sidePanel.classList.add("open"); overlay.style.display="block"; document.getElementById("chat").classList.add("blur-bg"); };
overlay.onclick = closeMenu;
function closeMenu(){ sidePanel.classList.remove("open"); overlay.style.display="none"; document.getElementById("chat").classList.remove("blur-bg"); }

let mode="normal";
function newChat(){ mode="normal"; messages.innerHTML=""; currentChatId = null; isFirstMessage = true; }
document.getElementById("newChatBtn").onclick = () => { closeMenu(); newChat(); };
document.getElementById("codeModeBtn").onclick = () => { closeMenu(); mode="code"; messages.innerHTML=""; fastType(messages,"Describe What You Want To Code"); };
document.getElementById("exploreModeBtn").onclick = () => { closeMenu(); mode="explore"; messages.innerHTML=""; fastType(messages,"Explore The Universe"); };
document.getElementById("voiceModeBtn").onclick = () => { window.location.href="voice.html"; };

function fastType(el,text){
  let span=document.createElement("span"); span.className="aiText"; el.appendChild(span);
  let parts = text.split(/(<a.*?>.*?<\/a>)/g), i = 0;
  function tp(){
    if(i >= parts.length) return;
    let part = parts[i];
    if(part.startsWith("<a")){ span.innerHTML += part; i++; tp(); }
    else { let j = 0; let int = setInterval(()=>{ span.innerHTML += part[j++]; if(j >= part.length){ clearInterval(int); i++; tp(); } }, 2); }
  }
  tp();
}

async function send(){
  let text = msg.value.trim(); if(!text) return;
  adCounter++; if(adCounter >= 15) adArmed = true;

  if(isFirstMessage){
    currentChatId = "chat_" + Date.now(); saveChat(currentChatId,{ title: "New Chat", messages: [] });
    isFirstMessage = false;
  }
  messages.innerHTML += `<p class="userText">You: ${text}</p>`;
  currentMessages.push({ role: "user", content: text });
  msg.value = ""; let p = document.createElement("p"); messages.appendChild(p);

  let finalPrompt = text;
  if(mode==="code") finalPrompt = `Output ONLY complete code, no markdown, no explanation: ${text}`;
  
  try {
    let res = await fetch("/api/chat",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ message: finalPrompt }) });
    let reply = (await res.json()).reply;
    if(mode==="code"){
      reply = reply.replace(/```[\w]*/g,"").replace(/```/g,"").trim();
      createCodeBox(p, reply);
      currentMessages.push({ role: "ai", content: reply, type: "code" });
    } else {
      fastType(p, "Quadron: " + reply);
      currentMessages.push({ role: "ai", content: reply });
    }
    saveChat(currentChatId, { title: "Chat", messages: currentMessages });
  } catch(e){ p.textContent = "Error."; }
}

function createCodeBox(parent, code, instant=false){
  let box=document.createElement("div"); box.className="codeBox";
  let top=document.createElement("div"); top.className="codeTop";
  let title=document.createElement("div"); title.className="codeTitle";
  
  function detect(c){ if(c.includes("<html")) return "HTML File"; if(c.includes("function") || c.includes("=>")) return "JS File"; return "Code"; }
  title.innerHTML = "</> " + detect(code);
  
  let btns=document.createElement("div"); btns.className="codeBtns";
  let copy=document.createElement("span"); copy.textContent="Copy";
  let run=document.createElement("span"); run.textContent="Run";
  let debug=document.createElement("span"); debug.textContent="Debugg";
  btns.append(copy, run, debug); top.append(title, btns);
  
  let loaderWrap = document.createElement("div"); loaderWrap.style.display="flex"; loaderWrap.style.paddingLeft="8px";
  let loader = document.createElement("div"); loader.className="loader"; loaderWrap.appendChild(loader);
  
  let pre=document.createElement("pre"); box.append(top, loaderWrap, pre); parent.appendChild(box);

  if(instant){ pre.textContent = code; loaderWrap.remove(); hljs.highlightElement(pre); }
  else {
    let i=0, txt="";
    let int=setInterval(()=>{
      txt+=code[i++]; pre.textContent=txt;
      if(i>=code.length){ clearInterval(int); loaderWrap.remove(); hljs.highlightElement(pre); }
    }, 1);
  }

  copy.onclick=()=>{ navigator.clipboard.writeText(code); copy.textContent="Copied !"; setTimeout(()=>copy.textContent="Copy",1500); };
  run.onclick=()=>{
    pre.style.display="none"; let ifr=document.createElement("iframe");
    ifr.style.width="100%"; ifr.style.height="300px";
    let back=document.createElement("div"); back.className="backBtn"; back.textContent="Back";
    top.innerHTML=""; top.append(title, back); box.appendChild(ifr);
    ifr.contentDocument.write(code);
    back.onclick=()=>{ ifr.remove(); pre.style.display="block"; top.innerHTML=""; top.append(title, btns); };
  };
}

msg.addEventListener("keydown",e=>{if(e.key==="Enter") send();});
</script>
</body>
</html>
