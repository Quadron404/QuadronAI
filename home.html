<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Highlight.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#000;border-bottom:2px solid #ffd900;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;box-shadow:0 0 15px #ffd900;border-radius:12px;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;}
.codeBox{background:#000;border:1px solid #ffd900;margin-top:8px;border-radius:8px;overflow:auto;font-family:monospace;white-space:pre;line-height:1.3em;position:relative;}
.codeHeader{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#111;font-size:12px;font-weight:bold;border-bottom:1px solid #ffd900;}
.copyBtn{cursor:pointer;color:#ffd900;padding:2px 6px;border:1px solid #ffd900;border-radius:4px;font-size:12px;}
.codeContent{padding:10px;overflow:auto;white-space:pre;}
.spinnerInCode{position:absolute;top:6px;left:6px;width:20px;height:20px;border:3px solid #ffd900;border-top:3px solid transparent;border-radius:50%;animation:spin 1s linear infinite;display:none;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="chat">
<div id="messages"></div>
<div id="inputArea">
<input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<script>
const messages=document.getElementById("messages");
const msg=document.getElementById("msg");

// Copy code function
function copyCode(btn){
  let code=btn.parentElement.nextElementSibling.innerText;
  let textarea=document.createElement("textarea");textarea.value=code;document.body.appendChild(textarea);textarea.select();document.execCommand("copy");document.body.removeChild(textarea);
  btn.innerText="Copied!";setTimeout(()=>btn.innerText="Copy",1500);
}

// Typing code inside box
async function typeInCodeBox(codeBox, code){
  const codeEl = codeBox.querySelector("code");
  const spinner = codeBox.querySelector(".spinnerInCode");
  spinner.style.display="block";
  let lines = code.split("\n");
  for (let line of lines){
    codeEl.textContent += line + "\n";
    hljs.highlightElement(codeEl);
    codeBox.scrollTop = codeBox.scrollHeight;
    await new Promise(r=>setTimeout(r,50));
  }
  spinner.style.display="none";
}

// Parse AI response
async function handleAIResponse(text){
  let open=false;
  let codeBuffer="";
  let language="python";
  const p=document.createElement("p");
  messages.appendChild(p);

  const parts=text.split(/(<OPEN>|<CLOSE>|<LANG:.*?>)/g);
  for(let part of parts){
    if(part.startsWith("<LANG:")){language = part.replace("<LANG:","").replace(">",""); continue;}
    if(part=="<OPEN"){open=true;
      // Create code box immediately
      var codeBox = document.createElement("div");
      codeBox.className="codeBox";
      codeBox.innerHTML=`<div class="codeHeader">${language.toUpperCase()} <span class="copyBtn" onclick="copyCode(this)">Copy</span></div><pre class="codeContent"><code class="language-${language}"></code></pre><div class="spinnerInCode"></div>`;
      messages.appendChild(codeBox);
      continue;
    }
    if(part=="<CLOSE"){open=false;
      if(codeBuffer.trim()!="") await typeInCodeBox(codeBox, codeBuffer.trim());
      codeBuffer=""; continue;
    }
    if(open){codeBuffer += part;} 
    else {p.innerHTML += part.replace(/\n/g,"<br>");}
  }
}

// Simulate sending message to AI
async function askAI(text){
  // For demo, we simulate AI response with <OPEN> code example
  if(text.toLowerCase().includes("code")){
    return `<OPEN><LANG:python>
import random

def greet():
    greeting = random.choice(["Hello, human!", "Hey there, bot friend!", "Greetings, puny mortal!"])
    return greeting

def respond(input):
    responses = {
        "hello": ["Hi! 👋", "Hey, what's up? 😊"],
        "how are you": ["I'm good, thanks! 😄", "I'm a bot, what's the opposite of fine? 😜"],
        "what's your purpose": ["To assist you, human, of course!", "To drive you insane with endless trivia, muahahaha! 😈"]
    }
    try:
        return random.choice(responses[input.lower()])
    except KeyError:
        return "That's a weird question. Try again, human! 🤔"

def main():
    print(greet())
    while True:
        user_input = input("> ")
        print(respond(user_input))

if __name__=="__main__":
    main()
<CLOSE>`;
  }
  else return "Quadron: Haha, you want code? Type 'code'!";
}

// Handle sending
async function send(){
  let text=msg.value.trim(); if(!text) return; msg.value="";
  messages.innerHTML += `<p><b>You:</b> ${text}</p>`;
  let reply = await askAI(text);
  await handleAIResponse(reply);
}
</script>

</body>
</html>
