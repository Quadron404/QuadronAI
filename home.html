<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<link rel="icon" href="favicon.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
/* UI STYLES - EXACTLY THE SAME */
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;transition:.3s; overflow-x: hidden;}
.blur-bg{filter:blur(6px);}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 15px #ffd900;}
header div:first-child{font-weight:bold;text-shadow:0 0 15px #ffd900;}
#menuBtn{cursor:pointer;font-size:24px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:500;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}
#menuProfile{display:flex;gap:10px;padding:10px;border-bottom:1px solid #333;cursor:pointer;}
#menuProfile img{width:40px;height:40px;border-radius:50%;border:2px solid #ffd900;box-shadow:0 0 10px #ffd900;transition:0.2s;}
#profileName{font-weight:bold;color:#ffd900;text-shadow:0 0 10px #ffd900;transition:0.2s;}
#profileEmail{color:#ffd900;text-shadow:0 0 8px #ffd900;transition:0.2s;}
.menuItem{padding:10px;cursor:pointer;margin-top:8px;font-weight:bold;color:#fff;text-shadow:0 0 8px #fff, 0 0 15px #fff;transition:0.2s;}
.menuItem:hover{text-shadow:0 0 15px #fff, 0 0 30px #fff, 0 0 50px #fff;}
#chatHistory div {padding: 6px;cursor: pointer;color: #ffd900;font-weight: bold;text-shadow: 0 0 6px #ffd900, 0 0 12px #ffd900;transition: 0.3s;}
#chatHistory div:hover {color: #ffd900;text-shadow: 0 0 10px #ffd900, 0 0 20px #ffd900, 0 0 40px #ffd900, 0 0 70px #ffd900;}
.menuFooter{margin-top:auto;text-align:center;font-size:12px;color:#fff;text-shadow:0 0 10px #fff;}
.menuFooter span{color:#ffd900;text-shadow:0 0 10px #ffd900;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:55vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;box-shadow:0 0 20px #ffd900;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
input::placeholder{color:rgba(255,255,255,0.3);}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;border-radius:20px;box-shadow:0 0 15px #ffd900;transition:.2s;}
button:hover{box-shadow:0 0 35px #ffd900;}
.userText{color:#ffd900;text-shadow:0 0 10px #ffd900;}
.aiText{color:#fff;text-shadow:0 0 10px #fff;}
.footer{text-align:center;font-size:12px;margin:10px;color:#fff;text-shadow:0 0 10px #fff;}
.footer a{color:#ffd900;text-shadow:0 0 15px #ffd900;text-decoration:none;}

/* NEW AD FIX: iFrame containers to prevent invisible overlays on UI */
.ad-frame {
    width: 100%;
    height: 100px; /* Adjust height based on your ad size */
    border: none;
    margin: 10px 0;
    background: transparent;
}
</style>
</head>

<body>

<header>
  <div>Quadron AI</div>
  <div id="menuBtn">☰</div>
</header>

<div id="overlay"></div>

<div id="sidePanel">
  <div id="menuProfile">
    <img id="profilePic">
    <div>
      <div id="profileName"></div>
      <div id="profileEmail" style="font-size:12px;"></div>
    </div>
  </div>
  <div class="menuItem" id="newChatBtn">New Chat</div>
  <div class="menuItem" id="codeModeBtn">Code /</div>
  <div class="menuItem" id="exploreModeBtn">Explore</div>
  <div class="menuItem" id="voiceModeBtn">Voice Mode</div>
  <div id="chatHistory" style="margin-top:15px;overflow:auto;max-height:300px;"></div>
  <div class="menuFooter">Developed by <span>Rawat Systems</span></div>
</div>

<div id="chat">
  <iframe class="ad-frame" srcdoc="<html><body style='margin:0;display:flex;justify-content:center;align-items:center;'><script>(function(s){s.dataset.zone='10874144',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))<\/script></body></html>"></iframe>

  <div id="messages"></div>
  
  <div id="inputArea">
    <input id="msg" placeholder="Type here.....">
    <button id="sendBtn">Send</button>
  </div>

  <iframe class="ad-frame" srcdoc="<html><body style='margin:0;display:flex;justify-content:center;align-items:center;'><script>(function(s){s.dataset.zone='10874146',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))<\/script></body></html>"></iframe>
</div>

<div class="footer">
  Quadron AI can make mistakes, by using it you accept our
  <a href="terms.html">Terms & Conditions</a>
</div>

<script>
/* LOGIC - UNCHANGED */
let currentChatId = null;
let isFirstMessage = true;
let db;
let currentMessages = [];
let req = indexedDB.open("quadronDB", 1);

req.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("chats", { keyPath: "id" });
};

req.onsuccess = e => {
  db = e.target.result;
  loadChatList();
};

function saveChat(id, data){
  let tx = db.transaction("chats", "readwrite");
  let store = tx.objectStore("chats");
  let getReq = store.get(id);
  getReq.onsuccess = () => {
    let existing = getReq.result || {};
    store.put({
      id,
      title: data.title || existing.title || "New Chat",
      messages: data.messages || existing.messages || []
    });
  };
}

function loadChatList(){
  let history = document.getElementById("chatHistory");
  history.innerHTML = "";
  let tx = db.transaction("chats", "readonly");
  let store = tx.objectStore("chats");
  store.openCursor().onsuccess = e => {
    let cursor = e.target.result;
    if(cursor){
      let div = document.createElement("div");
      div.textContent = cursor.value.title;
      let chatId = cursor.value.id;
      div.onclick = () => {
        let tx = db.transaction("chats", "readonly");
        let store = tx.objectStore("chats");
        let req = store.get(chatId);
        req.onsuccess = () => { if(req.result) loadChat(req.result); };
      };
      history.appendChild(div);
      cursor.continue();
    }
  };
}

function loadChat(chatData){
  currentChatId = chatData.id;
  isFirstMessage = false;
  currentMessages = Array.isArray(chatData.messages) ? chatData.messages : [];
  messages.innerHTML = "";
  closeMenu();
  currentMessages.forEach(m=>{
    if(m.role === "user"){
      let p = document.createElement("p");
      p.className = "userText";
      p.textContent = "You: " + m.content;
      messages.appendChild(p);
    }else{
      let p = document.createElement("p");
      messages.appendChild(p);
      if(m.type === "code"){ createCodeBox(p, m.content, true); }
      else{ p.className = "aiText"; p.textContent = "Quadron: " + m.content; }
    }
  });
}

const menuBtn = document.getElementById("menuBtn");
const overlay = document.getElementById("overlay");
const sidePanel = document.getElementById("sidePanel");
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");
const msg = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");
sendBtn.onclick = send;

const profileName = document.getElementById("profileName");
const profileEmail = document.getElementById("profileEmail");
const profilePic = document.getElementById("profilePic");

let userRaw = localStorage.getItem("quadronUser");
let user = {};
try { user = JSON.parse(userRaw) || { name: "Guest", email: "guest@mode", picture: "https://via.placeholder.com/40" }; } catch(e) { user = { name: "Guest", email: "", picture: "https://via.placeholder.com/40" }; }

profileName.textContent = user.name || "Guest";
profileEmail.textContent = user.email || "";
profilePic.src = user.picture || "https://via.placeholder.com/40";

menuBtn.addEventListener("click", ()=>{ sidePanel.classList.add("open"); overlay.style.display="block"; chat.classList.add("blur-bg"); });
overlay.onclick = closeMenu;

function closeMenu(){ sidePanel.classList.remove("open"); overlay.style.display="none"; chat.classList.remove("blur-bg"); }
function menuAction(fn){ closeMenu(); if(fn) fn(); }

let mode="normal";
function resetChat(){messages.innerHTML="";}
function newChat(){ mode="normal"; resetChat(); currentChatId = null; isFirstMessage = true; }
function codeMode(){mode="code";resetChat();fastType(messages,"Describe What You Want To Code");}
function exploreMode(){mode="explore";resetChat();fastType(messages,"Explore The Universe");}

document.getElementById("newChatBtn").onclick=()=>menuAction(newChat);
document.getElementById("codeModeBtn").onclick=()=>menuAction(codeMode);
document.getElementById("exploreModeBtn").onclick=()=>menuAction(exploreMode);
document.getElementById("voiceModeBtn").onclick=()=>{closeMenu(); window.location.href="voice.html";};

function fastType(el,text){
  let span=document.createElement("span");
  span.className="aiText";
  el.appendChild(span);
  let j = 0;
  let int = setInterval(()=>{
    span.innerHTML += text[j++];
    if(j >= text.length){ clearInterval(int); }
  }, 5);
}

async function send(){
  let text=msg.value.trim();
  if(!text)return;
  if(isFirstMessage){
    currentChatId = "chat_" + Date.now();
    saveChat(currentChatId,{ title: text.substring(0,20), messages: [] });
    isFirstMessage = false;
  }
  messages.innerHTML+=`<p class="userText">You: ${text}</p>`;
  currentMessages.push({ role: "user", content: text });
  msg.value="";
  let p=document.createElement("p");
  messages.appendChild(p);
  
  // Dummy response logic for UI test
  setTimeout(() => {
    let reply = "I am Quadron. How can I help with your code?";
    p.className = "aiText";
    p.textContent = "Quadron: " + reply;
    currentMessages.push({ role: "ai", content: reply });
    saveChat(currentChatId, { title: "Chat", messages: currentMessages });
    messages.scrollTop = messages.scrollHeight;
  }, 500);
}

msg.addEventListener("keydown",e=>{if(e.key==="Enter") send();});
</script>
</body>
</html>
