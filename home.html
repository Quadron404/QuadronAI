<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ✅ SAME UI — untouched */
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
.blur-bg{filter:blur(5px);}
header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 12px #ffd900;}
#logo{font-weight:bold;font-size:18px;}
#menuBtn{cursor:pointer;font-size:24px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:900;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;overflow-y:auto;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}
#menuProfile{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid #333;}
#menuProfile img{width:40px;height:40px;border-radius:50%;border:1px solid #ffd900;object-fit:cover;}
.menuItem{padding:10px;cursor:pointer;margin-top:8px;color:#ffd900;font-weight:bold;transition:0.2s;position:relative;}
.menuItem:hover{color:#ffd900;text-shadow:0 0 10px #ffd900;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;box-shadow:0 0 15px #ffd900;border-radius:12px;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
button{padding:10px;background:#ffd900;color:#000;border:none;box-shadow:0 0 12px #ffd900;cursor:pointer;}
.codeBox{background:#000;border:1px solid #ffd900;margin-top:8px;border-radius:8px;overflow:hidden;font-family:monospace;position:relative;}
.codeHeader{display:flex;justify-content:space-between;padding:6px 10px;background:#111;border-bottom:1px solid #ffd900;}
.codeContent{padding:10px;white-space:pre;}
.spinner{position:absolute;width:16px;height:16px;border:3px solid #ffd900;border-top:3px solid transparent;border-radius:50%;animation:spin 1s linear infinite;top:8px;left:8px;}
@keyframes spin{100%{transform:rotate(360deg);}}
.footer{text-align:center;font-size:12px;margin:10px;}
.footer a{color:#ffd900;text-decoration:none;}
.menuFooter{text-align:center;font-size:12px;}
</style>
</head>

<body>

<header>
<div id="logo">Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">
<div id="menuProfile">
<img id="profilePic">
<div>
<div id="profileName"></div>
<div style="font-size:12px;" id="profileEmail"></div>
</div>
</div>

<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="location.href='voice.html'">Voice Mode</div>
<div class="menuItem" onclick="location.href='quadron7.html'">Quadron 7</div>
<div class="menuItem" onclick="codeMode()">Code /</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI()">Evaluate</div>

<div class="menuFooter">Developed by <span>Rawat Systems</span></div>
</div>

<div id="chat">
<div id="messages"></div>
<div id="inputArea">
<input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<div class="footer">
Quadron AI can make mistakes, By using it you agree our <a href="terms.html">Terms & Conditions</a>
</div>

<script>
const messages=document.getElementById("messages");

/* MENU */
function openMenu(){sidePanel.classList.add("open");overlay.style.display="block";}
function closeMenu(){sidePanel.classList.remove("open");overlay.style.display="none";}

/* MODES */
let exploreActive=false, codeModeActive=false, evaluateMode=false;

/* PROMPT FIX */
function buildPrompt(t){
if(codeModeActive) return "ONLY code block.\n"+t;
if(exploreActive) return "Give explanation with REAL image links.\n"+t;
if(evaluateMode) return 'Include JSON graph exactly like {"type":"line","labels":["A"],"values":[10]}\n'+t;
return "Never refuse images or graphs.\n"+t;
}

/* IMAGE FIX */
function renderImages(el,text){
let md=[...text.matchAll(/!\[.*?\]\((.*?)\)/g)];
md.forEach(m=>addImg(el,m[1]));

let urls=text.match(/https?:\/\/[^\s]+/g)||[];
urls.forEach(u=>{
if(/\.(jpg|png|jpeg|webp|gif)/i.test(u)) addImg(el,u);
});
}

function addImg(el,src){
let img=document.createElement("img");
img.src=src;
img.style.maxWidth="100%";
img.style.marginTop="10px";
el.appendChild(img);
}

/* GRAPH FIX */
function renderChart(el,text){
let match=text.match(/\{[^{}]*"type"[^{}]*"labels"[^{}]*"values"[^{}]*\}/);
if(!match)return;

try{
let d=JSON.parse(match[0]);
let c=document.createElement("canvas");
c.style.marginTop="10px";
el.appendChild(c);

new Chart(c,{
type:d.type,
data:{labels:d.labels,datasets:[{data:d.values}]},
options:{responsive:true}
});

el.innerHTML=el.innerHTML.replace(match[0],""); // remove JSON
}catch(e){}
}

/* SEND */
async function send(){
let text=msg.value.trim();
if(!text)return;

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`;
msg.value="";

let p=document.createElement("p");
messages.appendChild(p);

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:buildPrompt(text)})
});

let reply=(await res.json()).reply;

/* CODE FIX */
let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);

if(m){
let box=document.createElement("div");
box.className="codeBox";

let header=document.createElement("div");
header.className="codeHeader";
header.innerText=m[1]||"code";

let spin=document.createElement("div");
spin.className="spinner";

let pre=document.createElement("pre");
pre.className="codeContent";

box.appendChild(header);
box.appendChild(spin);
box.appendChild(pre);
p.appendChild(box);

let code=m[2],i=0;
function t(){
pre.textContent+=code[i]||"";
i++;
if(i<code.length) requestAnimationFrame(t);
else{spin.remove();hljs.highlightElement(pre);}
}
t();

}else{
p.innerHTML="<b>Quadron:</b> "+reply;
renderImages(p,reply);
renderChart(p,reply);
}

messages.scrollTop=messages.scrollHeight;
}

/* MODES */
function newChat(){messages.innerHTML="";}
function codeMode(){messages.innerHTML="";codeModeActive=true;}
function exploreMode(){messages.innerHTML="";exploreActive=true;}
function evaluateModeUI(){messages.innerHTML="";evaluateMode=true;}

msg.addEventListener("keydown",e=>{if(e.key==="Enter")send();});
</script>

</body>
</html>
