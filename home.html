<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 12px #ffd900;}
#logo{font-weight:bold;font-size:18px;}
#menuBtn{cursor:pointer;font-size:24px;}

#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:900;}

#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;overflow-y:auto;}
#sidePanel.open{transform:translateX(0);}

.menuItem{padding:10px;cursor:pointer;margin-top:8px;font-weight:bold;}
.menuItem:hover{text-shadow:0 0 10px #ffd900;}

#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;}

#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;}

.codeBox{background:#000;border:1px solid #ffd900;margin-top:8px;border-radius:8px;overflow:hidden;position:relative;}
.codeHeader{display:flex;justify-content:space-between;padding:6px;background:#111;border-bottom:1px solid #ffd900;font-size:12px;}
.copyBtn,.runBtn{cursor:pointer;border:1px solid #ffd900;padding:2px 6px;border-radius:4px;margin-left:5px;}
.codeContent{padding:10px;white-space:pre;overflow:auto;}

.editBtn{
position:absolute;
top:30px;
right:10px;
cursor:pointer;
font-size:14px;
}

.spinner{
position:absolute;
width:16px;height:16px;
border:3px solid #ffd900;
border-top:3px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
top:35px;
left:10px;
}
@keyframes spin{100%{transform:rotate(360deg);}}

iframe{
width:100%;
height:250px;
border:none;
background:white;
}
</style>
</head>

<body>

<header>
<div id="logo">Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">
<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="codeMode()">Code /</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI()">Evaluate</div>
</div>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<script>
const messages=document.getElementById("messages");
const sidePanel=document.getElementById("sidePanel");
const overlay=document.getElementById("overlay");

/* MENU */
function openMenu(){sidePanel.classList.add("open");overlay.style.display="block";}
function closeMenu(){sidePanel.classList.remove("open");overlay.style.display="none";}

/* MODES */
let exploreActive=false;
let codeModeActive=false;
let evaluateMode=false;

/* FAST TYPE */
function typeText(el,text){
let span=document.createElement("span");
el.innerHTML="<b>Quadron:</b> ";
el.appendChild(span);

let i=0;
function t(){
span.textContent=text.slice(0,i);
i+=2; // ⚡ speed increased
if(i<=text.length) requestAnimationFrame(t);
}
t();
}

/* PROMPT */
function buildPrompt(text){
if(codeModeActive) return "Return ONLY one code block.";
if(exploreActive) return "Deep explore: "+text;
return text;
}

/* CODE BOX */
function renderCode(container,reply){

let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);
if(!m) return false;

let code=m[2];
let lang=m[1]||"html";

container.innerHTML="<b>Quadron:</b>";

let box=document.createElement("div");
box.className="codeBox";

let header=document.createElement("div");
header.className="codeHeader";
header.innerHTML=`
<span>&lt;/&gt; ${lang}</span>
<span>
<button class="copyBtn">Copy</button>
<button class="runBtn">Execute</button>
</span>`;

let content=document.createElement("pre");
content.className="codeContent";

let edit=document.createElement("div");
edit.className="editBtn";
edit.innerHTML="✏️";

let spin=document.createElement("div");
spin.className="spinner";

box.appendChild(header);
box.appendChild(edit);
box.appendChild(spin);
box.appendChild(content);
container.appendChild(box);

/* TYPE CODE */
let i=0;
function tc(){
content.textContent+=code[i];
i++;
if(i<code.length){
requestAnimationFrame(tc);
}else{
spin.remove();
hljs.highlightElement(content);
}
}
tc();

/* COPY */
header.querySelector(".copyBtn").onclick=()=>{
navigator.clipboard.writeText(content.textContent);
};

/* EDIT */
edit.onclick=()=>{
content.contentEditable=true;
content.focus();
};

/* EXECUTE */
let executed=false;
header.querySelector(".runBtn").onclick=function(){

if(!executed){

if(code.includes("cdn") || code.includes("script src")){
alert("External Libraries Used In The Code");
return;
}

let iframe=document.createElement("iframe");
iframe.srcdoc=content.textContent;

box.innerHTML="";
box.appendChild(iframe);

this.innerText="Back";
executed=true;

}else{
box.innerHTML="";
renderCode(container,reply);
}
};

return true;
}

/* SEND */
async function send(){

let text=msg.value.trim();
if(!text) return;

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`;
msg.value="";

let p=document.createElement("p");
messages.appendChild(p);

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:buildPrompt(text),
evaluate:evaluateMode
})
});

let data=await res.json();

if(!renderCode(p,data.reply)){
typeText(p,data.reply);
}

messages.scrollTop=messages.scrollHeight;
}

/* MODES WITH TYPING */
function newChat(){
messages.innerHTML="";
exploreActive=false;
codeModeActive=false;
evaluateMode=false;
closeMenu();
fetchGreeting();
}

function codeMode(){
newChat();
codeModeActive=true;
let p=document.createElement("p");
messages.appendChild(p);
typeText(p,"Describe what you want to code");
}

function exploreMode(){
newChat();
exploreActive=true;
let p=document.createElement("p");
messages.appendChild(p);
typeText(p,"Explore the universe...");
}

function evaluateModeUI(){
newChat();
evaluateMode=true;
let p=document.createElement("p");
messages.appendChild(p);
typeText(p,"What should I evaluate?");
}

/* GREETING */
async function fetchGreeting(){
let p=document.createElement("p");
messages.appendChild(p);

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:"Give a short sarcastic greeting"
})
});

let data=await res.json();
typeText(p,data.reply);
}

/* ENTER */
msg.addEventListener("keydown",e=>{
if(e.key==="Enter") send();
});

/* INIT */
window.onload=()=>{
newChat();
};
</script>

</body>
</html>
