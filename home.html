<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<link rel="icon" href="favicon.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
.blur-bg{filter:blur(6px);}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 15px #ffd900;}
header div:first-child{font-weight:bold;text-shadow:0 0 15px #ffd900;}
#menuBtn{cursor:pointer;font-size:24px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:500;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;box-shadow:0 0 20px #ffd900;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;border-radius:20px;}
.userText{color:#ffd900;}
.aiText{color:#fff;}
</style>
</head>

<body>

<header>
  <div>Quadron AI</div>
  <div id="menuBtn">☰</div>
</header>

<div id="overlay"></div>
<div id="sidePanel"></div>

<div id="chat">
  <div id="messages"></div>
  <div id="inputArea">
    <input id="msg" placeholder="Type here.....">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>

const menuBtn = document.getElementById("menuBtn");
const overlay = document.getElementById("overlay");
const sidePanel = document.getElementById("sidePanel");
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");
const msg = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");

menuBtn.onclick = ()=> {
  sidePanel.classList.add("open");
  overlay.style.display="block";
  chat.classList.add("blur-bg");
};

overlay.onclick = ()=> {
  sidePanel.classList.remove("open");
  overlay.style.display="none";
  chat.classList.remove("blur-bg");
};

let mode="normal";

/* FAST TYPE */
function fastType(el,text){
  let span=document.createElement("span");
  span.className="aiText";
  el.appendChild(span);
  let i=0;
  let int=setInterval(()=>{
    span.innerHTML+=text[i++];
    if(i>=text.length) clearInterval(int);
  },5);
}

/* CODE BOX SYSTEM */
function createCodeBox(code){

  localStorage.setItem("quadron_code",code);

  let box=document.createElement("div");
  box.style.background="#000";
  box.style.border="1px solid #ffd900";
  box.style.borderRadius="8px";
  box.style.marginTop="10px";

  let top=document.createElement("div");
  top.style.display="flex";
  top.style.justifyContent="space-between";
  top.style.padding="6px";
  top.style.borderBottom="1px solid #ffd900";

  let name=document.createElement("div");
  name.innerHTML="</> code";
  name.style.color="#fff";
  name.style.textShadow="0 0 10px #fff";

  let btns=document.createElement("div");

  function glowBtn(text,color="#fff"){
    let b=document.createElement("button");
    b.textContent=text;
    b.style.background="transparent";
    b.style.color=color;
    b.style.textShadow="0 0 10px "+color;
    return b;
  }

  let copy=glowBtn("Copy");
  let run=glowBtn("Run");
  let debug=glowBtn("Debugg");

  btns.append(copy,run,debug);
  top.append(name,btns);

  let pre=document.createElement("pre");
  box.append(top,pre);

  messages.appendChild(box);

  /* typing animation */
  let i=0;
  let typing=setInterval(()=>{
    pre.textContent+=code[i++];
    if(i>=code.length){
      clearInterval(typing);
    }
  },2);

  /* copy */
  copy.onclick=()=>{
    navigator.clipboard.writeText(code);
    copy.textContent="Copied !";
    setTimeout(()=>copy.textContent="Copy",1500);
  };

  /* run */
  run.onclick=()=>{
    pre.innerHTML="";
    btns.innerHTML="";

    let back=glowBtn("Back","#ffd900");
    btns.append(back);

    try{
      let iframe=document.createElement("iframe");
      iframe.style.width="100%";
      iframe.style.height="300px";
      iframe.srcdoc=code;
      pre.appendChild(iframe);
    }catch{
      pre.textContent="Execution error";
    }

    back.onclick=()=>{
      box.remove();
      createCodeBox(localStorage.getItem("quadron_code"));
    };
  };

  /* debug */
  debug.onclick=async ()=>{
    let res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:"Fix this code:\n"+code})
    });
    let fixed=(await res.json()).reply;
    box.remove();
    createCodeBox(fixed);
  };
}

/* SEND */
async function send(){
  let text=msg.value.trim();
  if(!text)return;

  messages.innerHTML+=`<p class="userText">You: ${text}</p>`;
  msg.value="";

  let p=document.createElement("p");
  messages.appendChild(p);

  let prompt=text;

  if(mode==="code"){
    prompt="ONLY RETURN CODE\n"+text;
  }

  let res=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:prompt})
  });

  let reply=(await res.json()).reply;

  if(mode==="code"){
    createCodeBox(reply);
    return;
  }

  /* explore link detection */
  reply = reply.replace(/https[^\s]+/g, url=>{
    return `<a href="${url}" target="_blank" style="color:#00f;text-shadow:0 0 10px #00f;">${url}</a>`;
  });

  p.innerHTML="Quadron: "+reply;
}

sendBtn.onclick=send;
msg.addEventListener("keydown",e=>{ if(e.key==="Enter") send(); });

</script>

</body>
</html>
