<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script> 

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;}
#menuBtn{cursor:pointer;font-size:24px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;}
#sidePanel.open{transform:translateX(0);}
.menuItem{padding:10px;cursor:pointer;color:#ffd900;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;}
button{padding:10px;background:#ffd900;color:#000;border:none;}
</style>
</head>

<body>

<header>
<div>Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">
<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI()">Evaluate</div>
</div>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

<script>
const messages=document.getElementById("messages");

let evaluateMode=false;
let exploreModeOn=false;

/* MENU */
function openMenu(){sidePanel.classList.add("open");overlay.style.display="block";}
function closeMenu(){sidePanel.classList.remove("open");overlay.style.display="none";}

/* WIKIPEDIA */
async function fetchWiki(query){
try{
let res=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
let data=await res.json();
return data.extract;
}catch{
return null;
}
}

/* TAVILY */
async function fetchTavily(query){
try{
let res=await fetch("/api/tavily",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({query})
});
let data=await res.json();
return data.result;
}catch{
return null;
}
}

/* SEND */
async function send(){
let text=msg.value.trim();
if(!text)return;

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`;
msg.value="";

let p=document.createElement("p");
messages.appendChild(p);

let finalMessage=text;

/* 🔴 EVALUATE MODE */
if(evaluateMode){
let live=await fetchTavily(text);

finalMessage=`
REAL-TIME MODE

Data:
${live}

Answer using only this.
`;
}

/* 🟢 EXPLORE MODE */
if(exploreModeOn){
let wiki=await fetchWiki(text);

finalMessage=`
KNOWLEDGE MODE

Wikipedia Data:
${wiki}

Explain clearly.
`;
}

/* AI */
let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:finalMessage})
});

let data=await res.json();
p.innerHTML="<b>Quadron:</b> "+data.reply;
messages.scrollTop=messages.scrollHeight;
}

/* MODES */
function newChat(){
messages.innerHTML="";
evaluateMode=false;
exploreModeOn=false;
closeMenu();
}

function exploreMode(){
exploreModeOn=true;
evaluateMode=false;
messages.innerHTML="<b>Quadron:</b> 🌍 Explore Mode ON (Wikipedia)";
closeMenu();
}

async function evaluateModeUI(){
evaluateMode=true;
exploreModeOn=false;
closeMenu();

messages.innerHTML="<b>Quadron:</b> Checking Tavily...";

let test=await fetchTavily("test");

if(test){
messages.innerHTML="<b>Quadron:</b> 🔎 Evaluate Mode ON<br>✅ Tavily Working";
}else{
messages.innerHTML="<b>Quadron:</b> 🔎 Evaluate Mode ON<br>❌ Tavily Not Working";
}
}

msg.addEventListener("keydown",e=>{if(e.key==="Enter") send();});
</script>

</body>
</html>
