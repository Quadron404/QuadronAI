<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#0a0a0a;
  color:#ffd900;
  font-family:Arial;
  margin:0;
}
header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#000;
  border-bottom:2px solid #ffd900;
}
#chat{
  max-width:800px;
  margin:auto;
  padding:10px;
}
#messages{
  height:65vh;
  overflow:auto;
  background:#111;
  padding:10px;
  border:1px solid #ffd900;
  border-radius:12px;
}
#inputArea{
  display:flex;
  gap:8px;
  margin-top:10px;
}
input{
  flex:1;
  padding:10px;
  background:black;
  color:#ffd900;
  border:1px solid #ffd900;
  border-radius:10px;
}
button{
  padding:10px;
  background:#ffd900;
  color:#000;
  border:none;
  cursor:pointer;
}
canvas{
  background:white;
  border-radius:10px;
  margin:15px 0;
  max-height:300px;
}
</style>
</head>

<body>

<header>
<div>Quadron AI</div>
<div id="menuBtn">☰</div>
</header>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<script>
const messages = document.getElementById("messages");
let evaluateMode = false;

/* FORMAT TEXT */
function formatText(text){
  return text.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>");
}

/* SPLIT PARAGRAPHS */
function splitParas(text){
  return text.split(/\n\s*\n/);
}

/* SAFE GRAPH RENDER */
function createChart(data){

  if(!data || data.length === 0){
    console.log("No data for chart");
    return;
  }

  const canvas = document.createElement("canvas");
  messages.appendChild(canvas);

  const ctx = canvas.getContext("2d");

  // Clean + limit data (important fix)
  const cleanData = data.slice(-20);

  const labels = cleanData.map(d => d.datetime || "");
  const prices = cleanData.map(d => parseFloat(d.close)).filter(n => !isNaN(n));

  if(prices.length === 0){
    console.log("Invalid price data");
    return;
  }

  new Chart(ctx,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"Price",
        data:prices,
        borderWidth:2,
        tension:0.3
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        x:{display:false},
        y:{beginAtZero:false}
      }
    }
  });
}

/* RENDER RESPONSE */
function renderEvaluate(reply, prices, showGraph){

  const parts = splitParas(reply);

  parts.forEach((para, i) => {

    const p = document.createElement("p");
    p.innerHTML = "<b>Quadron:</b> " + formatText(para);
    messages.appendChild(p);

    /* INSERT GRAPH AFTER 1ST PARAGRAPH ONLY IF VALID */
    if(i === 0 && showGraph){
      createChart(prices);
    }

  });
}

/* SEND MESSAGE */
async function send(){

  const input = document.getElementById("msg");
  let text = input.value.trim();
  if(!text) return;

  messages.innerHTML += `<p><b>You:</b> ${text}</p>`;
  input.value = "";

  try{

    const res = await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        message:text,
        evaluate:evaluateMode
      })
    });

    const data = await res.json();

    if(evaluateMode){
      renderEvaluate(data.reply, data.prices, data.showGraph);
    } else {
      const p = document.createElement("p");
      p.innerHTML = "<b>Quadron:</b> " + formatText(data.reply);
      messages.appendChild(p);
    }

  } catch(err){
    messages.innerHTML += "<p>⚠️ Error</p>";
  }

  messages.scrollTop = messages.scrollHeight;
}

/* TOGGLE MODE */
document.getElementById("menuBtn").onclick = () => {
  evaluateMode = !evaluateMode;

  messages.innerHTML += `<p><b>Quadron:</b> 🔎 Evaluate Mode ${evaluateMode ? "ON" : "OFF"}</p>`;
};

/* ENTER KEY */
document.getElementById("msg").addEventListener("keydown", e=>{
  if(e.key === "Enter") send();
});
</script>

</body>
</html>
