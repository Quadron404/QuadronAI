<script>
let websiteURL = "";
let websiteData = "";

function showWebsiteBox(url){

  let domain = (new URL(url)).hostname;

  filePreview.innerHTML = `
    <div class="fileBox">
      <img src="https://www.google.com/s2/favicons?domain=${domain}">
      <span>${domain}</span>
      <span class="removeFile">✖</span>
    </div>
  `;

  document.querySelector(".removeFile").onclick = ()=>{
    websiteData = "";
    websiteURL = "";
    filePreview.innerHTML = "";
  };
}
function createAmazonSearchLink(query) {
  const tag = "psr0a-21";
  const cleanQuery = query.replace(/undefined/g, "").trim();
  const encoded = encodeURIComponent(cleanQuery);
  return `https://www.amazon.in/s?k=${encoded}&tag=${tag}`;
}
const bgScrapeBtn = document.getElementById("bgScrapeBtn");
if(bgScrapeBtn){
  bgScrapeBtn.onclick = ()=>{
    plusMenu.style.display="none";

    backgroundData = `[Background Data]
User Agent: ${navigator.userAgent}
Screen: ${screen.width}x${screen.height}
Time: ${new Date().toString()}
`;

    filePreview.innerHTML = `
      <div class="fileBox">
        <span style="color:#00ff88;">✔ Background Scraped</span>
        <span class="removeFile">✖</span>
      </div>
    `;

    document.querySelector(".removeFile").onclick = ()=>{
      backgroundData="";
      filePreview.innerHTML="";
    };
  };
}
function detectProductQuery(text) {
  const keywords = [
    "buy","price","best","under","laptop","phone",
    "amazon","flipkart","deal","cheap","top","gaming"
  ];
  text = text.toLowerCase();
  return keywords.some(k => text.includes(k));
}
</script>

<style>

/* SAME UI - UNCHANGED */
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;transition:.3s;}

.analysing span:nth-child(5){animation-delay:0.4s;}

.analysing span:nth-child(7){animation-delay:0.6s;}

<body>

<script>
const webSearchBtn = document.getElementById("webSearchBtn");
const webPopup = document.getElementById("webPopup");
const webInput = document.getElementById("webInput");
const webOkBtn = document.getElementById("webOkBtn");

/* SAFE ELEMENT REFERENCES */
const menuBtn = document.getElementById("menuBtn");
const overlay = document.getElementById("overlay");
const sidePanel = document.getElementById("sidePanel");
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");
const msg = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");

sendBtn.onclick = send;

const profileName = document.getElementById("profileName");
const profileEmail = document.getElementById("profileEmail");
const profilePic = document.getElementById("profilePic");

const menuProfile = document.getElementById("menuProfile");
const newChatBtn = document.getElementById("newChatBtn");
const codeModeBtn = document.getElementById("codeModeBtn");
const exploreModeBtn = document.getElementById("exploreModeBtn");
const voiceModeBtn = document.getElementById("voiceModeBtn");
const plusBtn = document.getElementById("plusBtn");
const plusMenu = document.getElementById("plusMenu");
const fileInput = document.getElementById("fileInput");
const addFileBtn = document.getElementById("addFileBtn");
const filePreview = document.getElementById("filePreview");

const codeModeQuick = document.getElementById("codeModeQuick");
const exploreModeQuick = document.getElementById("exploreModeQuick");
const voiceModeQuick = document.getElementById("voiceModeQuick");

let uploadedFileText = "";
let uploadedFileName = "";
let backgroundData = "";

/* USER (UNCHANGED) */
let user = JSON.parse(localStorage.getItem("quadronUser")) || {};
profileName.textContent = user.name || "Guest";
profileEmail.textContent = user.email || "";
profilePic.src = user.picture || "https://via.placeholder.com/40";

/* MENU */
menuBtn.addEventListener("click", ()=>{
  sidePanel.classList.add("open");
  overlay.style.display="block";
  chat.classList.add("blur-bg");
});
overlay.onclick = closeMenu;

function closeMenu(){
  sidePanel.classList.remove("open");
  overlay.style.display="none";
  chat.classList.remove("blur-bg");
}

function menuAction(fn){
  closeMenu();
  if(fn) fn();
}

/* MODES */
let mode="normal";
function resetChat(){messages.innerHTML="";}

function newChat(){mode="normal";resetChat();}
function codeMode(){mode="code";resetChat();fastType(messages,"Describe What You Want To Code");}
function exploreMode(){mode="explore";resetChat();fastType(messages,"Explore The Universe");}
function voiceMode(){window.location.href="voice.html";}

/* MENU BINDINGS (FORCE CLOSE) */
menuProfile.onclick=()=>{closeMenu();window.location.href="profile.html";}
newChatBtn.onclick=()=>menuAction(newChat);
codeModeBtn.onclick=()=>menuAction(codeMode);
exploreModeBtn.onclick=()=>menuAction(exploreMode);
voiceModeBtn.onclick=()=>{closeMenu();voiceMode();};

plusBtn.onclick = () => {
  plusMenu.style.display = plusMenu.style.display === "flex" ? "none" : "flex";
};
addFileBtn.onclick = () => {

  if(uploadedFileText){
    alert("Only one file allowed per input.");
    return;
  }

  fileInput.accept = ".txt,.pdf,.doc,.docx";
  fileInput.click();
};
fileInput.onchange = async (e) => {

  let file = e.target.files[0];
  if(!file) return;

  uploadedFileName = file.name;

  // detect icon
  let icon = "📄";
  if(file.name.endsWith(".pdf")) icon = "📕";
  if(file.name.endsWith(".doc") || file.name.endsWith(".docx")) icon = "📘";
  if(file.name.endsWith(".txt")) icon = "📄";

  filePreview.innerHTML = `
    <div class="fileBox">
      <span>${icon} ${file.name}</span>
      <span class="removeFile">✖</span>
    </div>
  `;

  // REMOVE BUTTON
  document.querySelector(".removeFile").onclick = ()=>{
    uploadedFileText = "";
    uploadedFileName = "";
    filePreview.innerHTML = "";
    fileInput.value = "";
  };

  // 🔥 START SCRAPING IN BACKGROUND
 await scrapeFile(file); // important

  plusMenu.style.display = "none";
};
 
codeModeQuick.onclick = () => { plusMenu.style.display="none"; codeMode(); };
exploreModeQuick.onclick = () => { plusMenu.style.display="none"; exploreMode(); };
voiceModeQuick.onclick = () => { plusMenu.style.display="none"; voiceMode(); };

/* TYPE */
function fastType(el,text){
  let span=document.createElement("span");
  span.className="aiText";
  el.appendChild(span);

  // Split text into parts (text + links)
  let parts = text.split(/(<a.*?>.*?<\/a>)/g);

  let i = 0;

  function typePart(){
    if(i >= parts.length) return;

    let part = parts[i];

    // If it's a link → render instantly
    if(part.startsWith("<a")){
      span.innerHTML += part;
      i++;
      typePart();
    }else{
      // Fast typing for normal text
      let j = 0;
      let speed = 2; // VERY FAST

      let int = setInterval(()=>{
        span.innerHTML += part[j++];
        if(j >= part.length){
          clearInterval(int);
          i++;
          typePart();
        }
      }, speed);
    }
  }

  typePart();
}
async function scrapeWebsite(url){

  try{
    let res = await fetch("https://your-backend-url/api/scrape",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({url})
    });

    let data = await res.json();
    websiteData = `[Website: ${url}]\n` + data.text;

  }catch{
    websiteData = "[Failed to fetch website data]";
  }
}
async function scrapeFile(file){

  // TXT
  if(file.type === "text/plain"){
    uploadedFileText = await file.text();
    return;
  }

  // PDF (REAL SCRAPING)
  if(file.type === "application/pdf"){

    const reader = new FileReader();

    reader.onload = async function(){
      const typedarray = new Uint8Array(this.result);

      const pdf = await pdfjsLib.getDocument(typedarray).promise;
      pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      let fullText = "";

      for(let i = 1; i <= pdf.numPages; i++){
        let page = await pdf.getPage(i);
        let content = await page.getTextContent();

        let strings = content.items.map(item => item.str);
        fullText += strings.join(" ") + "\n";
      }

      uploadedFileText = `[PDF Document: ${file.name}]\n` + fullText;
    };

    reader.readAsArrayBuffer(file);
    return;
  }

  // OTHER FILES
  uploadedFileText = "[User uploaded document: " + file.name + "]";
}
async function autoGreeting(){

  // Run only once per tab session
  if(sessionStorage.getItem("greeted")) return;

  // Get real time from user system
  let hour = new Date().getHours();
  let timeText = "";

  if(hour < 12) timeText = "morning";
  else if(hour < 17) timeText = "afternoon";
  else timeText = "evening";

  let name = user.name || "Guest";

  // Build sarcastic AI prompt
  let prompt = `Write a short sarcastic greeting saying "Good ${timeText}" to ${name}. Keep it funny, slightly rude, and human-like. No extra explanation.`;

  try{
    let res = await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message: prompt})
    });

    let reply = (await res.json()).reply;

    let p = document.createElement("p");
    messages.appendChild(p);

    fastType(p, "Quadron: " + reply);

    // Mark as greeted (ONLY for this session)
    sessionStorage.setItem("greeted", true);

  }catch(e){
    console.error("Greeting failed", e);
  }
}
function createSourceBox(url){

  let domain = (new URL(url)).hostname;

  let box = document.createElement("div");
  box.className = "sourceBox";

  box.innerHTML = `
    <img src="https://www.google.com/s2/favicons?domain=${domain}" />
    <div class="sourceText">
      <div class="sourceTitle">${domain}</div>
      <div class="sourceLink">${url}</div>
    </div>
  `;

  box.onclick = ()=>{
    window.open(url, "_blank");
  };
  webSearchBtn.onclick = ()=>{
  plusMenu.style.display = "none";
  webPopup.style.display = "block";
};

  return box;
}
/* WIKI FIXED (ONLY SYNTAX FIX) */
async function getWikiData(query){
  try{
    let res=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
    let data=await res.json();
    return data.extract || "";
  }catch{return "";}
}

async function send() {
  let old = document.querySelector(".analysing");
if(old) old.remove();
    let text = msg.value.trim();
    if (!text) {
        alert("Type something first");
        return;
    }

    // Show Analysing Loader
    let analysing = document.createElement("div");
    analysing.className = "analysing";
    analysing.innerHTML = "Analysing...".split("").map(l => `<span>${l}</span>`).join("");
    messages.appendChild(analysing);

    // Show User Message
    let userMsg = document.createElement("div");
    userMsg.className = "userText";
    userMsg.innerHTML = `You: ${text}`;

    if (uploadedFileName) {
        userMsg.innerHTML += `<div class="fileBox"><span style="color:white;">📎</span> ${uploadedFileName}</div>`;
    }
    if (websiteURL) {
        userMsg.innerHTML += `<div class="fileBox">🌐 ${websiteURL}</div>`;
    }

    messages.appendChild(userMsg);
    msg.value = "";

    // Prepare Prompt
    let finalPrompt = text;
    if (uploadedFileText || websiteData || backgroundData) {
        finalPrompt = `User message: ${text}\n\nExtra data:\n${uploadedFileText || ""}\n${websiteData || ""}\n${backgroundData || ""}\n\nUse this context while answering.`;
    }

    try {
        let res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: finalPrompt })
        });

        let data = await res.json();
        analysing.remove();

        let p = document.createElement("p");
        messages.appendChild(p);
        fastType(p, "Quadron: " + data.reply);

        // Amazon Product Detection
        if (detectProductQuery(text)) {
            let amazonLink = createAmazonSearchLink(text);
            let amazonBox = document.createElement("div");
            amazonBox.className = "sourceBox";
            amazonBox.innerHTML = `
                <img src="https://www.amazon.in/favicon.ico">
                <div class="sourceText">
                    <div class="sourceTitle">View on Amazon</div>
                    <div class="sourceLink">${text}</div>
                </div>`;
            amazonBox.onclick = () => window.open(amazonLink, "_blank");
            p.appendChild(amazonBox);
        }

    } catch (e) {
        analysing.remove();
        console.error("Chat failed", e);
    }

    // RESET STATE
    uploadedFileText = "";
    uploadedFileName = "";
    websiteData = "";
    websiteURL = "";
    filePreview.innerHTML = "";
    fileInput.value = "";
}
msg.addEventListener("keydown",e=>{if(e.key==="Enter") send();});

window.onload = ()=>{
  autoGreeting();

  sendBtn.onclick = send;
  msg.addEventListener("keydown", e=>{
    if(e.key==="Enter") send();
  });
};

</script>
<div id="webPopup" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
background:#111; border:1px solid #fff; padding:20px; border-radius:12px; z-index:2000; box-shadow:0 0 25px #ffd900;">
  
  <input id="webInput" placeholder="Enter website link..."
  style="width:100%; padding:10px; margin-bottom:10px; background:black; color:#ffd900; border:1px solid #ffd900; border-radius:8px;">

  <button id="webOkBtn">OK</button>
</div>
