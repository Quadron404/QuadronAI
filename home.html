<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<!-- Optional Python support -->
<link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
<script defer src="https://pyscript.net/latest/pyscript.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#000;border-bottom:2px solid #ffd900;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;}

.codeBox{
  background:#000;
  border:1px solid #ffd900;
  margin-top:8px;
  border-radius:8px;
  overflow:hidden;
  font-family:monospace;
  position:relative;
}

.codeHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 10px;
  background:#111;
  border-bottom:1px solid #ffd900;
}

.codeLang{font-style:italic;}

.btnGroup{
  display:flex;
  gap:6px;
}

.copyBtn,.runBtn{
  cursor:pointer;
  color:#ffd900;
  padding:2px 6px;
  border:1px solid #ffd900;
  border-radius:4px;
  font-size:12px;
}

.codeContent{
  padding:10px;
  overflow:auto;
  white-space:pre;
}

.output{
  border-top:1px solid #ffd900;
  padding:10px;
  color:#00ffcc;
}

.error{
  color:red;
}

.spinner{
  position:absolute;
  width:16px;
  height:16px;
  border:3px solid #ffd900;
  border-top:3px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
  top:35px; /* moved BELOW header */
  left:10px;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<header>
<div>Quadron AI</div>
</header>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<script>
const messages=document.getElementById("messages");

/* SEND */
async function send(){
 let text=msg.value.trim();
 if(!text)return;

 messages.innerHTML+=`<p><b>You:</b> ${text}</p>`;
 msg.value="";

 let p=document.createElement("p");
 messages.appendChild(p);

 let res=await fetch("/api/chat",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({message:text})
 });

 let data=await res.json();
 let reply=data.reply;

/* CODE DETECT */
let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);

if(m){
 let lang=m[1]||"text";
 let code=m[2];

 p.innerHTML="<b>Quadron:</b>";

 let box=document.createElement("div");
 box.className="codeBox";

 let header=document.createElement("div");
 header.className="codeHeader";

 let btnGroup=document.createElement("div");
 btnGroup.className="btnGroup";

 btnGroup.innerHTML=`
   <span class="runBtn" onclick="runCode(this)">Execute ▸</span>
   <span class="copyBtn" onclick="copyCode(this)">Copy</span>
 `;

 header.innerHTML=`<span class="codeLang">&lt;/&gt; ${lang}</span>`;
 header.appendChild(btnGroup);

 let spin=document.createElement("div");
 spin.className="spinner";

 let content=document.createElement("pre");
 content.className="codeContent";
 content.textContent=code;

 let output=document.createElement("div");
 output.className="output";

 box.appendChild(header);
 box.appendChild(spin);
 box.appendChild(content);
 box.appendChild(output);

 p.appendChild(box);

 setTimeout(()=>{
   spin.remove();
   hljs.highlightElement(content);
 },500);

}else{
 p.innerHTML="<b>Quadron:</b> "+reply;
}

messages.scrollTop=messages.scrollHeight;
}

/* COPY */
function copyCode(btn){
 let code=btn.closest(".codeBox").querySelector(".codeContent").textContent;
 navigator.clipboard.writeText(code);
 btn.innerText="Copied!";
 setTimeout(()=>btn.innerText="Copy",1500);
}

/* EXECUTE */
function runCode(btn){
 let box=btn.closest(".codeBox");
 let code=box.querySelector(".codeContent").textContent;
 let output=box.querySelector(".output");

 output.innerHTML="";

/* External library detection */
if(/import |require\(|#include <|pip install|cdn|script src/i.test(code)){
 output.innerHTML='<div class="error">External Libraries Used In The Code</div>';
 return;
}

/* LANGUAGE DETECTION */
let lang=box.querySelector(".codeLang").innerText.toLowerCase();

/* HTML */
if(lang.includes("html")){
 let iframe=document.createElement("iframe");
 iframe.style.width="100%";
 iframe.style.height="200px";
 iframe.srcdoc=code;
 output.appendChild(iframe);
 return;
}

/* JS */
if(lang.includes("javascript")||lang.includes("js")){
 try{
   let result=eval(code);
   output.innerText=result!==undefined?result:"Executed.";
 }catch(e){
   output.innerHTML='<span class="error">'+e+'</span>';
 }
 return;
}

/* JSON */
if(lang.includes("json")){
 try{
   let obj=JSON.parse(code);
   output.innerText=JSON.stringify(obj,null,2);
 }catch(e){
   output.innerHTML='<span class="error">Invalid JSON</span>';
 }
 return;
}

/* PYTHON */
if(lang.includes("python")){
 let py=document.createElement("py-script");
 py.innerHTML=code;
 output.appendChild(py);
 return;
}

/* C / C++ */
if(lang.includes("c")){
 output.innerHTML='<span class="error">C/C++ cannot run in browser</span>';
 return;
}

/* DEFAULT */
output.innerText="Execution not supported.";
}

/* ENTER */
msg.addEventListener("keydown",e=>{
 if(e.key==="Enter") send();
});
</script>

</body>
</html>
