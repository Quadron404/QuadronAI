<!-- ONLY CHANGES SHOWN INSIDE SCRIPT + SMALL CSS ADDITIONS -->

<style>

/* BUTTON CLICK ANIMATION */
.codeBtns button:active{
transform:scale(0.9);
}

/* FOOTER CENTER */
.footer{
text-align:center;
font-size:13px;
margin:10px;
color:white;
}

/* TERMS GLOW */
.footer a{
color:#ffd900;
text-shadow:0 0 12px #ffd900,0 0 25px #ffd900;
}

</style>

<script>

/* MODE SYSTEM */
let mode="normal";

/* CODE BOX (UPGRADED) */
function renderCode(container,reply){

let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);
let lang="html";
let code=reply;

if(m){
lang=m[1]||"html";
code=m[2];
}

container.innerHTML="<span class='aiLabel'>Quadron:</span>";

let box=document.createElement("div");
box.className="codeBox";

let header=document.createElement("div");
header.className="codeHeader";

header.innerHTML=`
<span class="codeLang">&lt;/&gt; ${lang}</span>
<div class="codeBtns">
<button onclick="copyCode(this)">Copy</button>
<button onclick="runCode(this)">Execute</button>
<button onclick="debugCode(this)">Debug</button>
</div>`;

let content=document.createElement("pre");
content.className="codeContent";

/* SPINNER */
let spinner=document.createElement("div");
spinner.className="spinner";

box.appendChild(header);
box.appendChild(spinner);
box.appendChild(content);
container.appendChild(box);

/* SHIFT TEXT */
let langEl=header.querySelector(".codeLang");
langEl.style.marginLeft="20px";

/* TYPE EFFECT */
let i=0;
function type(){
content.textContent+=code[i];
i++;
if(i<code.length){
requestAnimationFrame(type);
}else{
spinner.remove();
langEl.style.marginLeft="0px";
hljs.highlightElement(content);
}
}
type();

return true;
}

/* EXECUTE */
function runCode(btn){
let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

let iframe=document.createElement("iframe");
iframe.style.width="100%";
iframe.style.height="250px";
iframe.srcdoc=code;

box.innerHTML="";
box.appendChild(iframe);

/* BACK BUTTON */
let back=document.createElement("button");
back.innerText="Back";
back.onclick=()=>{
box.innerHTML="";
renderCode(box.parentElement,"```html\n"+code+"\n```");
};
box.appendChild(back);
}

/* DEBUG WITH SPINNER */
async function debugCode(btn){

let box=btn.closest(".codeBox");
let code=box.querySelector("pre").textContent;

/* CLEAR + SPINNER */
box.innerHTML="";
let spinner=document.createElement("div");
spinner.className="spinner";
box.appendChild(spinner);

let res=await fetch("/api/debug",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({code})
});

let data=await res.json();

/* RE-RENDER */
box.innerHTML="";
renderCode(box.parentElement,"```html\n"+data.fixed+"\n```");
}

/* SEND */
async function send(){

let text=msg.value.trim();
if(!text) return;

messages.innerHTML+=`<p><span class="youLabel">You:</span> <span class="userText">${text}</span></p>`;
msg.value="";

let p=document.createElement("p");
messages.appendChild(p);

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text,mode})
});

let data=await res.json();

/* STRICT CODE MODE */
if(mode==="code"){
renderCode(p,data.reply);
}else{
p.innerHTML=`<span class="aiLabel">Quadron:</span> <span class="aiText">${data.reply}</span>`;
}

messages.scrollTop=messages.scrollHeight;
}

/* MODES */
function codeMode(){
messages.innerHTML="";
mode="code";
closeMenu();
}

</script>
