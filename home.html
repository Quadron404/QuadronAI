<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
<script defer src="https://pyscript.net/latest/pyscript.js"></script>

<style>
/* UI UNCHANGED */
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
.blur-bg{filter:blur(5px);}
header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 12px #ffd900;}
#logo{font-weight:bold;font-size:18px;}
#menuBtn{cursor:pointer;font-size:24px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:900;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;overflow-y:auto;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}
#menuProfile{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid #333;}
#menuProfile img{width:40px;height:40px;border-radius:50%;border:1px solid #ffd900;}
.menuItem{padding:10px;cursor:pointer;margin-top:8px;color:#ffd900;font-weight:bold;}
.menuItem:hover{text-shadow:0 0 10px #ffd900;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;}

.codeBox{background:#000;border:1px solid #ffd900;margin-top:8px;border-radius:8px;overflow:hidden;font-family:monospace;position:relative;}
.codeHeader{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#111;border-bottom:1px solid #ffd900;}
.codeLang{font-style:italic;}
.copyBtn,.runBtn{cursor:pointer;color:#ffd900;padding:2px 6px;border:1px solid #ffd900;border-radius:4px;font-size:12px;margin-left:5px;}
.codeContent{padding:10px;white-space:pre;min-height:20px;}
.error{color:red;}

.spinner{
position:absolute;
width:16px;height:16px;
border:3px solid #ffd900;
border-top:3px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
top:34px;
left:8px;
}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
</style>
</head>

<body>

<header>
<div id="logo">Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">
<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="codeMode()">Code /</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI()">Evaluate</div>
</div>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<script>
const messages=document.getElementById("messages");

/* MODES */
let evaluateMode=false;

/* TAVILY FETCH */
async function fetchTavily(query){
try{
let res=await fetch("https://api.tavily.com/search",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer TAVILY__API"
},
body:JSON.stringify({
query:query,
max_results:5
})
});
let data=await res.json();
return data.results.map(r=>r.content).join("\n");
}catch(e){
return "No real-time data available.";
}
}

/* SEND */
async function send(){
let text=msg.value.trim();
if(!text)return;

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`;
msg.value="";

let p=document.createElement("p");
messages.appendChild(p);

let finalPrompt=text;

/* ONLY IN EVALUATE MODE */
if(evaluateMode){
let liveData=await fetchTavily(text);
finalPrompt=`REAL-TIME DATA:\n${liveData}\n\nUSER QUERY:\n${text}\n\nGive strict evaluation + conclusion.`;
}

let res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:finalPrompt})
});

let data=await res.json();
let reply=data.reply;

/* CODE DETECT */
let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);

if(m){
let lang=m[1]||"text";
let code=m[2];

p.innerHTML="<b>Quadron:</b>";

let box=document.createElement("div");
box.className="codeBox";

let header=document.createElement("div");
header.className="codeHeader";

header.innerHTML=`<span class="codeLang">&lt;/&gt; ${lang}</span>
<span>
<span class="runBtn" onclick="runCode(this)">Execute ▸</span>
<span class="copyBtn" onclick="copyCode(this)">Copy</span>
</span>`;

let content=document.createElement("pre");
content.className="codeContent";
content.dataset.original=code;
content.textContent=code;

box.appendChild(header);
box.appendChild(content);
p.appendChild(box);

hljs.highlightElement(content);

}else{
p.innerHTML="<b>Quadron:</b> "+reply;
}

messages.scrollTop=messages.scrollHeight;
}

/* EXECUTE SAME BOX */
function runCode(btn){
let box=btn.closest(".codeBox");
let content=box.querySelector(".codeContent");
let original=content.dataset.original;

if(btn.innerText==="Back"){
content.textContent=original;
hljs.highlightElement(content);
btn.innerText="Execute ▸";
return;
}

/* External check */
if(/import |require\(|#include <|script src|cdn/i.test(original)){
content.innerHTML='<span class="error">External Libraries Used In The Code</span>';
btn.innerText="Back";
return;
}

let lang=box.querySelector(".codeLang").innerText.toLowerCase();

/* HTML */
if(lang.includes("html")){
content.innerHTML="";
let iframe=document.createElement("iframe");
iframe.style.width="100%";
iframe.style.height="200px";
iframe.srcdoc=original;
content.appendChild(iframe);
}

/* JS */
else if(lang.includes("js")){
try{
let result=eval(original);
content.textContent=result||"Executed.";
}catch(e){
content.innerHTML='<span class="error">'+e+'</span>';
}
}

/* JSON */
else if(lang.includes("json")){
try{
let obj=JSON.parse(original);
content.textContent=JSON.stringify(obj,null,2);
}catch{
content.innerHTML='<span class="error">Invalid JSON</span>';
}
}

/* PYTHON */
else if(lang.includes("python")){
content.innerHTML="";
let py=document.createElement("py-script");
py.innerHTML=original;
content.appendChild(py);
}

/* C */
else if(lang.includes("c")){
content.innerHTML='<span class="error">C/C++ cannot run in browser</span>';
}

btn.innerText="Back";
}

/* COPY */
function copyCode(btn){
let code=btn.closest(".codeBox").querySelector(".codeContent").textContent;
navigator.clipboard.writeText(code);
btn.innerText="Copied!";
setTimeout(()=>btn.innerText="Copy",1500);
}

/* MODES */
function newChat(){messages.innerHTML="";evaluateMode=false;}
function codeMode(){messages.innerHTML="<b>Quadron:</b> Code mode";evaluateMode=false;}
function exploreMode(){messages.innerHTML="<b>Quadron:</b> Explore mode";evaluateMode=false;}
function evaluateModeUI(){messages.innerHTML="<b>Quadron:</b> Evaluate mode (real-time enabled)";evaluateMode=true;}

/* INIT */
window.onload=()=>{newChat();}
msg.addEventListener("keydown",e=>{if(e.key==="Enter") send();});
</script>

</body>
</html>
