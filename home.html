<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadron AI</title>
<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;transition:filter .3s;}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 12px #ffd900;}
header #title{font-weight:bold;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;display:flex;flex-direction:column;justify-content:space-between;}
#sidePanel.open{transform:translateX(0);}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;z-index:900;}
.menuItem{padding:10px;cursor:pointer;font-weight:bold;transition:.2s;}
.menuItem:hover{color:#ffd900;text-shadow:0 0 10px #ffd900;}
#menuFooter{text-align:center;margin-top:20px;font-weight:bold;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:8px;box-shadow:0 0 15px #ffd900;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:5px;}
button{padding:10px;background:#ffd900;color:#000;border:none;box-shadow:0 0 12px #ffd900;cursor:pointer;}
button:hover{box-shadow:0 0 35px #ffd900;}
pre{padding:10px;overflow:auto;border:1px solid #ffd900;border-radius:6px;background:#000;white-space:pre-wrap;}
.codeBox{margin:10px 0;border:1px solid #ffd900;border-radius:6px;background:#000;}
.codeHeader{display:flex;justify-content:space-between;padding:5px;font-weight:bold;border-bottom:1px solid #ffd900;}
.codeContent{padding:10px;overflow:auto;white-space:pre;}
.token-comment{color:#8888ff;}
.token-string{color:#66ff66;}
.token-number{color:#ff6666;}
.token-keyword{color:#ffdd00;}
.token-function{color:#66ddff;}
.token-class{color:#ff66ff;}
.token-operator{color:#ff9966;}
.token-variable{color:#ffffff;}
.token-bool{color:#ff9966;}
.token-other{color:#ccff33;}
</style>
</head>
<body>

<header><div id="title">Quadron AI</div><div id="menuBtn" onclick="openMenu()">☰</div></header>
<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">
<div>
<div id="menuProfile"></div>
<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="openCodeMode()">Code /</div>
<div class="menuItem" onclick="location.href='voice.html'">Voice Mode</div>
<div class="menuItem" onclick="location.href='quadron7.html'">Quadron7</div>
<div class="menuItem">
Truth Protocol
<div class="switch" id="truthToggle" onclick="toggleTruth(event)"></div>
</div>
</div>
<div id="menuFooter">Developed by <span style="color:#ffd900;">Rawat Systems</span></div>
</div>

<div id="chat">
<div id="messages"></div>
<div id="inputArea">
<input id="msg" onkeypress="checkEnter(event)">
<button onclick="send()">Send</button>
</div>
</div>

<script>
let overlay=document.getElementById("overlay");
let sidePanel=document.getElementById("sidePanel");
let messages=document.getElementById("messages");
let msg=document.getElementById("msg");
let profile=document.getElementById("menuProfile");

let truthMode=false;
let codeMode=false;
let user=JSON.parse(localStorage.getItem("quadronUser")||"{}");

if(!user.email){user={name:"Guest88",email:"guest88@fakegmail.com",pic:""}}
profile.innerHTML=`<img src="${user.pic||''}" style="width:40px;height:40px;border-radius:50%;margin-right:10px;vertical-align:middle;"> ${user.name} <br> ${user.email}`;

function openMenu(){sidePanel.classList.add("open");overlay.style.display="block";document.body.style.filter="blur(3px)";}
function closeMenu(){sidePanel.classList.remove("open");overlay.style.display="none";document.body.style.filter="none";}
function toggleTruth(e){e.stopPropagation();truthMode=!truthMode;document.getElementById("truthToggle").classList.toggle("active",truthMode);}
function newChat(){messages.innerHTML=""; codeMode=false;}
function openCodeMode(){newChat();codeMode=true;closeMenu();appendBotMessage("Describe what you want to code","python");}

function checkEnter(e){if(e.key==='Enter'){send();}}

function appendBotMessage(text,lang=""){ 
let p=document.createElement("p");
messages.appendChild(p);
processMessage(text,p,lang);
}

function processMessage(text,p,lang){
    let lines=text.split("\n");
    lines.forEach(line=>{
        if(lang!==""){appendCodeBox(line,lang); return;}
        let processed=line.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>");
        p.innerHTML+=processed+"<br>";
    });
    messages.scrollTop=messages.scrollHeight;
}

function appendCodeBox(code,lang){
    let box=document.createElement("div");
    box.className="codeBox";
    let header=document.createElement("div");
    header.className="codeHeader";
    header.innerHTML=`${lang} <button onclick="copyCode(this)">Copy</button>`;
    let content=document.createElement("pre");
    content.className="codeContent";
    content.innerHTML=highlight(code);
    box.appendChild(header);
    box.appendChild(content);
    messages.appendChild(box);
    messages.scrollTop=messages.scrollHeight;
}

function copyCode(btn){
    let code=btn.parentElement.nextSibling;
    navigator.clipboard.writeText(code.innerText).then(()=>alert("Copied"));
}

function highlight(code){
    code=code.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const patterns=[
        {regex: /(#[^\n]*)/g, cls:"token-comment"},
        {regex: /(".*?"|'.*?')/g, cls:"token-string"},
        {regex: /\b(True|False|None)\b/g, cls:"token-bool"},
        {regex: /\b(\d+)\b/g, cls:"token-number"},
        {regex: /\b(def|class|return|if|else|elif|for|while|import|from|function|var|let|const|int|float|char|void|include|print)\b/g, cls:"token-keyword"},
        {regex: /\b([a-zA-Z_][a-zA-Z0-9_]*)\s*(?=\()/g, cls:"token-function"},
        {regex: /\b([A-Z][a-zA-Z0-9_]*)\b/g, cls:"token-class"},
        {regex: /(\+|\-|\*|\/|\=|\%|\<|\>)/g, cls:"token-operator"},
        {regex: /\b([a-z_][a-z0-9_]*)\b/g, cls:"token-variable"},
    ];
    patterns.forEach(p=>{
        code=code.replace(p.regex,m=>`<span class="${p.cls}">${m}</span>`);
    });
    return code;
}

// Example send function simulation
async function send(){
    let text=msg.value.trim();
    if(!text)return;
    messages.innerHTML+=`<p><b>You:</b> ${text}</p>`;
    msg.value="";
    let prompt=text;
    if(codeMode){prompt=`<IAMCODING>Code for this also when you write the first letter of code just before writing that type "<IAMCODING>" Exactly and just after finishing codes type "<IHAVEDONECODING>" Use emoji if necessary. User: ${text}`;}
    // Simulated API response
    setTimeout(()=>{appendBotMessage("print('Hello, World!')","python");},500);
}
</script>
</body>
</html>
