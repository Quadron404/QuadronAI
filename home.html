<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;}
header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 12px #ffd900;}
#logo{font-weight:bold;font-size:18px;}
#menuBtn{cursor:pointer;font-size:24px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:900;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;}
#sidePanel.open{transform:translateX(0);}
.menuItem{padding:10px;cursor:pointer;margin-top:8px;color:#ffd900;font-weight:bold;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;}

.codeBox{background:#000;border:1px solid #ffd900;margin-top:8px;border-radius:8px;overflow:hidden;position:relative;}
.codeHeader{display:flex;justify-content:space-between;padding:6px;background:#111;border-bottom:1px solid #ffd900;}
.codeContent{padding:10px;white-space:pre;overflow:auto;}

.spinner{
position:absolute;
right:10px;
top:8px;
width:14px;
height:14px;
border:2px solid #ffd900;
border-top:2px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

img{border-radius:6px;}
</style>
</head>

<body>

<header>
<div id="logo">Quadron AI</div>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidePanel">
<div class="menuItem" onclick="newChat()">New Chat</div>
<div class="menuItem" onclick="codeMode()">Code /</div>
<div class="menuItem" onclick="exploreMode()">Explore</div>
<div class="menuItem" onclick="evaluateModeUI()">Evaluate</div>
</div>

<div id="chat">
<div id="messages"></div>
<div id="inputArea">
<input id="msg" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<script>
const messages=document.getElementById("messages");

/* MODES */
let exploreActive=false;
let codeModeActive=false;
let evaluateMode=false;

/* PROMPT */
function buildPrompt(text){
if(codeModeActive) return "Only code block.\n"+text;
if(exploreActive) return "Explain deeply with images.\n"+text;
if(evaluateMode) return "Give analysis with chart JSON.\n"+text;
return text;
}

/* TEXT FORMAT */
function formatText(t){
return t.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>").replace(/\n/g,"<br>");
}

/* IMAGE */
function renderImages(el,text){
let md=[...text.matchAll(/!\[.*?\]\((.*?)\)/g)];
md.forEach(m=>{
let img=document.createElement("img");
img.src=m[1];
img.style.maxWidth="100%";
img.style.marginTop="10px";
el.appendChild(img);
});
}

/* CHART */
function renderChart(el,text){
let match=text.match(/\{[\s\S]*"type"[\s\S]*\}/);
if(!match)return;

try{
let d=JSON.parse(match[0]);

let canvas=document.createElement("canvas");
canvas.style.marginTop="15px";
el.appendChild(canvas);

new Chart(canvas,{
type:d.type,
data:{labels:d.labels,datasets:[{data:d.values}]},
options:{animation:false}
});

}catch(e){}
}

/* TYPE */
function typeText(el,text){
let span=document.createElement("span");
el.innerHTML="<b>Quadron:</b> ";
el.appendChild(span);

let clean=formatText(text);
let i=0;

function t(){
span.innerHTML=clean.slice(0,i);
i++;
if(i<=clean.length){
requestAnimationFrame(t);
}else{
renderImages(el,text);
renderChart(el,text);
}
}
t();
}

/* SEND */
async function send(){
let text=msg.value.trim();
if(!text)return;

messages.innerHTML+=`<p><b>You:</b> ${text}</p>`;
msg.value="";

let p=document.createElement("p");
messages.appendChild(p);

let res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:buildPrompt(text)})});
let data=await res.json();
let reply=data.reply;

let m=reply.match(/```(\w+)?\n([\s\S]*?)```/);

if(m){
let box=document.createElement("div");
box.className="codeBox";

let header=document.createElement("div");
header.className="codeHeader";
header.innerText=m[1]||"code";

let spin=document.createElement("div");
spin.className="spinner";

let pre=document.createElement("pre");
pre.className="codeContent";

box.appendChild(header);
box.appendChild(spin);
box.appendChild(pre);
p.appendChild(box);

let code=m[2];
let i=0;

function t(){
pre.textContent+=code[i];
i++;
if(i<code.length){
requestAnimationFrame(t);
}else{
spin.remove();
hljs.highlightElement(pre);
renderChart(p,code);
}
}
t();

}else{
typeText(p,reply);
}

messages.scrollTop=messages.scrollHeight;
}

/* MODES */
function newChat(){messages.innerHTML="";}
function codeMode(){messages.innerHTML="";codeModeActive=true;exploreActive=false;evaluateMode=false;}
function exploreMode(){messages.innerHTML="";exploreActive=true;codeModeActive=false;evaluateMode=false;}
function evaluateModeUI(){messages.innerHTML="";evaluateMode=true;exploreActive=false;codeModeActive=false;}

msg.addEventListener("keydown",e=>{if(e.key==="Enter")send();});
</script>

</body>
</html>
