<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<script>(function(s){s.dataset.zone='10874323',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
<script>(function(s){s.dataset.zone='10874325',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

<link rel="icon" href="favicon.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
/* UI - UNCHANGED */
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;transition:.3s;}
.blur-bg{filter:blur(6px);}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 15px #ffd900;}
header div:first-child{font-weight:bold;text-shadow:0 0 15px #ffd900;}
#menuBtn{cursor:pointer;font-size:24px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:500;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}
#menuProfile{display:flex;gap:10px;padding:10px;border-bottom:1px solid #333;cursor:pointer;}
#menuProfile img{width:40px;height:40px;border-radius:50%;border:2px solid #ffd900;box-shadow:0 0 10px #ffd900;}
#profileName{font-weight:bold;color:#ffd900;text-shadow:0 0 10px #ffd900;}
.menuItem{padding:10px;cursor:pointer;margin-top:8px;font-weight:bold;color:#fff;text-shadow:0 0 8px #fff;transition:0.2s;}
.menuItem:hover{text-shadow:0 0 15px #fff, 0 0 30px #fff;}
#chatHistory div {padding: 6px;cursor: pointer;color: #ffd900;font-weight: bold;text-shadow: 0 0 6px #ffd900;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;box-shadow:0 0 20px #ffd900;}
#inputArea{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;border-radius:20px;box-shadow:0 0 15px #ffd900;font-weight:bold;}
.userText{color:#ffd900;text-shadow:0 0 10px #ffd900;}
.aiText{color:#fff;text-shadow:0 0 10px #fff;}
.footer{text-align:center;font-size:12px;margin:10px;color:#fff;}
.footer a{color:#ffd900;text-decoration:none;}
.codeBox{background:#000;border:1px solid #ffd900;border-radius:10px;margin-top:10px;overflow:hidden;}
</style>
</head>

<body>
<header><div>Quadron AI</div><div id="menuBtn">☰</div></header>
<div id="overlay"></div>
<div id="sidePanel">
  <div id="menuProfile">
    <img id="profilePic">
    <div><div id="profileName"></div><div id="profileEmail" style="font-size:12px; color:#ffd900;"></div></div>
  </div>
  <div class="menuItem" id="newChatBtn">New Chat</div>
  <div class="menuItem" id="codeModeBtn">Code /</div>
  <div class="menuItem" id="exploreModeBtn">Explore</div>
  <div class="menuItem" id="voiceModeBtn">Voice Mode</div>
  <div id="chatHistory" style="margin-top:15px;overflow:auto;max-height:300px;"></div>
  <div class="menuFooter" style="margin-top:auto; color:#fff;">Developed by <span style="color:#ffd900;">Rawat Systems</span></div>
</div>

<div id="chat">
  <div id="messages"></div>
  <div id="inputArea">
    <input id="msg" placeholder="Type here.....">
    <button id="sendBtn">Send</button>
  </div>
</div>
<div class="footer">Quadron AI can make mistakes, by using it you accept our <a href="terms.html">Terms & Conditions</a></div>

<script>
// --- GLOBAL STATE ---
let currentChatId = null;
let isFirstMessage = true;
let currentMessages = [];
let mode = "normal";
let userMsgCount = 0;
let lastAdMinute = Date.now();
let adsSentThisMinute = 0;

// --- AD SYSTEM (2 PER MINUTE, 30s GAP) ---
function triggerPopunder() {
    userMsgCount++;
    if (userMsgCount < 4) return;

    const now = Date.now();
    if (now - lastAdMinute > 60000) {
        adsSentThisMinute = 0;
        lastAdMinute = now;
    }

    if (adsSentThisMinute === 0) {
        deployAd();
        adsSentThisMinute = 1;
        // Wait 30 seconds for the second ad
        setTimeout(() => { deployAd(); adsSentThisMinute = 2; }, 30000);
    }
}

function deployAd() {
    let s = document.createElement('script');
    s.dataset.zone = '10874922';
    s.src = 'https://al5sm.com/tag.min.js';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 2000);
}

// --- UI LOGIC ---
const msgInput = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");
const menuBtn = document.getElementById("menuBtn");
const sidePanel = document.getElementById("sidePanel");
const overlay = document.getElementById("overlay");

function closeMenu(){
    sidePanel.classList.remove("open");
    overlay.style.display="none";
    document.getElementById("chat").classList.remove("blur-bg");
}

menuBtn.onclick = () => {
    sidePanel.classList.add("open");
    overlay.style.display="block";
    document.getElementById("chat").classList.add("blur-bg");
};
overlay.onclick = closeMenu;

async function send() {
    let text = msgInput.value.trim();
    if(!text) return;

    triggerPopunder();

    const messagesBox = document.getElementById("messages");
    messagesBox.innerHTML += `<p class="userText">You: ${text}</p>`;
    currentMessages.push({ role: "user", content: text });
    msgInput.value = "";

    let p = document.createElement("p");
    p.className = "aiText";
    messagesBox.appendChild(p);
    
    // Mock response logic (Replace with your actual /api/chat fetch)
    try {
        let res = await fetch("/api/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: text })
        });
        let reply = (await res.json()).reply;
        fastType(p, "Quadron: " + reply);
    } catch(e) {
        p.textContent = "Quadron: System online. Logic operational.";
    }
}

function fastType(el, text){
    let j = 0;
    let int = setInterval(() => {
        el.innerHTML += text[j++];
        if(j >= text.length) {
            clearInterval(int);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        }
    }, 5);
}

// --- INITIALIZE ---
window.onload = () => {
    let user = JSON.parse(localStorage.getItem("quadronUser") || '{"name":"Guest"}');
    document.getElementById("profileName").textContent = user.name;
    document.getElementById("profilePic").src = user.picture || "https://via.placeholder.com/40";
    
    // Explicitly bind click events to ensure they work
    sendBtn.onclick = send;
    msgInput.onkeydown = e => { if(e.key === "Enter") send(); };
    
    document.getElementById("newChatBtn").onclick = () => { closeMenu(); location.reload(); };
    document.getElementById("codeModeBtn").onclick = () => { closeMenu(); mode="code"; };
    document.getElementById("exploreModeBtn").onclick = () => { closeMenu(); mode="explore"; };
};
</script>
</body>
</html>
