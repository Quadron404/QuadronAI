<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadron AI</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
:root{
  --bg:#000;
  --surface:rgba(18,18,18,.72);
  --surface-2:rgba(255,255,255,.065);
  --line:rgba(255,255,255,.105);
  --line-strong:rgba(255,255,255,.18);
  --text:#f5f3ea;
  --muted:#929292;
  --yellow:#ffda00;
  --yellow-soft:rgba(255,218,0,.18);
  --shadow:0 24px 90px rgba(0,0,0,.58);
  --ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  overflow:hidden;
  transition:background .28s var(--ease);
  background:#000;
  color:var(--text);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}
button,textarea,input{font:inherit}
button{border:0;cursor:pointer}
#space{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
  background:
    radial-gradient(circle at 52% 34%,rgba(255,218,0,.035),transparent 30%),
    #000;
  transition:opacity .36s var(--ease),visibility .36s var(--ease);
}
body.chatting #space{opacity:0;visibility:hidden}
body.chatting .center{justify-content:flex-start;align-items:stretch;min-height:auto}
body.chatting .stage{padding-bottom:132px}
.app{
  position:relative;
  z-index:1;
  height:100vh;
  display:grid;
  grid-template-columns:72px 1fr;
}
.rail{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  padding:18px 0;
  border-right:1px solid rgba(255,255,255,.075);
  background:rgba(0,0,0,.54);
  backdrop-filter:blur(20px);
}
.rail-logo{
  margin:2px 0 18px;
  font-weight:820;
  font-size:22px;
  letter-spacing:-.04em;
  color:var(--yellow);
  text-shadow:0 0 16px rgba(255,218,0,.72);
}
.navbtn{
  width:44px;
  height:44px;
  border-radius:15px;
  display:grid;
  place-items:center;
  color:#e9e9e9;
  background:transparent;
  transition:background .18s var(--ease),transform .18s var(--ease),color .18s var(--ease),box-shadow .18s var(--ease);
}
.navbtn:hover,.navbtn.active{
  background:rgba(255,255,255,.085);
  transform:translateY(-1px);
  color:#fff;
  box-shadow:0 10px 28px rgba(0,0,0,.22);
}
.navbtn svg{
  width:20px;
  height:20px;
  fill:none;
  stroke:currentColor;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.rail-bottom{
  margin-top:auto;
  display:grid;
  gap:12px;
  place-items:center;
}
.avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid rgba(255,255,255,.18);
}
.main{
  min-width:0;
  height:100vh;
  display:grid;
  grid-template-rows:70px 1fr;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:22px;
  padding:0 30px;
}
.topbar button,.topbar a{
  background:transparent;
  color:#ededed;
  text-decoration:none;
  font-weight:720;
  display:flex;
  align-items:center;
  gap:8px;
  opacity:.92;
  transition:opacity .18s var(--ease),transform .18s var(--ease);
}
.topbar button:hover,.topbar a:hover{opacity:1;transform:translateY(-1px)}
.topbar svg{
  width:19px;
  height:19px;
  stroke:currentColor;
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.stage{
  min-height:0;
  overflow:auto;
  scroll-behavior:smooth;
  padding:24px clamp(18px,5vw,72px) 140px;
  scrollbar-width:none;
}
.stage::-webkit-scrollbar{display:none}
.center{
  width:min(980px,100%);
  min-height:calc(100vh - 230px);
  margin:0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
.hero{
  width:100%;
  display:grid;
  justify-items:center;
  gap:30px;
  transition:opacity .24s var(--ease),transform .24s var(--ease),height .24s var(--ease),margin .24s var(--ease);
}
.hero.hide{
  opacity:1;
  transform:none;
  pointer-events:auto;
  height:auto;
  margin:0;
  overflow:visible;
  position:fixed;
  left:calc(72px + clamp(18px,5vw,72px));
  right:clamp(18px,5vw,72px);
  bottom:18px;
  z-index:3;
  gap:8px;
}
.hero.hide .quadron-logo,.hero.hide .quick-actions{display:none}
.hero.hide .upload-preview{order:-1;margin:0 auto 2px}
.hero.hide .composer{width:min(930px,100%)}
.quadron-logo{
  margin:0;
  font-size:clamp(54px,8vw,92px);
  line-height:.88;
  letter-spacing:-.065em;
  font-weight:780;
  color:var(--yellow);
  text-shadow:
    0 0 10px rgba(255,218,0,.72),
    0 0 34px rgba(255,218,0,.32),
    0 0 82px rgba(255,218,0,.18);
}
.composer{
  width:min(930px,100%);
  min-height:76px;
  border-radius:38px;
  border:1px solid var(--line);
  background:rgba(22,22,22,.78);
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.075);
  backdrop-filter:blur(24px);
  display:grid;
  grid-template-columns:48px minmax(0,1fr) 48px 48px;
  align-items:center;
  justify-items:center;
  gap:8px;
  padding:10px 12px;
  transition:border-color .18s var(--ease),box-shadow .18s var(--ease),background .18s var(--ease);
}
.composer:focus-within{
  border-color:rgba(255,218,0,.34);
  background:rgba(25,25,25,.84);
  box-shadow:0 28px 100px rgba(0,0,0,.64),0 0 0 1px rgba(255,218,0,.08),0 0 45px rgba(255,218,0,.075);
}
.circle{
  width:48px;
  height:48px;
  min-width:48px;
  border-radius:50%;
  display:inline-grid;
  place-items:center;
  align-self:center;
  justify-self:center;
  background:transparent;
  color:#fff;
  line-height:1;
  padding:0;
  appearance:none;
  -webkit-appearance:none;
  transition:background .18s var(--ease),transform .18s var(--ease),box-shadow .18s var(--ease);
}
.circle svg{display:block}
.circle:hover{
  background:rgba(255,255,255,.085);
  transform:translateY(-1px);
}
.attach{font-size:30px;font-weight:300;line-height:0;transform:translateY(-1px)}
textarea{
  width:100%;
  height:50px;
  justify-self:stretch;
  max-height:150px;
  resize:none;
  overflow:hidden;
  border:0;
  outline:0;
  background:transparent;
  color:#f3f3f3;
  padding:14px 4px;
  font-size:20px;
  line-height:1.25;
}
textarea::placeholder{color:#8e8e8e}
.voice,.send{
  background:#f4f4f4;
  color:#050505;
}
.voice:hover,.send:hover{
  background:#fff;
  transform:translateY(-1px) scale(1.025);
  box-shadow:0 14px 36px rgba(255,255,255,.14);
}
.send svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2.35;stroke-linecap:round;stroke-linejoin:round}
.upload-preview{
  width:min(930px,100%);
  display:none;
  gap:8px;
  flex-wrap:wrap;
  margin:-14px 0 0;
}
.upload-preview.show{display:flex}
.chip{
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(255,255,255,.055);
  color:#e7e7e7;
  padding:8px 11px;
  font-size:13px;
  backdrop-filter:blur(16px);
}
.chip button{
  margin-left:8px;
  color:#fff;
  background:transparent;
}
.quick-actions{
  width:min(760px,100%);
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:4px;
}
.quick-actions button{
  min-height:48px;
  border-radius:24px;
  border:1px solid rgba(255,255,255,.085);
  background:rgba(255,255,255,.035);
  color:#d8d8d8;
  backdrop-filter:blur(16px);
  transition:background .18s var(--ease),border-color .18s var(--ease),transform .18s var(--ease);
}
.quick-actions button:hover{
  transform:translateY(-1px);
  border-color:rgba(255,218,0,.24);
  background:rgba(255,218,0,.06);
  color:#fff;
}
.thread{
  width:min(930px,100%);
  margin:0 auto;
  display:grid;
  gap:18px;
}
.msg{
  display:block;
  padding:20px 0;
  border-bottom:1px solid rgba(255,255,255,.07);
  animation:messageIn .24s var(--ease) both;
}
@keyframes messageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.who{display:none}
.ai .who{display:none}
.bubble{
  border:0;
  border-radius:0;
  background:transparent;
  backdrop-filter:none;
  padding:0;
  line-height:1.7;
  white-space:pre-wrap;
  box-shadow:none;
}
.user .bubble{max-width:78%;margin-left:auto;text-align:right;color:#f8f8f8}
.ai .bubble{max-width:820px;margin-right:auto;color:#f1f1f1}
.sources{
  display:grid;
  gap:8px;
  margin-top:12px;
}
.source{
  display:flex;
  align-items:center;
  gap:10px;
  border:1px solid var(--line);
  border-radius:14px;
  color:#eaeaea;
  text-decoration:none;
  padding:10px;
  background:rgba(255,255,255,.04);
}
.source img{width:22px;height:22px;border-radius:5px}
.source b{display:block;font-size:13px}
.source span{display:block;color:#999;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.codebox{
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
  background:#080808;
  margin-top:8px;
}
.codebar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 12px;
  border-bottom:1px solid var(--line);
  color:#ddd;
}
.codebar button{
  background:rgba(255,255,255,.07);
  color:#eee;
  border-radius:10px;
  padding:7px 10px;
  margin-left:6px;
}
.codebox pre{
  margin:0;
  padding:16px;
  overflow:auto;
  max-height:430px;
}
.media-stage{
  height:360px;
  border-radius:22px;
  border:1px solid var(--line);
  background:radial-gradient(circle,rgba(255,218,0,.13),transparent 38%),#050505;
  display:grid;
  place-items:center;
  overflow:hidden;
  position:relative;
}
.media-stage:before{
  content:"";
  position:absolute;
  width:180px;
  height:180px;
  border-radius:50%;
  border:1px solid rgba(255,218,0,.36);
  box-shadow:0 0 60px rgba(255,218,0,.2);
  animation:pulse 1.7s var(--ease) infinite;
}
.media-stage img,.media-stage video{
  position:relative;
  z-index:2;
  width:100%;
  height:100%;
  object-fit:contain;
}
.media-stage span{
  position:relative;
  z-index:2;
  color:var(--yellow);
  font-weight:800;
}
@keyframes pulse{50%{transform:scale(1.16);opacity:.45}}
.drawer-backdrop{
  position:fixed;
  inset:0;
  z-index:3;
  background:rgba(0,0,0,.34);
  backdrop-filter:blur(2px);
  opacity:0;
  pointer-events:none;
  transition:opacity .2s var(--ease);
}
.drawer-backdrop.open{
  opacity:1;
  pointer-events:auto;
}
.drawer{
  position:fixed;
  z-index:4;
  left:88px;
  top:14px;
  bottom:14px;
  width:330px;
  border:1px solid var(--line);
  border-radius:24px;
  background:rgba(8,8,8,.86);
  backdrop-filter:blur(26px);
  box-shadow:40px 0 110px rgba(0,0,0,.55);
  padding:20px;
  transform:translateX(calc(-100% - 112px));
  transition:transform .26s var(--ease);
}
.drawer.open{transform:none}
.drawer h3{margin:8px 0 16px;font-size:16px}
.history{display:grid;gap:8px}
.history button{
  text-align:left;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  color:#ddd;
  padding:12px;
  border:1px solid transparent;
}
.history button:hover{border-color:var(--line-strong)}
.toast{
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:5;
  display:none;
  max-width:360px;
  border:1px solid var(--line);
  border-radius:16px;
  background:#111;
  color:#eee;
  padding:13px 15px;
  box-shadow:var(--shadow);
}
.toast.show{display:block}
@media(max-width:760px){
  .app{grid-template-columns:56px 1fr}
  .rail{gap:10px}
  .rail-logo{font-size:19px}
  .navbtn{width:40px;height:40px;border-radius:13px}
  .topbar{height:58px;padding:0 14px;gap:14px}
  .topbar span{display:none}
  .stage{padding:18px 12px 120px}
  .center{min-height:calc(100vh - 180px)}
  .subtitle{font-size:14px;text-align:center}
  .composer{grid-template-columns:44px minmax(0,1fr) 44px;min-height:64px;border-radius:30px}
  .hero.hide{left:68px;right:12px;bottom:12px}
  .voice{display:none}
  textarea{font-size:16px}
  .quick-actions{grid-template-columns:1fr}
  .drawer{left:66px;top:10px;bottom:10px;width:calc(100vw - 80px);transform:translateX(calc(-100% - 80px))}
}
</style>
</head>
<body>
<canvas id="space"></canvas>
<div class="app">
  <aside class="rail">
    <div class="rail-logo">Q</div>
    <button class="navbtn" id="searchBtn" title="Explore"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></button>
    <button class="navbtn active" id="newChatBtn" title="New chat"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
    <button class="navbtn" data-mode="explore" title="Explore with sources"><svg viewBox="0 0 24 24"><path d="M4 19.5V5a2 2 0 0 1 2-2h10"/><path d="M8 7h8"/><path d="M8 11h6"/><circle cx="18" cy="17" r="3"/><path d="m21 20-1-1"/></svg></button>
    <button class="navbtn" data-mode="code" title="Code mode"><svg viewBox="0 0 24 24"><path d="m8 9-4 3 4 3"/><path d="m16 9 4 3-4 3"/><path d="m14 5-4 14"/></svg></button>
    <button class="navbtn" id="historyBtn" title="History"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v6h6"/><path d="M12 7v5l3 2"/></svg></button>
    <button class="navbtn" id="voicePageBtn" title="Voice mode"><svg viewBox="0 0 24 24"><path d="M5 10v4"/><path d="M9 6v12"/><path d="M13 3v18"/><path d="M17 7v10"/><path d="M21 10v4"/></svg></button>
    <div class="rail-bottom"><img class="avatar" id="avatar" alt="Profile"></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button id="imageSuggest"><svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="m4 15 4-4 3 3 2-2 7 7"/><circle cx="15" cy="9" r="1"/></svg><span>Imagine</span></button>
      <button id="stealthBtn" type="button"><svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg><span id="profileLabel">Stealth</span></button>
    </header>

    <section class="stage" id="stage">
      <div class="center">
        <div class="hero" id="hero">
          <h1 class="quadron-logo">Quadron</h1>
          <form class="composer" id="composerTop">
            <button type="button" class="circle attach" id="attachBtn" title="Attach file or photo">+</button>
            <textarea id="msg" rows="1" placeholder="How can I help you today?"></textarea>
            <button type="button" class="circle voice" id="voiceBtn" title="Voice mode"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M5 10v4M9 6v12M13 3v18M17 7v10M21 10v4" stroke="currentColor" stroke-width="2.35" stroke-linecap="round"/></svg></button>
            <button class="circle send" id="sendBtn" title="Send"><svg viewBox="0 0 24 24"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg></button>
          </form>
          <div class="upload-preview" id="uploadPreview"></div>
          <div class="quick-actions">
            <button type="button" data-action="image">Create image</button>
            <button type="button" data-action="video">Create video</button>
            <button type="button" data-action="explore">Explore sources</button>
          </div>
        </div>
        <div class="thread" id="thread"></div>
      </div>
    </section>
  </main>
</div>

<div class="drawer-backdrop" id="drawerBackdrop"></div>
<aside class="drawer" id="drawer"><h3>Recent chats</h3><div class="history" id="chatHistory"></div></aside>
<input type="file" id="fileInput" multiple accept="image/*,.pdf,.txt,.md,.csv,.json,.doc,.docx,.ppt,.pptx" hidden>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
const LIMITS={messages:100,images:5,videos:1};
const SARCASM="Every response must include a light, useful sarcastic remark while staying professional.";
let db,currentChatId=null,currentMessages=[],mode="normal",attachedFiles=[],pendingAction=null,stealthMode=false;
const user=getUser();
avatar.src=user.picture;
profileLabel.textContent="Stealth";

function getUser(){
  const raw=localStorage.getItem("quadronUser");
  if(raw==="guest"||!raw)return{name:"Guest",email:"guest@quadron.local",picture:"https://cdn-icons-png.flaticon.com/512/149/149071.png"};
  try{const u=JSON.parse(raw);return{name:u.name||"Guest",email:u.email||"",picture:u.picture||"https://cdn-icons-png.flaticon.com/512/149/149071.png"}}catch{return{name:"Guest",email:"guest@quadron.local",picture:"https://cdn-icons-png.flaticon.com/512/149/149071.png"}}
}
function usage(){
  const k="quadronUsage_"+(user.email||"guest");
  let v=JSON.parse(localStorage.getItem(k)||"null");
  const d=new Date().toISOString().slice(0,10);
  if(!v||v.date!==d)v={date:d,messages:0,images:0,videos:0};
  return v;
}
function saveUsage(v){localStorage.setItem("quadronUsage_"+(user.email||"guest"),JSON.stringify(v))}
function canUse(t){
  const u=usage();
  if(u[t]>=LIMITS[t]){toast(`Daily ${t} limit reached. Even ambition needs a quota.`);return false}
  u[t]++;saveUsage(u);return true;
}
function toast(t){
  const el=$("#toast");
  el.textContent=t;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),3200);
}
function openDB(){
  return new Promise(res=>{
    const r=indexedDB.open("quadronDB_v4",1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore("chats",{keyPath:"id"});
    r.onsuccess=e=>{db=e.target.result;res()};
  });
}
function saveChat(){
  if(stealthMode||!db||!currentChatId)return;
  const title=(currentMessages.find(m=>m.role==="user")?.content||"New chat").slice(0,52);
  db.transaction("chats","readwrite").objectStore("chats").put({id:currentChatId,title,messages:currentMessages,updated:Date.now()});
  loadChatList();
}
function loadChatList(){
  if(!db)return;
  const req=db.transaction("chats","readonly").objectStore("chats").getAll();
  req.onsuccess=()=>{
    chatHistory.innerHTML="";
    req.result.sort((a,b)=>(b.updated||0)-(a.updated||0)).forEach(c=>{
      const b=document.createElement("button");
      b.textContent=c.title;
      b.onclick=()=>{loadChat(c);closeDrawer()};
      chatHistory.appendChild(b);
    });
  };
}
function loadChat(c){
  currentChatId=c.id;
  currentMessages=c.messages||[];
  thread.innerHTML="";
  hero.classList.add("hide");
  document.body.classList.add("chatting");
  currentMessages.forEach(renderMessage);
  stage.scrollTop=stage.scrollHeight;
}
function newChat(){
  currentChatId=null;
  currentMessages=[];
  thread.innerHTML="";
  hero.classList.remove("hide");
  document.body.classList.remove("chatting");
  msg.value="";
  attachedFiles=[];
  pendingAction=null;
  renderFiles();
  closeDrawer();
  setMode("normal");
}
function openDrawer(){
  drawer.classList.add("open");
  drawerBackdrop.classList.add("open");
}
function closeDrawer(){
  drawer.classList.remove("open");
  drawerBackdrop.classList.remove("open");
}
function toggleDrawer(){
  drawer.classList.contains("open") ? closeDrawer() : openDrawer();
}
function setMode(m){
  mode=m;
  pendingAction=null;
  $$(".navbtn[data-mode]").forEach(b=>b.classList.toggle("active",b.dataset.mode===m));
  newChatBtn.classList.toggle("active",m==="normal");
  if(m==="explore")msg.placeholder="Explore anything with sources";
  else if(m==="code")msg.placeholder="Describe what you want to code";
  else msg.placeholder="How can I help you today?";
}
function setPendingAction(action){
  pendingAction=action;
  if(action==="image"){
    mode="normal";
    msg.value="";
    msg.placeholder="Describe the image you want Quadron to create";
  }else if(action==="video"){
    mode="normal";
    msg.value="";
    msg.placeholder="Describe the video you want Quadron to create";
  }else if(action==="explore"){
    setMode("explore");
    msg.value="";
    msg.placeholder="Ask what you want Quadron to explore with sources";
  }
  msg.focus();
  autoresize();
}
function renderMessage(m){
  document.body.classList.add("chatting");
  const row=document.createElement("div");
  row.className="msg "+m.role;
  row.innerHTML=`<div class="who">${m.role==="user"?"U":"Q"}</div><div class="bubble"></div>`;
  const bubble=row.querySelector(".bubble");
  if(m.kind==="code"&&m.role==="ai")createCodeBox(bubble,m.content);
  else if((m.kind==="image"||m.kind==="video")&&m.role==="ai")bubble.appendChild(mediaNode(m));
  else bubble.textContent=m.content||"";
  if(m.files?.length)bubble.appendChild(fileChips(m.files));
  if(m.sources?.length)bubble.appendChild(sourceCards(m.sources));
  thread.appendChild(row);
  hero.classList.add("hide");
  stage.scrollTop=stage.scrollHeight;
  return bubble;
}
function fileChips(files){
  const w=document.createElement("div");
  w.style.marginTop="10px";
  files.forEach(f=>{const c=document.createElement("span");c.className="chip";c.textContent=f.name;w.appendChild(c)});
  return w;
}
function sourceCards(srcs){
  const w=document.createElement("div");
  w.className="sources";
  srcs.forEach(s=>{
    try{
      const u=new URL(s.url);
      const a=document.createElement("a");
      a.className="source";
      a.href=s.url;
      a.target="_blank";
      a.rel="noopener";
      a.innerHTML=`<img src="https://www.google.com/s2/favicons?domain=${u.hostname}&sz=64" alt=""><div><b>${s.title||u.hostname}</b><span>${s.url}</span></div>`;
      w.appendChild(a);
    }catch{}
  });
  return w;
}
function mediaNode(m){
  const d=document.createElement("div");
  d.className="media-stage";
  if(m.url){
    if(m.kind==="video"){const v=document.createElement("video");v.src=m.url;v.controls=true;v.playsInline=true;d.appendChild(v)}
    else{const i=document.createElement("img");i.src=m.url;i.alt=m.prompt||"Generated image";d.appendChild(i)}
  }else d.innerHTML="<span>Generating. The pixels are finding themselves...</span>";
  return d;
}
function createCodeBox(parent,code){
  const box=document.createElement("div");
  box.className="codebox";
  box.innerHTML=`<div class="codebar"><b>${detect(code)}</b><span><button>Copy</button><button>Run</button><button>Debug</button></span></div><pre><code></code></pre>`;
  const c=box.querySelector("code");
  c.textContent=code;
  parent.appendChild(box);
  hljs.highlightElement(c);
  const [copy,run,debug]=box.querySelectorAll("button");
  copy.onclick=()=>navigator.clipboard.writeText(code).then(()=>toast("Copied. A historic clipboard moment."));
  run.onclick=()=>{
    if(!/<!doctype|<html/i.test(code))return toast("Run preview supports HTML only. Devastating, I know.");
    const f=document.createElement("iframe");
    f.sandbox="allow-scripts";
    f.style.cssText="width:100%;height:320px;border:0;background:white";
    f.srcdoc=code;
    box.appendChild(f);
  };
  debug.onclick=async()=>{
    const fixed=await askAI(`Fix this code. Return only complete fixed code:\n${code}`);
    c.textContent=fixed.replace(/```[\w-]*/g,"").replace(/```/g,"").trim();
    hljs.highlightElement(c);
  };
}
function detect(c){
  if(/<!doctype|<html/i.test(c))return"HTML";
  if(/\bfunction\b|=>|const |let /.test(c))return"JavaScript";
  if(/\bdef |print\(/.test(c))return"Python";
  return"Code";
}
async function readFiles(list){
  const out=[];
  for(const file of list){
    const item={name:file.name,type:file.type,size:file.size};
    if(file.type.startsWith("image/")){
      item.dataUrl=await fileToDataUrl(file);
      item.text="Image attached for Groq vision recognition.";
    }else if(file.type.startsWith("text/")||/\.(txt|md|csv|json)$/i.test(file.name)){
      item.text=(await file.text()).slice(0,12000);
    }
    out.push(item);
  }
  return out;
}
function fileToDataUrl(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}
function renderFiles(){
  uploadPreview.innerHTML="";
  uploadPreview.classList.toggle("show",attachedFiles.length>0);
  attachedFiles.forEach((f,i)=>{
    const c=document.createElement("span");
    c.className="chip";
    c.innerHTML=`${f.name}<button type="button">x</button>`;
    c.querySelector("button").onclick=()=>{attachedFiles.splice(i,1);renderFiles()};
    uploadPreview.appendChild(c);
  });
}
function autoresize(){msg.style.height="50px";msg.style.height=Math.min(msg.scrollHeight,150)+"px"}
async function send(e){
  e&&e.preventDefault();
  const text=msg.value.trim();
  if(!text&&!attachedFiles.length)return;
  const lower=text.toLowerCase();
  if(pendingAction==="image")return generateMedia("image",text);
  if(pendingAction==="video")return generateMedia("video",text);
  if(lower.startsWith("create image:")||lower.startsWith("/image"))return generateMedia("image",text.replace(/^create image:|^\/image/i,"").trim());
  if(lower.startsWith("create video:")||lower.startsWith("/video"))return generateMedia("video",text.replace(/^create video:|^\/video/i,"").trim());
  if(!canUse("messages"))return;
  if(!currentChatId)currentChatId="chat_"+Date.now();
  const files=attachedFiles.map(({name,type,size,text})=>({name,type,size,text}));
  const um={role:"user",content:text,files,kind:mode};
  currentMessages.push(um);
  renderMessage(um);
  msg.value="";
  autoresize();
  attachedFiles=[];
  renderFiles();
  const ai={role:"ai",content:"",kind:mode};
  currentMessages.push(ai);
  const bubble=renderMessage(ai);
  bubble.textContent="Thinking. A brave use of electricity...";
  try{
    let reply=clean(await (files.some(f=>f.dataUrl) ? askVision(text,files) : askAI(buildPrompt(text,files))));
    if(mode==="code")reply=reply.replace(/```[\w-]*/g,"").replace(/```/g,"").trim();
    ai.content=reply;
    bubble.innerHTML="";
    if(mode==="code")createCodeBox(bubble,reply);
    else{
      await streamText(bubble,reply);
      if(mode==="explore"){ai.sources=extractSources(reply,text);bubble.appendChild(sourceCards(ai.sources))}
    }
    saveChat();
  }catch{
    ai.content="Connection failed. Even the server needed a dramatic exit.";
    bubble.textContent=ai.content;
    saveChat();
  }
}
function buildPrompt(text,files){
  const f=files.map(x=>x.text?`\nFile ${x.name}:\n${x.text}`:`\nAttached file: ${x.name}`).join("");
  if(mode==="explore")return`${SARCASM}\nAnswer with careful facts and include source URLs at the end when possible.${f}\nUser: ${text}`;
  if(mode==="code")return`${SARCASM}\nReturn complete working code when code is requested. Avoid clutter.${f}\nUser: ${text}`;
  return`${SARCASM}\n${f}\nUser: ${text}`;
}
async function askAI(message){
  const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message})});
  if(!r.ok)throw new Error("chat");
  const d=await r.json();
  return d.reply||d.text||"";
}
async function askVision(message,files){
  const images=files.filter(f=>f.dataUrl).slice(0,4).map(f=>({name:f.name,type:f.type,dataUrl:f.dataUrl}));
  const r=await fetch("/api/vision",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:message||"Read this screenshot/image and extract the important text and details.",images})});
  if(!r.ok)throw new Error("vision");
  const d=await r.json();
  return d.reply||d.text||"";
}
function clean(t){return(t||"").trim()||"No response. Truly avant-garde."}
async function streamText(el,text){
  el.textContent="";
  for(let i=0;i<text.length;i++){
    el.textContent+=text[i];
    if(i%3===0)await new Promise(r=>setTimeout(r,5));
    stage.scrollTop=stage.scrollHeight;
  }
}
function extractSources(reply,q){
  const urls=[...reply.matchAll(/https?:\/\/[^\s)]+/g)].map(m=>m[0].replace(/[.,;]+$/,""));
  return urls.length?[...new Set(urls)].slice(0,5).map(url=>({url})):[{title:"Search the web",url:"https://www.google.com/search?q="+encodeURIComponent(q)}];
}
async function generateMedia(kind,prompt){
  if(!prompt)return toast(`Describe the ${kind} first. I left telepathy in the other build.`);
  if(!canUse(kind==="image"?"images":"videos"))return;
  if(!currentChatId)currentChatId="chat_"+Date.now();
  const um={role:"user",content:`Create ${kind}: ${prompt}`,kind};
  currentMessages.push(um);
  renderMessage(um);
  msg.value="";
  const ai={role:"ai",kind,prompt,url:""};
  currentMessages.push(ai);
  const b=renderMessage(ai);
  try{
    const r=await fetch(`/api/${kind}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt})});
    if(!r.ok)throw 0;
    const d=await r.json();
    ai.url=d.url;
    ai.content=d.url;
    b.innerHTML="";
    b.appendChild(mediaNode(ai));
    saveChat();
  }catch{
    b.textContent="Generation failed. The pixels staged a tiny rebellion.";
    saveChat();
  }
  pendingAction=null;
  msg.placeholder="How can I help you today?";
}
composerTop.onsubmit=send;
sendBtn.onclick=send;
msg.oninput=autoresize;
msg.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(e)}};
attachBtn.onclick=()=>fileInput.click();
fileInput.onchange=async e=>{attachedFiles=attachedFiles.concat(await readFiles(e.target.files));fileInput.value="";renderFiles()};
newChatBtn.onclick=newChat;
historyBtn.onclick=toggleDrawer;
drawerBackdrop.onclick=closeDrawer;
avatar.onclick=()=>location.href="profile.html";
voiceBtn.onclick=voicePageBtn.onclick=()=>location.href="voice.html";
imageSuggest.onclick=()=>setPendingAction("image");
stealthBtn.onclick=()=>{
  stealthMode=!stealthMode;
  stealthBtn.style.color=stealthMode?"var(--yellow)":"#ededed";
  stealthBtn.style.textShadow=stealthMode?"0 0 14px rgba(255,218,0,.55)":"none";
  toast(stealthMode?"Stealth on. New chats will not be saved.":"Stealth off. History saving is back.");
};
searchBtn.onclick=()=>{setMode("explore");msg.focus()};
$$(".navbtn[data-mode]").forEach(b=>b.onclick=()=>{setMode(b.dataset.mode);msg.focus()});
$$(".quick-actions button").forEach(b=>b.onclick=()=>setPendingAction(b.dataset.action));
openDB().then(loadChatList);

const canvas=$("#space"),ctx=canvas.getContext("2d");
let stars=[],shooters=[],w=0,h=0,last=0,lastShot=0;
function resize(){
  w=canvas.width=innerWidth*devicePixelRatio;
  h=canvas.height=innerHeight*devicePixelRatio;
  canvas.style.width=innerWidth+"px";
  canvas.style.height=innerHeight+"px";
  stars=Array.from({length:90},()=>({
    x:Math.random()*w,
    y:Math.random()*h,
    r:(Math.random()*1.05+.25)*devicePixelRatio,
    a:Math.random()*.55+.12,
    s:(Math.random()*5+2.4)*devicePixelRatio,
    t:Math.random()*Math.PI*2
  }));
}
function spawnShootingPair(){
  for(let i=0;i<2;i++){
    shooters.push({
      x:Math.random()*w*.72+w*.22,
      y:-80*devicePixelRatio-(i*140*devicePixelRatio),
      len:(Math.random()*120+130)*devicePixelRatio,
      v:(Math.random()*340+430)*devicePixelRatio,
      life:0,
      max:1.35
    });
  }
}
function draw(ts){
  const dt=Math.min((ts-last)/1000,.033)||.016;
  last=ts;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,w,h);
  for(const s of stars){
    s.x+=s.s*dt;
    s.t+=dt*1.25;
    if(s.x>w+8){s.x=-8;s.y=Math.random()*h}
    ctx.globalAlpha=s.a*(.45+.55*((Math.sin(s.t)+1)/2));
    ctx.fillStyle="#fff";
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  }
  if(!lastShot)lastShot=ts;
  if(ts-lastShot>=12000){spawnShootingPair();lastShot=ts}
  shooters=shooters.filter(o=>(o.life+=dt)<o.max);
  for(const o of shooters){
    o.x-=o.v*.42*dt;
    o.y+=o.v*dt;
    const p=o.life/o.max;
    ctx.globalAlpha=(1-p)*.46;
    const x2=o.x+o.len*.42;
    const y2=o.y-o.len;
    const g=ctx.createLinearGradient(o.x,o.y,x2,y2);
    g.addColorStop(0,"rgba(255,255,255,.85)");
    g.addColorStop(.3,"rgba(255,218,0,.35)");
    g.addColorStop(1,"rgba(255,255,255,0)");
    ctx.strokeStyle=g;
    ctx.lineWidth=1.65*devicePixelRatio;
    ctx.lineCap="round";
    ctx.beginPath();
    ctx.moveTo(o.x,o.y);
    ctx.lineTo(x2,y2);
    ctx.stroke();
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(draw);
}
addEventListener("resize",resize);
resize();
requestAnimationFrame(draw);
</script>
