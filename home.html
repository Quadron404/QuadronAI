<!DOCTYPE html>
<html>
<head>
<title>Quadron AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0a0a0a;
color:#ffd900;
font-family:Arial;
margin:0;
overflow-x:hidden;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:#000;
border-bottom:2px solid #ffd900;
z-index:2;
position:relative;
}

#menuBtn{
font-size:26px;
cursor:pointer;
}

/* OVERLAY BLUR */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
backdrop-filter:blur(6px);
background:rgba(0,0,0,0.4);
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:998;
}

#overlay.active{
opacity:1;
pointer-events:auto;
}

/* SIDE PANEL (FIXED FULL HIDE) */
#sidePanel{
position:fixed;
top:0;
right:0;
width:260px;
height:100%;
background:#111;
border-left:2px solid #ffd900;
box-shadow:-5px 0 20px #000;
transform:translateX(100%);
transition:0.35s ease;
padding:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
z-index:999;
}

#sidePanel.open{
transform:translateX(0);
}

/* MENU LIST */
.menuList{
display:flex;
flex-direction:column;
gap:8px;
}

/* MENU ITEM (PRO STYLE) */
.menuItem{
display:flex;
align-items:center;
gap:12px;
padding:12px;
border-radius:8px;
cursor:pointer;
transition:0.25s;
}

.menuItem:hover{
background:rgba(255,217,0,0.1);
box-shadow:0 0 15px #ffd900;
}

/* ICON STYLE */
.menuIcon{
width:20px;
height:20px;
background:#ffd900;
border-radius:4px;
box-shadow:0 0 10px #ffd900;
}

/* PROFILE SECTION */
#profileSection{
border-top:1px solid #555;
padding-top:15px;
display:flex;
flex-direction:column;
align-items:center;
}

#profilePic{
width:60px;
height:60px;
border-radius:50%;
border:2px solid #ffd900;
margin-bottom:10px;
object-fit:cover;
display:none;
}

#profileName{
font-size:14px;
margin-bottom:4px;
}

#profileEmail{
font-size:12px;
color:#aaa;
margin-bottom:10px;
text-align:center;
word-break:break-all;
}

#logoutBtn{
background:#ffd900;
color:black;
border:none;
padding:8px;
width:100%;
border-radius:6px;
cursor:pointer;
}

/* CHAT */
#chat{
width:100%;
max-width:800px;
margin:auto;
padding:10px;
}

#messages{
background:#111;
border:1px solid #ffd900;
height:65vh;
overflow:auto;
padding:10px;
text-align:left;
border-radius:10px;
}

#inputArea{
display:flex;
gap:8px;
margin-top:10px;
}

input{
flex:1;
padding:12px;
background:black;
color:#ffd900;
border:1px solid #ffd900;
border-radius:6px;
}

button{
background:#ffd900;
color:black;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
box-shadow:0 0 10px #ffd900;
}

#loader{
display:none;
margin:10px;
text-align:center;
}

.footer{
text-align:center;
font-size:12px;
color:#aaa;
margin:10px;
}

/* MOBILE */
@media (max-width:600px){
#messages{
height:70vh;
font-size:14px;
}
}

</style>
</head>

<body>

<header>
<h3>Quadron AI</h3>
<div id="menuBtn" onclick="openMenu()">☰</div>
</header>

<!-- BLUR -->
<div id="overlay" onclick="closeMenu()"></div>

<!-- SIDE PANEL -->
<div id="sidePanel">

<div class="menuList">

<div class="menuItem" onclick="newChat()">
<div class="menuIcon"></div>
New Chat
</div>

<div class="menuItem" onclick="location.href='voice.html'; closeMenu();">
<div class="menuIcon"></div>
Voice Mode
</div>

<div class="menuItem" onclick="location.href='quadron7.html'; closeMenu();">
<div class="menuIcon"></div>
Quadron 7
</div>

</div>

<div id="profileSection">
<img id="profilePic">
<div id="profileName"></div>
<div id="profileEmail"></div>
<button id="logoutBtn" onclick="logout()">Logout</button>
</div>

</div>

<!-- CHAT -->
<div id="chat">
<div id="messages"></div>
<div id="loader">Quadron thinking...</div>

<div id="inputArea">
<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>
</div>
</div>

<div class="footer">
Quadron AI developed by Rawat Systems •
<a href="terms.html" target="_blank">Terms & Conditions</a>
</div>

<script>

/* MENU CONTROL */
function openMenu(){
document.getElementById("sidePanel").classList.add("open")
document.getElementById("overlay").classList.add("active")
}

function closeMenu(){
document.getElementById("sidePanel").classList.remove("open")
document.getElementById("overlay").classList.remove("active")
}

/* NEW CHAT */
function newChat(){
document.getElementById("messages").innerHTML=""
closeMenu()
}

/* USER */
let username=null
let userEmail=null

const storedUser=localStorage.getItem("quadronUser")

if(storedUser){
const user=JSON.parse(storedUser)
username=user.name
userEmail=user.email

const pic=document.getElementById("profilePic")
pic.src=user.picture || "https://cdn-icons-png.flaticon.com/512/149/149071.png"
pic.style.display="block"

document.getElementById("profileName").innerText=username || ""
document.getElementById("profileEmail").innerText=userEmail || ""
}

/* LOGOUT */
function logout(){
localStorage.removeItem("quadronUser")
window.location.href="index.html"
}

/* API (UNCHANGED) */
async function askAI(message){

try{
const res = await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message})
})

const text = await res.text()
if(!text) return "ERROR: Empty response"

let data
try{ data = JSON.parse(text) }
catch{ return "RAW RESPONSE: " + text }

if(!res.ok){
return "ERROR: " + (data.error || JSON.stringify(data))
}

return data.reply || "No reply"

}catch{
return "ERROR: Connection failed"
}

}

/* INIT */
window.onload = async function(){

const box=document.getElementById("messages")

let intro="Say a sarcastic hello."

if(username){
intro="User name is "+username+". Give a witty sarcastic greeting under 25 words."
}

document.getElementById("loader").style.display="block"
const reply = await askAI(intro)
document.getElementById("loader").style.display="none"

const p=document.createElement("p")
p.innerHTML="<b>Quadron:</b> "
box.appendChild(p)

typeText(reply,p)
}

/* SEND */
async function send(){

const input=document.getElementById("msg")
const text=input.value.trim()
if(!text) return

const box=document.getElementById("messages")

box.innerHTML += "<p><b>You:</b> "+text+"</p>"

input.value=""
document.getElementById("loader").style.display="block"

const reply = await askAI(text)

document.getElementById("loader").style.display="none"

const p=document.createElement("p")
p.innerHTML="<b>Quadron:</b> "
box.appendChild(p)

typeText(reply,p)

box.scrollTop=box.scrollHeight
}

/* TYPE EFFECT */
function typeText(text,element){
let i=0
const interval=setInterval(()=>{
element.innerHTML+=text.charAt(i)
i++
if(i>=text.length) clearInterval(interval)
},20)
}

</script>

</body>
</html>
