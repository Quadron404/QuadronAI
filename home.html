<!DOCTYPE html>

<html>
<head>
<title>Quadron AI</title>

<style>
body{
background:#0a0a0a;
color:#ffd900;
font-family:Arial;
text-align:center;
margin:0;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
background:#000;
border-bottom:2px solid #ffd900;
align-items:center;
}

#rightControls{
display:flex;
align-items:center;
gap:10px;
position:relative;
}

#profilePic{
width:34px;
height:34px;
border-radius:50%;
border:2px solid #ffd900;
box-shadow:0 0 10px #ffd900;
object-fit:cover;
display:none;
cursor:pointer;
}

#profilePanel{
position:absolute;
top:50px;
right:0;
background:#111;
border:1px solid #ffd900;
padding:15px;
display:none;
width:200px;
box-shadow:0 0 15px #ffd900;
}

#profileEmail{
font-size:13px;
margin-bottom:12px;
color:#ccc;
word-break:break-all;
}

#logoutBtn{
background:#ffd900;
color:black;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:6px;
box-shadow:0 0 12px #ffd900;
width:100%;
}

button{
background:#ffd900;
color:black;
border:none;
padding:10px 18px;
cursor:pointer;
border-radius:6px;
box-shadow:0 0 10px #ffd900;
}

#chat{
width:80%;
max-width:700px;
margin:auto;
margin-top:20px;
}

#messages{
background:#111;
border:1px solid #ffd900;
height:420px;
overflow:auto;
padding:10px;
text-align:left;
}

input{
width:70%;
padding:10px;
background:black;
color:#ffd900;
border:1px solid #ffd900;
}

#loader{
display:none;
margin:10px;
}

.footer{
margin-top:20px;
font-size:12px;
color:#aaa;
}

/* 🔥 clickable terms style */
.footer a{
color:#ffd900;
text-decoration:underline;
text-decoration-color:#ffd900;
cursor:pointer;
}
/* 🔥 MOBILE APP STYLE FIX */
@media (max-width: 600px){

/* header */
header{
flex-direction:row;
padding:10px;
}

header h2{
font-size:18px;
}

/* buttons */
button{
padding:8px 10px;
font-size:12px;
}

/* chat container */
#chat{
width:100%;
padding:0 5px;
margin-top:5px;
}

/* messages box */
#messages{
height:65vh;
font-size:14px;
border-radius:8px;
}

/* input area like chatgpt */
input{
width:68%;
padding:10px;
font-size:14px;
border-radius:6px;
}

/* keep input + send aligned */
#chat input, #chat button{
margin-top:5px;
}

/* footer */
.footer{
font-size:10px;
margin-bottom:10px;
}

/* profile panel */
#profilePanel{
width:150px;
right:5px;
}

/* prevent zoom issues */
html{
font-size:16px;
}

}
</style>

</head>

<body>

<header>
<h2>Quadron AI</h2>

<div id="rightControls">
<button onclick="location.href='voice.html'">Voice Mode</button>
<button onclick="location.href='quadron7.html'">Quadron 7</button>

<img id="profilePic">

<div id="profilePanel">
<div id="profileEmail"></div>
<button id="logoutBtn" onclick="logout()">Logout</button>
</div>
</div>
</header>

<div id="chat">
<div id="messages"></div>

<div id="loader">Quadron thinking...</div>

<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>
</div>

<!-- 🔥 FINAL FOOTER -->
<div class="footer">
Quadron AI developed by Rawat Systems • By using this you agree our
<a href="terms.html" target="_blank">Terms & Conditions</a>
</div>

<script>

// USER MEMORY
let username=null
let userEmail=null

const storedUser=localStorage.getItem("quadronUser")

if(storedUser){
const user=JSON.parse(storedUser)
username=user.name
userEmail=user.email

const pic=document.getElementById("profilePic")
pic.src=user.picture || "https://cdn-icons-png.flaticon.com/512/149/149071.png"
pic.style.display="block"

document.getElementById("profileEmail").innerText=userEmail
}

// LOGOUT
function logout(){
localStorage.removeItem("quadronUser")
window.location.href="index.html"
}

// API CALL
async function askAI(message){

try{

const res = await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message})
})

const text = await res.text()

if(!text){
return "ERROR: Empty response from server"
}

let data

try{
data = JSON.parse(text)
}catch{
return "RAW RESPONSE: " + text
}

if(!res.ok){
return "ERROR: " + (data.error || JSON.stringify(data))
}

return data.reply || "No reply field in response"

}catch(err){
console.error(err)
return "ERROR: Connection failed"
}

}

// INITIAL GREETING
window.onload = async function(){

const box=document.getElementById("messages")

let intro="Say a sarcastic hello."

if(username){
intro="User name is "+username+". Give a ultra super sarcastic , smart & witty greeting , with a mixed sassy joke related to user to make user laugh , maximum word limit : 25."
}

document.getElementById("loader").style.display="block"

const reply = await askAI(intro)

document.getElementById("loader").style.display="none"

const p=document.createElement("p")
p.innerHTML="<b>Quadron:</b> "
box.appendChild(p)

typeText(reply,p)
}

// SEND MESSAGE
async function send(){

const input=document.getElementById("msg")
const text=input.value.trim()

if(!text) return

const box=document.getElementById("messages")

box.innerHTML += "<p><b>You:</b> "+text+"</p>"

input.value=""
document.getElementById("loader").style.display="block"

const reply = await askAI(text)

document.getElementById("loader").style.display="none"

const p=document.createElement("p")
p.innerHTML="<b>Quadron:</b> "
box.appendChild(p)

typeText(reply,p)

box.scrollTop=box.scrollHeight
}

// TYPE EFFECT
function typeText(text,element){

let i=0

const interval=setInterval(()=>{
element.innerHTML+=text.charAt(i)
i++
if(i>=text.length) clearInterval(interval)
},20)

}

</script>

</body>
</html>
