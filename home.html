<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quadron AI</title>
<link rel="icon" href="favicon.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<script>
function createAmazonSearchLink(query) {
  const tag = "psr0a-21";
  const cleanQuery = query.replace(/undefined/g, "").trim();
  const encoded = encodeURIComponent(cleanQuery);
  return `https://www.amazon.in/s?k=${encoded}&tag=${tag}`;
}

function detectProductQuery(text) {
  const keywords = [
    "buy","price","best","under","laptop","phone",
    "amazon","flipkart","deal","cheap","top","gaming"
  ];
  text = text.toLowerCase();
  return keywords.some(k => text.includes(k));
}
</script>

<style>
/* PLUS BUTTON */
#plusBtn{
  width:35px;
  height:35px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
  color:#fff;
  border-radius:50%;
  box-shadow:0 0 10px #fff;
  transition:0.2s;
}

#plusBtn:hover{
  box-shadow:0 0 25px #fff, 0 0 50px #fff;
}

/* FIX INPUT SHIFT */
#inputArea{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
  position:relative;
}

/* POPUP MENU */
#plusMenu{
  position:absolute;
  bottom:60px;
  left:0;
  background:#111;
  border:1px solid #fff;
  border-radius:10px;
  display:none;
  flex-direction:column;
  box-shadow:0 0 20px #fff;
  z-index:1000;
}

.plusItem{
  padding:10px;
  cursor:pointer;
  color:#fff;
  text-shadow:0 0 10px #fff;
}

.plusItem:hover{
  text-shadow:0 0 20px #fff, 0 0 40px #fff;
}

/* FILE PREVIEW */
#filePreview{
  margin-top:5px;
}

.fileBox{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  border:1px solid #fff;
  border-radius:8px;
  box-shadow:0 0 10px #fff;
  color:#fff;
}
/* SAME UI - UNCHANGED */
body{background:#0a0a0a;color:#ffd900;font-family:Arial;margin:0;transition:.3s;}
.blur-bg{filter:blur(6px);}
header{display:flex;justify-content:space-between;padding:12px;background:#000;border-bottom:2px solid #ffd900;box-shadow:0 0 15px #ffd900;}
header div:first-child{font-weight:bold;text-shadow:0 0 15px #ffd900;}
#menuBtn{cursor:pointer;font-size:24px;}
#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:500;}
#sidePanel{position:fixed;right:0;top:0;width:260px;height:100%;background:#111;transform:translateX(100%);transition:.3s;padding:15px;z-index:1000;display:flex;flex-direction:column;}
#sidePanel.open{transform:translateX(0);}
#menuProfile{display:flex;gap:10px;padding:10px;border-bottom:1px solid #333;cursor:pointer;}
#menuProfile img{
  width:40px;
  height:40px;
  border-radius:50%;
  border:2px solid #ffd900;
  box-shadow:0 0 10px #ffd900;
  transition:0.2s;
}
  #profileName{
  font-weight:bold;
  color:#ffd900;
  text-shadow:0 0 10px #ffd900;
  transition:0.2s;
}

#profileEmail{
  color:#ffd900;
  text-shadow:0 0 8px #ffd900;
  transition:0.2s;
}
.menuItem{
  padding:10px;
  cursor:pointer;
  margin-top:8px;
  font-weight:bold;
  color:#fff;
  text-shadow:0 0 8px #fff, 0 0 15px #fff;
  transition:0.2s;
}

.menuItem:hover{
  text-shadow:0 0 15px #fff, 0 0 30px #fff, 0 0 50px #fff;
}
.menuFooter{margin-top:auto;text-align:center;font-size:12px;color:#fff;text-shadow:0 0 10px #fff;}
.menuFooter span{color:#ffd900;text-shadow:0 0 10px #ffd900;}
#chat{max-width:800px;margin:auto;padding:10px;}
#messages{height:65vh;overflow:auto;background:#111;padding:10px;border:1px solid #ffd900;border-radius:12px;box-shadow:0 0 20px #ffd900;}
input{flex:1;padding:10px;background:black;color:#ffd900;border:1px solid #ffd900;border-radius:10px;}
input::placeholder{color:rgba(255,255,255,0.3);}
button{padding:10px;background:#ffd900;color:#000;border:none;cursor:pointer;border-radius:20px;box-shadow:0 0 15px #ffd900;transition:.2s;}
button:hover{box-shadow:0 0 35px #ffd900;}
.userText{color:#ffd900;text-shadow:0 0 10px #ffd900;}
.aiText{color:#fff;text-shadow:0 0 10px #fff;}
.footer{text-align:center;font-size:12px;margin:10px;color:#fff;text-shadow:0 0 10px #fff;}
.footer a{color:#ffd900;text-shadow:0 0 15px #ffd900;text-decoration:none;}
#menuProfile:hover #profileName,
#menuProfile:hover #profileEmail{
  text-shadow:0 0 20px #ffd900, 0 0 40px #ffd900;
}

#menuProfile:hover img{
  box-shadow:0 0 20px #ffd900, 0 0 40px #ffd900;
  border-color:#ffd900;
}

/* CODE BOX ADDITIONS ONLY */
.codeBox{background:#000;border:1px solid #ffd900;border-radius:10px;margin-top:10px;overflow:hidden;}
.codeTop{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #ffd900;}
.codeTitle{color:#fff;text-shadow:0 0 10px #fff;}
.codeBtns span{margin-left:10px;cursor:pointer;color:#fff;text-shadow:0 0 10px #fff;}
.backBtn{color:#ffd900;text-shadow:0 0 10px #ffd900;cursor:pointer;}
.loader{width:20px;height:20px;border:3px solid #fff;border-top:3px solid transparent;border-radius:50%;animation:spin 1s linear infinite;margin:5px;}
@keyframes spin{100%{transform:rotate(360deg);}}
a.link{
  color:#ffd900;
  text-shadow:0 0 10px #ffd900, 0 0 20px #ffd900;
  text-decoration:none;
}
.sourceBox{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
  padding:10px;
  border:1px solid #fff;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 0 10px #fff;
}

.sourceBox:hover{
  box-shadow:0 0 25px #fff;
}

.sourceBox img{
  width:20px;
  height:20px;
}

.sourceText{
  display:flex;
  flex-direction:column;
}

.sourceTitle{
  color:#fff;
  font-size:14px;
  text-shadow:0 0 5px #fff;
}

.sourceLink{
  color:#aaa;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  <div>Quadron AI</div>
  <div id="menuBtn">☰</div>
</header>

<div id="overlay"></div>

<div id="sidePanel">
  <div id="menuProfile">
    <img id="profilePic">
    <div>
      <div id="profileName"></div>
      <div id="profileEmail" style="font-size:12px;"></div>
    </div>
  </div>

  <div class="menuItem" id="newChatBtn">New Chat</div>
  <div class="menuItem" id="codeModeBtn">Code /</div>
  <div class="menuItem" id="exploreModeBtn">Explore</div>
  <div class="menuItem" id="voiceModeBtn">Voice Mode</div>

  <div class="menuFooter">
    Developed by <span>Rawat Systems</span>
  </div>
</div>

<div id="chat">
  <div id="messages"></div>
  <div id="inputArea">
  <div id="plusBtn">+</div>
  <input id="msg" placeholder="Type here.....">
  <button id="sendBtn">Send</button>

  <!-- Hidden file input -->
  <input type="file" id="fileInput" style="display:none;">
</div>

<!-- POPUP MENU -->
<div id="plusMenu">
  <div class="plusItem" id="addFileBtn">📎 Add Files & Documents</div>
  <div class="plusItem" id="codeModeQuick">Code /</div>
  <div class="plusItem" id="exploreModeQuick">Explore</div>
  <div class="plusItem" id="voiceModeQuick">Voice Mode</div>
</div>

<!-- FILE PREVIEW -->
<div id="filePreview"></div>
</div>

<div class="footer">
  Quadron AI can make mistakes, by using it you accept our
  <a href="terms.html">Terms & Conditions</a>
</div>

<script>

/* SAFE ELEMENT REFERENCES */
const menuBtn = document.getElementById("menuBtn");
const overlay = document.getElementById("overlay");
const sidePanel = document.getElementById("sidePanel");
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");
const msg = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");

sendBtn.onclick = send;

const profileName = document.getElementById("profileName");
const profileEmail = document.getElementById("profileEmail");
const profilePic = document.getElementById("profilePic");

const menuProfile = document.getElementById("menuProfile");
const newChatBtn = document.getElementById("newChatBtn");
const codeModeBtn = document.getElementById("codeModeBtn");
const exploreModeBtn = document.getElementById("exploreModeBtn");
const voiceModeBtn = document.getElementById("voiceModeBtn");
const plusBtn = document.getElementById("plusBtn");
const plusMenu = document.getElementById("plusMenu");
const fileInput = document.getElementById("fileInput");
const addFileBtn = document.getElementById("addFileBtn");
const filePreview = document.getElementById("filePreview");

const codeModeQuick = document.getElementById("codeModeQuick");
const exploreModeQuick = document.getElementById("exploreModeQuick");
const voiceModeQuick = document.getElementById("voiceModeQuick");

let uploadedFileText = "";
let uploadedFileName = "";

/* USER (UNCHANGED) */
let user = JSON.parse(localStorage.getItem("quadronUser")) || {};
profileName.textContent = user.name || "Guest";
profileEmail.textContent = user.email || "";
profilePic.src = user.picture || "https://via.placeholder.com/40";

/* MENU */
menuBtn.addEventListener("click", ()=>{
  sidePanel.classList.add("open");
  overlay.style.display="block";
  chat.classList.add("blur-bg");
});
overlay.onclick = closeMenu;

function closeMenu(){
  sidePanel.classList.remove("open");
  overlay.style.display="none";
  chat.classList.remove("blur-bg");
}

function menuAction(fn){
  closeMenu();
  if(fn) fn();
}

/* MODES */
let mode="normal";
function resetChat(){messages.innerHTML="";}

function newChat(){mode="normal";resetChat();}
function codeMode(){mode="code";resetChat();fastType(messages,"Describe What You Want To Code");}
function exploreMode(){mode="explore";resetChat();fastType(messages,"Explore The Universe");}
function voiceMode(){window.location.href="voice.html";}

/* MENU BINDINGS (FORCE CLOSE) */
menuProfile.onclick=()=>{closeMenu();window.location.href="profile.html";}
newChatBtn.onclick=()=>menuAction(newChat);
codeModeBtn.onclick=()=>menuAction(codeMode);
exploreModeBtn.onclick=()=>menuAction(exploreMode);
voiceModeBtn.onclick=()=>{closeMenu();voiceMode();};

plusBtn.onclick = () => {
  plusMenu.style.display = plusMenu.style.display === "flex" ? "none" : "flex";
};
addFileBtn.onclick = () => {

  if(uploadedFileText){
    alert("Only one file allowed per input.");
    return;
  }

  fileInput.accept = ".txt,.pdf,.doc,.docx";
  fileInput.click();
};
fileInput.onchange = async (e) => {

  let file = e.target.files[0];
  if(!file) return;

  uploadedFileName = file.name;

  filePreview.innerHTML = `
    <div class="fileBox">📄 ${file.name}</div>
  `;

  if(file.type === "text/plain"){
    uploadedFileText = await file.text();
  }else{
    uploadedFileText = "[Document uploaded: " + file.name + "]";
  }

  plusMenu.style.display = "none";
};
codeModeQuick.onclick = () => { plusMenu.style.display="none"; codeMode(); };
exploreModeQuick.onclick = () => { plusMenu.style.display="none"; exploreMode(); };
voiceModeQuick.onclick = () => { plusMenu.style.display="none"; voiceMode(); };

/* TYPE */
function fastType(el,text){
  let span=document.createElement("span");
  span.className="aiText";
  el.appendChild(span);

  // Split text into parts (text + links)
  let parts = text.split(/(<a.*?>.*?<\/a>)/g);

  let i = 0;

  function typePart(){
    if(i >= parts.length) return;

    let part = parts[i];

    // If it's a link → render instantly
    if(part.startsWith("<a")){
      span.innerHTML += part;
      i++;
      typePart();
    }else{
      // Fast typing for normal text
      let j = 0;
      let speed = 2; // VERY FAST

      let int = setInterval(()=>{
        span.innerHTML += part[j++];
        if(j >= part.length){
          clearInterval(int);
          i++;
          typePart();
        }
      }, speed);
    }
  }

  typePart();
}
async function autoGreeting(){

  // Run only once per tab session
  if(sessionStorage.getItem("greeted")) return;

  // Get real time from user system
  let hour = new Date().getHours();
  let timeText = "";

  if(hour < 12) timeText = "morning";
  else if(hour < 17) timeText = "afternoon";
  else timeText = "evening";

  let name = user.name || "Guest";

  // Build sarcastic AI prompt
  let prompt = `Write a short sarcastic greeting saying "Good ${timeText}" to ${name}. Keep it funny, slightly rude, and human-like. No extra explanation.`;

  try{
    let res = await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message: prompt})
    });

    let reply = (await res.json()).reply;

    let p = document.createElement("p");
    messages.appendChild(p);

    fastType(p, "Quadron: " + reply);

    // Mark as greeted (ONLY for this session)
    sessionStorage.setItem("greeted", true);

  }catch(e){
    console.error("Greeting failed", e);
  }
}
function createSourceBox(url){

  let domain = (new URL(url)).hostname;

  let box = document.createElement("div");
  box.className = "sourceBox";

  box.innerHTML = `
    <img src="https://www.google.com/s2/favicons?domain=${domain}" />
    <div class="sourceText">
      <div class="sourceTitle">${domain}</div>
      <div class="sourceLink">${url}</div>
    </div>
  `;

  box.onclick = ()=>{
    window.open(url, "_blank");
  };

  return box;
}
/* WIKI FIXED (ONLY SYNTAX FIX) */
async function getWikiData(query){
  try{
    let res=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
    let data=await res.json();
    return data.extract || "";
  }catch{return "";}
}

/* SEND (API LOGIC UNCHANGED) */
async function send(){
  let text = msg.value.trim();
  if(!text) return;

  let isProductQuery = detectProductQuery(text);
  let amazonLink = isProductQuery ? createAmazonSearchLink(text) : "";

  messages.innerHTML += `<p class="userText">You: ${text}</p>`;
  msg.value = "";

  let p = document.createElement("p");
  messages.appendChild(p);

  let finalPrompt = text;

  // FILE ATTACH
  if(uploadedFileText){
    finalPrompt = `
User message:
${text}

Extra document provided by user:
${uploadedFileText}

Instructions:
Use this document as context while answering.
`;
  }

  // MODES
  if(mode==="code"){
    finalPrompt = `
You are a code generator.
Output ONLY code. No explanation.

${text}
`;
  }

  if(mode==="explore"){
    let wiki = await getWikiData(text);
    finalPrompt = `Use this:\n${wiki}\n\nExplain simply and give one source.\n${text}`;
  }

  let res = await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:finalPrompt})
  });

  let reply = (await res.json()).reply;

  if(mode==="code"){
    reply = reply.replace(/```[\w]*/g,"").replace(/```/g,"").trim();
    createCodeBox(p,reply);
    return;
  }

  fastType(p,"Quadron: "+reply);

  // AMAZON BOX
  if(amazonLink){
    let amazonBox = document.createElement("div");
    amazonBox.className = "sourceBox";

    amazonBox.innerHTML = `
      <img src="https://www.amazon.in/favicon.ico">
      <div class="sourceText">
        <div class="sourceTitle">View on Amazon</div>
        <div class="sourceLink">${text}</div>
      </div>
    `;

    amazonBox.onclick = ()=> window.open(amazonLink, "_blank");

    setTimeout(()=> p.appendChild(amazonBox), 100);
  }

  // RESET FILE
  uploadedFileText = "";
  uploadedFileName = "";
  filePreview.innerHTML = "";
  fileInput.value = "";
}



/* CODE BOX */
function createCodeBox(parent,code, instant=false){
  
  let originalCode = code;
  let box=document.createElement("div");
  box.className="codeBox";

  let top=document.createElement("div");
  top.className="codeTop";

  let title=document.createElement("div");
  title.className="codeTitle";
  function detectCodeName(code){
  if(code.includes("<html")) return "HTML File";
  if(code.includes("function") || code.includes("=>")) return "JavaScript File";
  if(code.includes("import") && code.includes("from")) return "Python File";
  if(code.includes("#include")) return "C/C++ File";
  return "Code";
}

let codeName = detectCodeName(code);
  title.innerHTML="&lt;/&gt; " + codeName;
  let btns=document.createElement("div");
  btns.className="codeBtns";

  let copy=document.createElement("span");
  copy.textContent="Copy";

  let run=document.createElement("span");
  run.textContent="Run";

  let debug=document.createElement("span");
  debug.textContent="Debugg";

  btns.append(copy,run,debug);
  top.append(title,btns);
  let loaderWrap = document.createElement("div");
  loaderWrap.style.display="flex";
  loaderWrap.style.paddingLeft="8px";

  let loader = document.createElement("div");
  loader.className="loader";

  loaderWrap.appendChild(loader);

  let pre=document.createElement("pre");

  box.append(top);
box.append(loaderWrap);
  parent.appendChild(box);

box.appendChild(pre);

if(instant){
  pre.textContent = code;
  loaderWrap.remove();
  hljs.highlightElement(pre);
}else{
  let i=0,txt="";
  let int=setInterval(()=>{
    txt+=code[i++];
    pre.textContent=txt;

    if(i>=code.length){
      clearInterval(int);
      loaderWrap.remove();
      hljs.highlightElement(pre);
    }
  },1);
}

  copy.onclick=()=>{
    navigator.clipboard.writeText(code);
    copy.textContent="Copied !";
    setTimeout(()=>copy.textContent="Copy",1500);
  };

 run.onclick=()=>{

  pre.style.display="none";

  let existingFrame = box.querySelector("iframe");
  if(existingFrame) existingFrame.remove();

  let iframe=document.createElement("iframe");
  iframe.style.width="100%";
  iframe.style.height="300px";

  let back=document.createElement("div");
  back.className="backBtn";
  back.textContent="Back";

  top.innerHTML="";
  top.append(title, back);

  box.appendChild(iframe);
  iframe.contentDocument.write(code);

  back.onclick=()=>{
    iframe.remove();
    pre.style.display="block";

    top.innerHTML="";
    top.append(title, btns);
  };
  };

 debug.onclick=async()=>{

  loaderWrap.style.display="flex";
  if(!box.contains(loaderWrap)) box.insertBefore(loaderWrap, pre);

  let res=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      message:`Fix this code. Return ONLY fixed code. No explanation:\n${code}`
    })
  });

  let fixed=(await res.json()).reply;

  fixed = fixed
    .replace(/```[\w]*/g,"")
    .replace(/```/g,"")
    .trim();

  code = fixed;

  let i=0,txt="";

  let int=setInterval(()=>{
    txt+=fixed[i++];
    pre.textContent=txt;

    if(i>=fixed.length){
      clearInterval(int);
      loaderWrap.style.display="none";
      hljs.highlightElement(pre);
    }
  },1);
};
}

msg.addEventListener("keydown",e=>{if(e.key==="Enter") send();});
window.addEventListener("load", autoGreeting);
</script>

</body>
</html>
